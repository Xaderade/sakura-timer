<!DOCTYPE html>
<html>
<head>
    <title>Mugi Pie - Choice System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        
        body { background: #00ff00; font-family: 'Luckiest Guy', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        
        #container {
            position: relative;
            width: 600px;
            height: 600px;
            transition: opacity 0.5s ease;
        }

        #timer-display {
            font-size: 80px;
            color: white;
            text-shadow: 4px 4px 0px #000;
            margin-bottom: 20px;
        }

        .hidden { opacity: 0; }
    </style>
</head>
<body>

    <div id="timer-display"></div>
    <div id="container">
        <canvas id="voteChart"></canvas>
    </div>

    <script>
        const RATER_ID = 'mugi-pie-2026';
        const CHANNEL = 'crazyjapanese';
        const isController = window.location.hash.includes('control');
        
        let votes = {}; 
        let isVotingOpen = false;

        // Initialize Chart.js
        const ctx = document.getElementById('voteChart').getContext('2d');
        const voteChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['1', '2', '3', '4'],
                datasets: [{
                    data: [1, 1, 1, 1], // Start with equal slices so it's a circle
                    backgroundColor: ['#43B047', '#2196F3', '#E52521', '#9C27B0'],
                    borderColor: '#000',
                    borderWidth: 5
                }]
            },
            options: {
                responsive: true,
                animation: { duration: 500 },
                plugins: {
                    legend: {
                        display: true,
                        labels: { color: 'white', font: { size: 40, family: 'Luckiest Guy' } }
                    }
                }
            }
        });

        ComfyJS.onChat = (user, message, flags, self, extra) => {
            if (!isVotingOpen) return;
            const choice = message.trim();
            if (['1', '2', '3', '4'].includes(choice)) {
                votes[user] = parseInt(choice);
                updateChart();
            }
        };
        ComfyJS.Init(CHANNEL);

        function updateChart() {
            let counts = [0, 0, 0, 0];
            Object.values(votes).forEach(v => counts[v-1]++);
            
            // If no votes yet, keep it even so the chart stays visible
            if (Object.keys(votes).length === 0) counts = [1, 1, 1, 1];
            
            voteChart.data.datasets[0].data = counts;
            voteChart.update();
        }

        // --- PeerJS Logic ---
        const peer = new Peer(isController ? null : RATER_ID);
        let conn;

        peer.on('open', () => { if (isController) connectToOBS(); });
        function connectToOBS() { conn = peer.connect(RATER_ID); }

        peer.on('connection', (c) => {
            conn = c;
            conn.on('data', (data) => {
                if (data.action === 'start') executeStart(data.time);
                if (data.action === 'reset') executeReset();
                if (data.action === 'toggle') executeToggle();
            });
        });

        function executeStart(time) {
            votes = {};
            updateChart();
            isVotingOpen = true;
            let timeLeft = time;
            document.getElementById('timer-display').innerText = timeLeft;
            let timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-display').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    isVotingOpen = false;
                    document.getElementById('timer-display').innerText = "FINAL VOTE!";
                }
            }, 1000);
        }

        function executeToggle() {
            document.getElementById('container').classList.toggle('hidden');
        }

        function executeReset() {
            votes = {};
            updateChart();
            document.getElementById('timer-display').innerText = "";
        }
    </script>
</body>
</html>

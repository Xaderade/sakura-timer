<!DOCTYPE html>
<html>
<head>
    <title>Mugi Pie - Choice Version</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        
        body { background: #00ff00; font-family: 'Luckiest Guy', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        
        /* OVERLAY STYLES */
        #display-container {
            position: relative;
            width: 700px;
            height: 700px;
            transition: opacity 0.5s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #timer-text { font-size: 100px; color: white; text-shadow: 5px 5px 0px #000; margin-bottom: 10px; height: 120px; }
        .hidden { opacity: 0 !important; }

        /* CONTROL PANEL STYLES */
        #controls { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; color: white; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; }
        .control-box { background: white; color: black; border: 5px solid black; padding: 30px; border-radius: 30px; text-align: center; width: 450px; }
        .input-group { margin: 20px 0; }
        input { width: 80px; padding: 10px; font-size: 20px; border: 3px solid black; border-radius: 10px; text-align: center; font-weight: bold; }
        button { width: 100%; padding: 18px; cursor: pointer; font-weight: bold; font-size: 18px; border: 4px solid #000; border-radius: 15px; margin-top: 12px; text-transform: uppercase; }
        .start-btn { background: #43B047; color: white; }
        .toggle-btn { background: #2196F3; color: white; }
        .reset-btn { background: #E52521; color: white; }
        .status-tray { margin-top: 25px; padding-top: 15px; border-top: 2px dashed #ccc; display: flex; justify-content: space-around; font-size: 12px; font-weight: bold; }
        .stat-item { display: flex; align-items: center; gap: 5px; }
        .dot { height: 10px; width: 10px; border-radius: 50%; background: red; }
        .online { background: #43B047; box-shadow: 0 0 5px #43B047; }
    </style>
</head>
<body>

    <div id="display-container">
        <div id="timer-text"></div>
        <canvas id="voteChart"></canvas>
    </div>

    <div id="controls">
        <div class="control-box">
            <h2 style="margin:0;">MUGI PIE CHORCE</h2>
            <div class="input-group">
                <label style="display:block; font-weight:bold; margin-bottom: 8px;">VOTE DURATION (SEC):</label>
                <input type="number" id="timer-input" value="30">
            </div>
            <button class="start-btn" onclick="startVoting()">▶ START 1-4 VOTING</button>
            <button class="toggle-btn" onclick="toggleVisibility()">👁 SHOW / HIDE PIE</button>
            <button class="reset-btn" onclick="resetAll()">✖ RESET & CLEAR</button>
            <div class="status-tray">
                <div class="stat-item"><div id="dot-obs" class="dot"></div> OBS LINK</div>
                <div class="stat-item"><div id="dot-twitch" class="dot"></div> TWITCH CHAT</div>
            </div>
        </div>
    </div>

    <script>
        const RATER_ID = 'mugi-pie-v2-2026';
        const CHANNEL = 'crazyjapanese';
        const isController = window.location.hash.includes('control');
        
        if (isController) document.getElementById('controls').style.display = 'flex';

        let votes = {}; 
        let isVotingOpen = false;
        let timerInterval;

        // Initialize Pie Chart
        const ctx = document.getElementById('voteChart').getContext('2d');
        const voteChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['1', '2', '3', '4'],
                datasets: [{
                    data: [1, 1, 1, 1],
                    backgroundColor: ['#43B047', '#2196F3', '#E52521', '#9C27B0'],
                    borderColor: 'black',
                    borderWidth: 8
                }]
            },
            options: {
                responsive: true,
                animation: { duration: 400 },
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: 'white', font: { size: 60, family: 'Luckiest Guy' } }
                    }
                }
            }
        });

        // PeerJS Connection Logic
        const peer = new Peer(isController ? null : RATER_ID);
        let conn;

        peer.on('open', () => { if (isController) connectToOBS(); });
        function connectToOBS() {
            conn = peer.connect(RATER_ID);
            conn.on('open', () => { if(isController) document.getElementById('dot-obs').classList.add('online'); });
        }

        peer.on('connection', (c) => {
            conn = c;
            conn.on('data', (data) => {
                if (data.action === 'start') executeStart(data.time);
                if (data.action === 'reset') executeReset();
                if (data.action === 'toggle') executeToggle();
            });
        });

        // Twitch Chat Logic
        ComfyJS.onChat = (user, message, flags, self, extra) => {
            if (!isVotingOpen) return;
            const msg = message.trim();
            if (['1', '2', '3', '4'].includes(msg)) {
                votes[user] = parseInt(msg);
                updateChart();
            }
        };
        ComfyJS.Init(CHANNEL);
        setTimeout(() => { if(isController) document.getElementById('dot-twitch').classList.add('online'); }, 1500);

        // Control Functions
        function startVoting() {
            const duration = parseInt(document.getElementById('timer-input').value) || 30;
            if (conn) conn.send({ action: 'start', time: duration });
            executeStart(duration);
        }

        function toggleVisibility() {
            if (conn) conn.send({ action: 'toggle' });
            executeToggle();
        }

        function resetAll() {
            if (conn) conn.send({ action: 'reset' });
            executeReset();
        }

        // Execution Functions (Overlay Side)
        function executeStart(time) {
            executeReset();
            isVotingOpen = true;
            let timeLeft = time;
            document.getElementById('timer-text').innerText = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-text').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isVotingOpen = false;
                    document.getElementById('timer-text').innerText = "DONE!";
                }
            }, 1000);
        }

        function executeToggle() {
            document.getElementById('display-container').classList.toggle('hidden');
        }

        function executeReset() {
            clearInterval(timerInterval);
            votes = {};
            isVotingOpen = false;
            document.getElementById('timer-text').innerText = "";
            updateChart();
        }

        function updateChart() {
            let counts = [0, 0, 0, 0];
            const voterEntries = Object.values(votes);
            voterEntries.forEach(v => counts[v-1]++);
            
            // Default to equal slices if no votes
            if (voterEntries.length === 0) {
                voteChart.data.datasets[0].data = [1, 1, 1, 1];
            } else {
                voteChart.data.datasets[0].data = counts;
            }
            voteChart.update();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugi Co. | Engine v16.7.10 [GAME UI REFRESH]</title>
    
    <script src="tmi.min.js"></script>
    <script src="peerjs.min.js"></script>

    <script>
        const PEER_ID = 'mugi-link-123'; 
        const urlParams = new URLSearchParams(window.location.search);
        const isRemote = urlParams.has('control');
        const peer = new Peer(isRemote ? null : PEER_ID);

        if (!isRemote) {
            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (data.type === 'BOOT') {
                        document.getElementById('inp-ch').value = data.ch;
                        if(data.id7) document.getElementById('inp-7id').value = data.id7;
                        reboot(); 
                    }
                });
            });
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        :root { 
            --p: #9146ff; --cyan: #00ffff; --g: #ffd700; --red: #ff4d4d; --magenta: #ff00ff;
            --ui-bg: rgba(0, 0, 0, 0.85); --font-main: 'Inter', sans-serif; 
        }
        
        body { margin: 0; background-color: transparent; color: white; font-family: var(--font-main); overflow: hidden; user-select: none; }
        
        #leaderboard { 
            display: flex; justify-content: center; align-items: flex-end; gap: 30px; 
            width: 100vw; height: 100vh; padding-bottom: 60px; box-sizing: border-box; 
            position: absolute; bottom: 0; left: 0; 
        }
        
        .emote-slot { 
            position: relative; display: flex; flex-direction: column; align-items: center; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            opacity: 0; transform: translateY(100px) scale(0.8); 
        }
        .emote-slot.active { opacity: 1; transform: translateY(0) scale(1) skewX(-5deg); }

        .img-wrap { 
            height: 180px; width: 180px; display: flex; align-items: center; justify-content: center; 
            background: var(--ui-bg); border: 6px solid #fff; 
            box-shadow: 8px 8px 0px #000; 
            position: relative; z-index: 5; transition: all 0.2s ease;
            /* Game UI Slant */
            clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 85% 100%, 0% 100%);
        }

        /* High-Fidelity Glow States */
        .rank-10 { border-color: var(--cyan) !important; box-shadow: 0 0 20px var(--cyan); }
        .rank-25 { border-color: var(--g) !important; box-shadow: 0 0 25px var(--g); }
        .rank-50 { border-color: var(--red) !important; box-shadow: 0 0 30px var(--red); }
        .rank-100 { border-color: var(--magenta) !important; box-shadow: 0 0 40px var(--magenta); filter: brightness(1.2); }

        .count { 
            font-size: 90px; font-weight: 900; position: relative; z-index: 10;
            color: #fff; text-shadow: 6px 6px 0px #000;
            letter-spacing: -4px; margin-top: -20px;
            font-style: italic;
        }

        .riser {
            position: absolute; font-weight: 900; font-size: 48px; color: #fff;
            text-shadow: 4px 4px 0 #000; pointer-events: none; z-index: 100;
            animation: riseAndFade 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        
        .riser.milestone { font-size: 72px; text-shadow: 0 0 20px currentColor; z-index: 110; }

        @keyframes riseAndFade {
            0% { transform: translateY(0) scale(0.5) rotate(-10deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-180px) scale(1.5) rotate(5deg); opacity: 0; }
        }

        .flash { animation: hardFlash 0.4s ease-out forwards; }
        @keyframes hardFlash {
            0% { filter: brightness(10); transform: scale(1.1); }
            100% { filter: brightness(1); transform: scale(1); }
        }

        .emote-img { max-height: 140px; max-width: 140px; object-fit: contain; }
        .pop { animation: hitPop 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.5); }
        @keyframes hitPop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        #control { position: absolute; top: 0; right: 0; width: 340px; height: 100vh; background: #0a0a0a; border-left: 4px solid var(--p); padding: 30px; z-index: 200; transform: translateX(100%); transition: 0.3s; box-sizing: border-box; }
        #control.active { transform: translateX(0); }
        input { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 12px; margin-top: 5px; font-weight: bold; }
        #m-toggle { position: absolute; top: 10px; right: 10px; background: var(--p); border: none; color: white; width: 45px; height: 45px; cursor: pointer; font-weight: 900; z-index: 210; border-radius: 4px; }
    </style>
</head>
<body>

<div id="leaderboard">
    <div id="slot-0" class="emote-slot"><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-1" class="emote-slot"><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-2" class="emote-slot"><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-3" class="emote-slot"><div class="img-wrap"></div><div class="count">0</div></div>
</div>

<button id="m-toggle" onclick="document.getElementById('control').classList.toggle('active')">☰</button>

<div id="control">
    <input type="text" id="inp-ch" placeholder="Username">
    <input type="text" id="inp-7id" placeholder="7TV ID (Optional)">
    <button style="width:100%; padding:20px; background:var(--p); color:white; border:none; cursor:pointer; font-weight:900; margin-top: 25px;" onclick="reboot()">BOOT ENGINE</button>
</div>

<script>
    let emoteMap = {};
    let emoteCounts = {};
    let lastMilestone = [0, 0, 0, 0]; 
    let client = null;
    let mainLoop = null;

    const rankNames = { 10: "COMBO", 25: "GREAT", 50: "ULTRA", 100: "GODLIKE", 200: "MUGI MODE" };

    function spawnRiser(slot, milestoneValue = null) {
        const riser = document.createElement('div');
        riser.className = 'riser';
        if (milestoneValue) {
            riser.innerText = rankNames[milestoneValue] || "COMBO";
            riser.classList.add('milestone');
            riser.style.left = '0'; riser.style.width = '100%'; riser.style.textAlign = 'center';
            if(milestoneValue >= 100) riser.style.color = 'var(--magenta)';
            else if(milestoneValue >= 50) riser.style.color = 'var(--red)';
            else if(milestoneValue >= 25) riser.style.color = 'var(--g)';
            else riser.style.color = 'var(--cyan)';
        } else {
            riser.innerText = '+1';
            riser.style.left = (Math.random() * 40 + 30) + '%'; 
            riser.style.color = '#fff';
        }
        slot.appendChild(riser);
        riser.addEventListener('animationend', () => riser.remove());
    }

    async function loadAssets(userId, channel) {
        emoteMap = {};
        fetch('https://7tv.io/v3/emote-sets/global').then(r => r.json()).then(g => {
            g.emotes?.forEach(e => { emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/4x.webp`; });
        });
        try {
            const twRes = await fetch(`https://api.ivr.fi/v2/twitch/user?login=${channel}`);
            const twData = await twRes.json();
            const tId = twData[0]?.id;
            if(tId) {
                fetch(`https://api.betterttv.net/3/cached/users/twitch/${tId}`).then(r => r.json()).then(d => {
                    [...(d.channelEmotes||[]), ...(d.sharedEmotes||[])].forEach(e => { emoteMap[e.code] = `https://cdn.betterttv.net/emote/${e.id}/3x`; });
                });
            }
            if(userId) {
                fetch(`https://7tv.io/v3/users/${userId}`).then(r => r.json()).then(async d => {
                    const setId = d.emote_set?.id || d.connections?.find(c => c.platform === 'TWITCH')?.emote_set?.id;
                    if(setId) {
                        const sRes = await fetch(`https://7tv.io/v3/emote-sets/${setId}`);
                        const sData = await sRes.json();
                        sData.emotes?.forEach(e => { emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/4x.webp`; });
                    }
                });
            }
        } catch(e) { console.error("Asset Load Error:", e); }
    }

    function reboot() {
        const CH = document.getElementById('inp-ch').value.trim().toLowerCase();
        const ID7 = document.getElementById('inp-7id').value.trim();
        if(!CH) return;
        
        loadAssets(ID7, CH);
        if(client) { client.removeAllListeners(); client.disconnect(); }
        if(mainLoop) clearInterval(mainLoop);
        emoteCounts = {}; lastMilestone = [0, 0, 0, 0];
        
        // 60FPS Decay for smooth number "draining"
        mainLoop = setInterval(() => {
            if (Object.keys(emoteCounts).length === 0) return;
            Object.keys(emoteCounts).forEach(k => { 
                emoteCounts[k] *= 0.997; // Exponential decay
                if(emoteCounts[k] <= 0.5) delete emoteCounts[k]; 
            });
            updateLeaderboard(null);
        }, 16);

        client = new tmi.Client({ channels: [CH] });
        client.on('message', (chan, tags, msg) => {
            let uniqueFound = [...new Set(msg.split(' ').filter(w => emoteMap[w]))];
            uniqueFound.forEach(e => { emoteCounts[e] = (emoteCounts[e] || 0) + 1; updateLeaderboard(e); });
        });
        client.connect();
    }

    function updateLeaderboard(trig) {
        const sorted = Object.entries(emoteCounts).sort((a,b) => b[1]-a[1]).slice(0,4);
        const milestoneCheck = [10, 25, 50, 100, 200];

        for(let i=0; i<4; i++){
            const slot = document.getElementById(`slot-${i}`);
            const wrap = slot.querySelector('.img-wrap');
            const countEl = slot.querySelector('.count');
            
            if(sorted[i]){
                const [n, c] = sorted[i];
                const roundedC = Math.ceil(c);
                if(wrap.getAttribute('data-name') !== n){
                    wrap.innerHTML = `<img src="${emoteMap[n]}" class="emote-img">`;
                    wrap.setAttribute('data-name', n);
                    wrap.className = 'img-wrap'; // Reset rank classes
                    lastMilestone[i] = 0; 
                }
                countEl.innerText = roundedC;
                slot.classList.add('active');

                if(trig === n) {
                    wrap.classList.remove('pop'); void wrap.offsetWidth; wrap.classList.add('pop');
                    const currentM = milestoneCheck.filter(m => roundedC >= m).pop() || 0;
                    if(currentM > lastMilestone[i]) {
                        spawnRiser(slot, currentM);
                        wrap.className = `img-wrap rank-${currentM} flash`;
                        setTimeout(() => wrap.classList.remove('flash'), 1000);
                        lastMilestone[i] = currentM;
                    } else { spawnRiser(slot); }
                }
            } else { 
                slot.classList.remove('active'); 
                lastMilestone[i] = 0; 
                wrap.setAttribute('data-name', '');
            }
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Mugi Master Scoreboard</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        body { 
            background: #00ff00; 
            margin: 0; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            height: 100vh;
            width: 100vw;
        }

        #renderCanvas {
            width: 100%;
            height: auto;
            transform: skewX(-5deg);
            image-rendering: auto;
        }

        /* Remote UI */
        #controls { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; border: 6px solid #000; border-radius: 35px; 
            padding: 20px; text-align: center; box-shadow: 0 12px 0 #333; 
            z-index: 9999; font-family: sans-serif; display: none; 
        }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        button { padding: 10px 25px; font-size: 20px; cursor: pointer; font-weight: bold; border-radius: 15px; border: 3px solid #000; transition: 0.1s; }
        .plus { background: #43B047; color: white; }
        .minus { background: #FBD000; color: black; }
    </style>
</head>
<body>

    <canvas id="renderCanvas"></canvas>

    <div id="controls">
        <div style="font-weight: bold;">SAKURA REMOTE</div>
        <div class="btn-group">
            <button class="minus" onclick="changeCount(-1)">-</button>
            <button class="plus" onclick="changeCount(1)">+</button>
        </div>
        <button onclick="resetCount()" style="margin-top:10px; font-size:12px; width:100%;">RESET SAKURA</button>
    </div>

    <script>
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        const COUNTER_ID = 'mugi-sakura-counter-2026'; 
        const isController = window.location.hash.includes('control');
        if (isController) document.getElementById('controls').style.display = 'block';

        let sakuraCount = localStorage.getItem('sakura_count') ? parseInt(localStorage.getItem('sakura_count')) : 0;
        let scoreValue = "160218"; // Change this to your actual high score
        
        let sakuraScale = 1;
        let sakuraFlash = null;

        const fontBig = 'italic 260px "Luckiest Guy"';
        const fontSmall = 'italic 160px "Luckiest Guy"';

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
            draw();
        }
        window.addEventListener('resize', resize);

        function drawChonkText(text, x, y, sizeType, flash) {
            ctx.font = sizeType === 'big' ? fontBig : fontSmall;
            ctx.lineJoin = "round";
            ctx.lineWidth = 18;
            
            // 1. Black Outline + 3D Shadow
            ctx.strokeStyle = "black";
            ctx.strokeText(text, x + 18, y + 18);
            ctx.strokeText(text, x, y);

            // 2. Gradient Fill
            const grad = ctx.createLinearGradient(x, y - 130, x, y + 50);
            grad.addColorStop(0.2, "#FFFFFF");
            grad.addColorStop(0.85, "#A0A0A0");

            ctx.fillStyle = "black";
            ctx.fillText(text, x + 18, y + 18); // Shadow fill
            
            ctx.fillStyle = flash ? flash : grad;
            ctx.fillText(text, x, y);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const marginX = 80;
            
            // --- DRAW TOP SCOREBOARD ---
            // Positioned at the top
            drawChonkText(scoreValue, marginX, 220, 'big', null);

            // --- DRAW SAKURA COUNTER ---
            // Positioned below the scoreboard
            const sakuraY = 500;
            
            // Emoji (No shadow/jagged edges)
            ctx.font = "160px serif";
            ctx.textBaseline = "middle";
            ctx.fillText("🌸", marginX, sakuraY - 15);

            ctx.save();
            ctx.translate(marginX + 200, sakuraY);
            ctx.scale(sakuraScale, sakuraScale);
            ctx.translate(-(marginX + 200), -sakuraY);

            drawChonkText("x", marginX + 180, sakuraY + 15, 'small', sakuraFlash);
            drawChonkText(sakuraCount.toString(), marginX + 290, sakuraY + 15, 'big', sakuraFlash);

            ctx.restore();
        }

        function triggerPop() {
            let start = null;
            const duration = 250;
            function animate(timestamp) {
                if (!start) start = timestamp;
                let progress = timestamp - start;
                let p = progress / duration;
                if (p < 0.3) {
                    sakuraScale = 1 + (p / 0.3) * 0.12;
                    sakuraFlash = "#ccff00"; 
                } else if (p < 1) {
                    sakuraScale = 1.12 - ((p - 0.3) / 0.7) * 0.12;
                    sakuraFlash = null;
                } else {
                    sakuraScale = 1;
                    sakuraFlash = null;
                }
                draw();
                if (progress < duration) requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
        }

        document.fonts.load(fontBig).then(resize);

        // PeerJS Logic
        const peer = new Peer(isController ? null : COUNTER_ID);
        peer.on('open', () => { if (isController) connectToPeer(); });
        peer.on('connection', (c) => {
            c.on('data', (data) => {
                if (data.action === 'update') { sakuraCount = data.val; triggerPop(); }
                if (data.action === 'reset') { sakuraCount = 0; draw(); }
            });
        });

        function connectToPeer() {
            const conn = peer.connect(COUNTER_ID);
            conn.on('open', () => { /* connection ready */ });
        }

        function changeCount(delta) {
            sakuraCount += delta;
            localStorage.setItem('sakura_count', sakuraCount);
            triggerPop();
            if (peer.connections[COUNTER_ID]) peer.connections[COUNTER_ID][0].send({ action: 'update', val: sakuraCount });
        }

        function resetCount() {
            sakuraCount = 0;
            localStorage.setItem('sakura_count', 0);
            draw();
            if (peer.connections[COUNTER_ID]) peer.connections[COUNTER_ID][0].send({ action: 'reset' });
        }
    </script>
</body>
</html>

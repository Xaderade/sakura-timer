<!DOCTYPE html>
<html>
<head>
    <title>Mugi Party - Ordinal Top 5 (Show/Hide Fix)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        body { 
            background: #00ff00; 
            font-family: 'Luckiest Guy', sans-serif; 
            margin: 0; padding: 40px;
            overflow: hidden; 
        }

        /* --- OVERLAY VISIBILITY --- */
        #leaderboard-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 980px;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .hidden { opacity: 0 !important; transform: translateY(-20px); pointer-events: none; }

        .smooth-outline {
            filter: url(#crispOutline);
            paint-order: stroke fill;
        }

        @keyframes slideInLeft {
            0% { transform: translateX(-1200px) skewX(-5deg); opacity: 0; }
            70% { transform: translateX(30px) skewX(-5deg); opacity: 1; }
            100% { transform: translateX(0) skewX(-5deg); opacity: 1; }
        }

        .leader-row {
            display: flex;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.75); 
            border-radius: 70px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 52px;
            font-style: italic;
            transform: skewX(-5deg);
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            animation: slideInLeft 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .rank {
            width: 160px;
            font-size: 65px;
            text-align: center;
            margin-right: 25px;
            display: flex;
            align-items: baseline;
            justify-content: center;
        }

        .rank-suffix { font-size: 0.5em; margin-left: 2px; text-transform: uppercase; }

        .rank-standard .rank { color: white; }
        .rank-1 .rank { color: #FFD700; }
        .rank-2 .rank { color: #C0C0C0; }
        .rank-3 .rank { color: #CD7F32; }

        .name {
            flex-grow: 1;
            text-transform: uppercase;
            letter-spacing: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .score { font-size: 75px; min-width: 160px; text-align: right; color: #FFF; }

        /* --- CONTROL PANEL --- */
        #controls { 
            position: fixed; top: 20px; right: 20px; background: white; 
            border: 6px solid black; border-radius: 20px; padding: 20px; 
            z-index: 100; font-family: sans-serif; width: 320px; display: none;
            box-shadow: 0 10px 0 #333;
        }
        input { width: 92%; padding: 12px; margin-bottom: 12px; border: 3px solid #000; border-radius: 10px; font-weight: bold; }
        button { width: 100%; padding: 12px; cursor: pointer; font-weight: bold; border: 3px solid #000; border-radius: 12px; margin-top: 5px; text-transform: uppercase; }
        .update-btn { background: #43B047; color: white; }
        .toggle-btn { background: #2196F3; color: white; margin-bottom: 10px; }
        .reset-btn { background: #E52521; color: white; margin-top: 15px; }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position: absolute;">
      <defs>
        <filter id="crispOutline" x="-50%" y="-50%" width="200%" height="200%">
          <feMorphology in="SourceAlpha" result="dilated" operator="dilate" radius="4"/>
          <feOffset in="dilated" dx="6" dy="6" result="offsetShadow"/>
          <feFlood flood-color="black" result="blackColor"/>
          <feComposite in="blackColor" in2="offsetShadow" operator="in" result="shadowLayer"/>
          <feComposite in="blackColor" in2="dilated" operator="in" result="outlineLayer"/>
          <feMerge>
            <feMergeNode in="shadowLayer"/>
            <feMergeNode in="outlineLayer"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
    </svg>

    <div id="leaderboard-container"></div>

    <div id="controls">
        <h3 style="margin-top:0; text-align: center;">ORDINAL REMOTE</h3>
        
        <button class="toggle-btn" onclick="toggleVisibility()">👁 SHOW / HIDE OVERLAY</button>

        <input type="text" id="new-name" placeholder="PLAYER NAME">
        <input type="number" id="new-score" placeholder="SCORE" step="0.1">
        <button class="update-btn" onclick="sendEntry()">UPDATE RANKINGS</button>
        
        <button class="reset-btn" onclick="clearBoard()">RESET ALL</button>
        <div id="conn-status" style="font-size:12px; margin-top:10px; text-align: center; font-weight: bold;">Connecting...</div>
    </div>

    <script>
        const PARTY_ID = 'mugi-ordinal-top5-2026';
        const isController = window.location.hash.includes('control');
        if (isController) document.getElementById('controls').style.display = 'block';

        let leaderboardData = JSON.parse(localStorage.getItem('mugi_ordinal_data')) || [];
        let currentDisplayedTop5 = []; 
        let conn;

        const peer = new Peer(isController ? null : PARTY_ID);
        
        peer.on('open', () => { 
            if (isController) connect(); 
        });

        peer.on('connection', (c) => { 
            conn = c; 
            conn.on('data', (data) => {
                if(data.action === 'update') {
                    leaderboardData = data.data;
                    renderBoard();
                }
                if(data.action === 'toggle') {
                    executeToggle();
                }
            });
        });

        function connect() {
            conn = peer.connect(PARTY_ID);
            conn.on('open', () => { 
                document.getElementById('conn-status').innerText = "STATUS: CONNECTED"; 
            });
        }

        function getOrdinal(n) {
            let s = ["th", "st", "nd", "rd"], v = n % 100;
            return s[(v - 20) % 10] || s[v] || s[0];
        }

        function renderBoard() {
            localStorage.setItem('mugi_ordinal_data', JSON.stringify(leaderboardData));
            const sortedData = [...leaderboardData].sort((a, b) => b.score - a.score);
            const newTop5 = sortedData.slice(0, 5);

            if (JSON.stringify(newTop5) !== JSON.stringify(currentDisplayedTop5)) {
                const container = document.getElementById('leaderboard-container');
                container.innerHTML = '';
                
                newTop5.forEach((entry, index) => {
                    const rankNum = index + 1;
                    const suffix = getOrdinal(rankNum);
                    let rankClass = (rankNum <= 3) ? `rank-${rankNum}` : 'rank-standard';

                    const row = document.createElement('div');
                    row.className = `leader-row ${rankClass}`;
                    row.style.animationDelay = `${index * 0.08}s`;
                    row.innerHTML = `
                        <span class="rank smooth-outline">${rankNum}<span class="rank-suffix">${suffix}</span></span>
                        <span class="name smooth-outline">${entry.name}</span>
                        <span class="score smooth-outline">${parseFloat(entry.score).toFixed(1)}</span>
                    `;
                    container.appendChild(row);
                });
                currentDisplayedTop5 = newTop5; 
            }
        }

        // --- VISIBILITY LOGIC ---
        function toggleVisibility() {
            if (conn && conn.open) conn.send({ action: 'toggle' });
            executeToggle();
        }

        function executeToggle() {
            document.getElementById('leaderboard-container').classList.toggle('hidden');
        }

        // --- ENTRY LOGIC ---
        function sendEntry() {
            const name = document.getElementById('new-name').value.trim();
            const score = parseFloat(document.getElementById('new-score').value);
            if (!name || isNaN(score)) return;

            const existing = leaderboardData.find(e => e.name.toLowerCase() === name.toLowerCase());
            if (existing) {
                existing.score = score;
            } else {
                leaderboardData.push({ name, score });
            }

            renderBoard();
            if (conn && conn.open) conn.send({ action: 'update', data: leaderboardData });
        }

        function clearBoard() {
            if(confirm("Reset everything?")) {
                leaderboardData = [];
                currentDisplayedTop5 = [];
                document.getElementById('leaderboard-container').innerHTML = '';
                localStorage.setItem('mugi_ordinal_data', "[]");
                if (conn && conn.open) conn.send({ action: 'update', data: [] });
            }
        }

        renderBoard();
    </script>
</body>
</html>

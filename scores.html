<!DOCTYPE html>
<html>
<head>
    <title>Mugi Party - Ordinal Top 5</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        body { 
            background: #00ff00; 
            font-family: 'Luckiest Guy', sans-serif; 
            margin: 0; padding: 40px;
            overflow: hidden; 
        }

        #leaderboard-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 980px; /* Widened slightly for suffixes */
        }

        @keyframes slideInLeft {
            0% { transform: translateX(-1200px) skewX(-5deg); opacity: 0; }
            70% { transform: translateX(30px) skewX(-5deg); opacity: 1; }
            100% { transform: translateX(0) skewX(-5deg); opacity: 1; }
        }

        .leader-row {
            display: flex;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.75); 
            border-radius: 70px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 52px;
            font-style: italic;
            transform: skewX(-5deg);
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            animation: slideInLeft 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .rank {
            width: 160px; /* More space for "1st", "2nd" */
            font-size: 65px;
            text-align: center;
            margin-right: 25px;
            paint-order: stroke fill;
            filter: drop-shadow(6px 6px 0px rgba(0,0,0,0.8));
            display: flex;
            align-items: baseline;
            justify-content: center;
        }

        /* Smaller styling for the suffix (st, nd, rd) */
        .rank-suffix {
            font-size: 0.5em;
            margin-left: 2px;
            text-transform: uppercase;
        }

        .rank-standard .rank { -webkit-text-stroke: 5px black; }
        .rank-1 .rank { color: #FFD700; -webkit-text-stroke: 5px #986C00; }
        .rank-2 .rank { color: #C0C0C0; -webkit-text-stroke: 5px #555555; }
        .rank-3 .rank { color: #CD7F32; -webkit-text-stroke: 5px #603000; }

        .name {
            flex-grow: 1;
            text-transform: uppercase;
            letter-spacing: 3px;
            -webkit-text-stroke: 4px black;
            paint-order: stroke fill;
            filter: drop-shadow(5px 5px 0px rgba(0,0,0,0.8));
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .score {
            font-size: 75px;
            min-width: 160px;
            text-align: right;
            color: #FFF;
            -webkit-text-stroke: 10px #986C00;
            paint-order: stroke fill;
        }

        #controls { 
            position: fixed; top: 20px; right: 20px; background: white; 
            border: 5px solid black; border-radius: 20px; padding: 20px; 
            z-index: 100; font-family: sans-serif; width: 300px; display: none;
        }
        input { width: 92%; padding: 12px; margin-bottom: 12px; border: 3px solid #000; border-radius: 10px; font-weight: bold; }
        button { width: 100%; padding: 12px; cursor: pointer; font-weight: bold; background: #43B047; color: white; border: 3px solid #000; border-radius: 12px; }
    </style>
</head>
<body>

    <div id="leaderboard-container"></div>

    <div id="controls">
        <h3 style="margin-top:0">ORDINAL REMOTE</h3>
        <input type="text" id="new-name" placeholder="PLAYER NAME">
        <input type="number" id="new-score" placeholder="SCORE" step="0.1">
        <button onclick="sendEntry()">UPDATE RANKINGS</button>
        <button onclick="clearBoard()" style="background:#E52521; margin-top:10px;">RESET ALL</button>
        <div id="conn-status" style="font-size:12px; margin-top:10px;">Connecting...</div>
    </div>

    <script>
        const PARTY_ID = 'mugi-ordinal-top5-2026';
        const isController = window.location.hash.includes('control');
        if (isController) document.getElementById('controls').style.display = 'block';

        let leaderboardData = JSON.parse(localStorage.getItem('mugi_ordinal_data')) || [];
        let currentDisplayedTop5 = []; 
        let conn;

        const peer = new Peer(isController ? null : PARTY_ID);
        peer.on('open', () => { if (isController) connect(); });
        peer.on('connection', (c) => { 
            conn = c; 
            conn.on('data', (data) => {
                if(data.action === 'update') {
                    leaderboardData = data.data;
                    renderBoard();
                }
            });
        });

        function connect() {
            conn = peer.connect(PARTY_ID);
            conn.on('open', () => { document.getElementById('conn-status').innerText = "STATUS: CONNECTED"; });
        }

        // Helper function for 1st, 2nd, 3rd, etc.
        function getOrdinal(n) {
            let s = ["th", "st", "nd", "rd"],
                v = n % 100;
            return s[(v - 20) % 10] || s[v] || s[0];
        }

        function renderBoard() {
            localStorage.setItem('mugi_ordinal_data', JSON.stringify(leaderboardData));
            
            const sortedData = [...leaderboardData].sort((a, b) => b.score - a.score);
            const newTop5 = sortedData.slice(0, 5);

            const newTop5Key = JSON.stringify(newTop5);
            const currentTop5Key = JSON.stringify(currentDisplayedTop5);

            if (newTop5Key !== currentTop5Key) {
                const container = document.getElementById('leaderboard-container');
                container.innerHTML = '';
                
                newTop5.forEach((entry, index) => {
                    const rankNum = index + 1;
                    const suffix = getOrdinal(rankNum);
                    let rankClass = (rankNum <= 3) ? `rank-${rankNum}` : 'rank-standard';

                    const row = document.createElement('div');
                    row.className = `leader-row ${rankClass}`;
                    row.style.animationDelay = `${index * 0.08}s`;
                    row.innerHTML = `
                        <span class="rank">${rankNum}<span class="rank-suffix">${suffix}</span></span>
                        <span class="name">${entry.name}</span>
                        <span class="score">${parseFloat(entry.score).toFixed(1)}</span>
                    `;
                    container.appendChild(row);
                });
                
                currentDisplayedTop5 = newTop5; 
            }
        }

        function sendEntry() {
            const name = document.getElementById('new-name').value.trim();
            const score = parseFloat(document.getElementById('new-score').value);
            if (!name || isNaN(score)) return;

            const existing = leaderboardData.find(e => e.name.toLowerCase() === name.toLowerCase());
            if (existing) {
                existing.score = score;
            } else {
                leaderboardData.push({ name, score });
            }

            renderBoard();
            if (conn && conn.open) conn.send({ action: 'update', data: leaderboardData });
        }

        function clearBoard() {
            if(confirm("Reset everything?")) {
                leaderboardData = [];
                currentDisplayedTop5 = [];
                document.getElementById('leaderboard-container').innerHTML = '';
                localStorage.setItem('mugi_ordinal_data', "[]");
                if (conn && conn.open) conn.send({ action: 'update', data: [] });
            }
        }

        renderBoard();
    </script>
</body>
</html>

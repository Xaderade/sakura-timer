<!DOCTYPE html>
<html>
<head>
    <title>Mugi Chat - Twitch Style</title>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* TWITCH FONT STACK */
        body { 
            background: transparent; 
            margin: 0; 
            padding: 20px; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            font-family: "Inter", "Roobert", "Helvetica Neue", Helvetica, Arial, sans-serif; 
            font-weight: 600;
        }

        #chat-container { 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end;
            width: 100%; 
            max-width: 800px;
            transition: all 0.3s ease;
        }

        .message-row { 
            display: flex; 
            align-items: flex-start; 
            animation: slideUp 0.2s ease-out; 
            padding: 4px 10px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.5); /* Semi-dark background for readability */
            margin-bottom: 4px;
            width: fit-content;
        }

        .user-name { 
            font-size: 20px; 
            margin-right: 8px; 
            white-space: nowrap; 
            flex-shrink: 0;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.8);
        }

        .message-content { 
            color: #efeff1; 
            font-size: 19px; 
            display: flex; 
            flex-wrap: wrap; 
            align-items: center; 
            gap: 4px; 
            line-height: 1.5;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.8);
        }

        .chat-emote { 
            height: 28px; /* Matches text height better */
            vertical-align: middle; 
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .fade-out { animation: fadeOut 0.5s ease-in forwards; }
        @keyframes fadeOut { to { opacity: 0; transform: scale(0.95); } }

        /* CONTROLLER UI */
        #controls { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .control-box { background: #fff; color: #000; border: 4px solid #9146ff; padding: 25px; border-radius: 15px; width: 320px; font-family: sans-serif; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #9146FF; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="chat-container"></div>

    <div id="controls">
        <div class="control-box">
            <h2 style="margin:0; text-align:center; color:#9146ff;">CHAT CONTROL</h2>
            <input type="text" id="channel-input" placeholder="Twitch Channel">
            <button onclick="manualConnect()">CONNECT</button>
            <p id="status" style="font-size: 11px; text-align: center; margin-top: 10px;">STANDBY</p>
        </div>
    </div>

    <script>
        const CHAT_ID = 'mugi-chat-2026';
        const container = document.getElementById('chat-container');
        const isController = window.location.hash.includes('control');
        let thirdPartyEmotes = {};

        if(isController) { document.getElementById('controls').style.display = 'flex'; }

        const peer = new Peer(isController ? null : CHAT_ID);
        let conn;

        peer.on('open', () => {
            if (isController) {
                conn = peer.connect(CHAT_ID);
                conn.on('open', () => { document.getElementById('status').innerText = "CONNECTED TO OBS"; });
            }
        });

        peer.on('connection', (c) => {
            conn = c;
            conn.on('data', (d) => {
                if(d.action === 'sync_chan') { loadThirdPartyEmotes(d.chan); ComfyJS.Init(d.chan); }
            });
        });

        async function manualConnect() {
            const chan = document.getElementById('channel-input').value.trim();
            if(!chan) return;
            loadThirdPartyEmotes(chan);
            ComfyJS.Init(chan);
            if(conn) conn.send({ action: 'sync_chan', chan: chan });
            document.getElementById('status').innerText = `ACTIVE: ${chan}`;
        }

        async function loadThirdPartyEmotes(channel) {
            thirdPartyEmotes = {}; 
            try {
                const userRes = await fetch(`https://api.frankerfacez.com/v1/room/${channel}`);
                const userData = await userRes.json();
                const twitchId = userData.room.twitch_id;

                // BTTV
                const bttvG = await fetch('https://api.betterttv.net/3/cached/emotes/global');
                (await bttvG.json()).forEach(e => thirdPartyEmotes[e.code] = `https://cdn.betterttv.net/emote/${e.id}/2x`);
                const bttvC = await fetch(`https://api.betterttv.net/3/cached/users/twitch/${twitchId}`);
                const bttvD = await bttvC.json();
                [...(bttvD.channelEmotes || []), ...(bttvD.sharedEmotes || [])].forEach(e => thirdPartyEmotes[e.code] = `https://cdn.betterttv.net/emote/${e.id}/2x`);

                // 7TV
                const stvRes = await fetch(`https://7tv.io/v3/users/twitch/${twitchId}`);
                const stvData = await stvRes.json();
                if(stvData.emote_set) {
                    stvData.emote_set.emotes.forEach(e => {
                        thirdPartyEmotes[e.name] = `https://cdn.7tv.app/emote/${e.id}/2x.webp`;
                    });
                }
            } catch (err) { console.log("Emote API skip or error."); }
        }

        ComfyJS.onChat = (user, message, flags, self, extra) => {
            const row = document.createElement('div');
            row.className = 'message-row';

            const userSpan = document.createElement('span');
            userSpan.className = 'user-name';
            // PULLS TWITCH USER COLOR
            userSpan.style.color = extra.userColor || '#FFD700'; 
            userSpan.innerText = `${user}:`;

            const contentSpan = document.createElement('span');
            contentSpan.className = 'message-content';

            // EMOTE RENDERING FIX
            const words = message.split(' ');
            const nodes = words.map(word => {
                // Check 1: Twitch Native Emotes
                if (extra.emotes) {
                    for (let id in extra.emotes) {
                        for (let range of extra.emotes[id]) {
                            let [start, end] = range.split('-').map(Number);
                            if (message.substring(start, end + 1) === word) {
                                return `<img class="chat-emote" src="https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/2.0">`;
                            }
                        }
                    }
                }
                // Check 2: 3rd Party
                if (thirdPartyEmotes[word]) return `<img class="chat-emote" src="${thirdPartyEmotes[word]}">`;
                return word;
            });

            contentSpan.innerHTML = nodes.join(' ');
            row.appendChild(userSpan);
            row.appendChild(contentSpan);
            container.appendChild(row);

            setTimeout(() => {
                row.classList.add('fade-out');
                setTimeout(() => row.remove(), 500);
            }, 10000);

            if (container.children.length > 15) container.removeChild(container.firstChild);
        };
    </script>
</body>
</html>

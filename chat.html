<!DOCTYPE html>
<html>
<head>
    <title>Mugi Chat - v3.4</title>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: transparent; margin: 0; padding: 20px; overflow: hidden; height: 100vh; font-family: "Inter", sans-serif; font-weight: 800; }
        #chat-viewport { position: absolute; bottom: 40px; left: 20px; width: 100%; max-width: 800px; height: 800px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; }
        #chat-container { display: flex; flex-direction: column; gap: 4px; transition: transform 0.3s cubic-bezier(0.2, 0, 0.1, 1); }
        .message-row { display: flex; align-items: flex-start; padding: 2px 0; background: transparent; width: fit-content; animation: fadeIn 0.4s ease-out forwards; }
        
        /* SHARP BADGES */
        .badges-wrapper { display: flex; align-items: center; gap: 4px; margin-right: 8px; margin-top: 6px; flex-shrink: 0; }
        .badge-icon { width: 20px; height: 20px; display: inline-block; filter: drop-shadow(1px 1px 0px black); }

        .user-name, .message-content { 
            font-size: 24px; line-height: 1.2; 
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000; 
        }
        .user-name { margin-right: 8px; white-space: nowrap; }
        .message-content { color: #ffffff; display: inline; vertical-align: middle; }
        .chat-emote { height: 32px; vertical-align: middle; margin: -2px 2px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }

        /* CONTROLLER UI */
        #controls { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .control-box { background: #1a1a1a; border: 2px solid #9146ff; padding: 30px; border-radius: 12px; width: 340px; position: relative; font-family: sans-serif; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #9146FF; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #debug-log { margin-top: 15px; font-family: monospace; font-size: 10px; color: #888; height: 80px; overflow-y: auto; background: #000; padding: 5px; width: 100%; }
        #version-tag { position: absolute; bottom: 8px; right: 12px; font-size: 10px; color: #444; }
    </style>
</head>
<body>
    <div id="chat-viewport"><div id="chat-container"></div></div>
    <div id="controls">
        <div class="control-box">
            <h2 style="margin:0; text-align:center; color:#9146ff;">MUGI CHAT</h2>
            <input type="text" id="channel-input" placeholder="Twitch Username">
            <button onclick="manualConnect()">GO LIVE</button>
            <p id="status" style="font-size: 12px; text-align: center; margin-top: 12px;">SYSTEM READY</p>
            <div id="debug-log">V3.4 Active...</div>
            <div id="version-tag">v3.4</div>
        </div>
    </div>

    <script>
        const CHAT_ID = 'mugi-chat-2026';
        const container = document.getElementById('chat-container');
        const isController = window.location.hash.includes('control');
        let thirdPartyEmotes = {};
        let badgeData = {};
        let activeChan = "";

        function log(msg) {
            const d = document.getElementById('debug-log');
            if(d) { d.innerHTML += `<div>> ${msg}</div>`; d.scrollTop = d.scrollHeight; }
        }

        if(isController) document.getElementById('controls').style.display = 'flex';
        const peer = new Peer(isController ? null : CHAT_ID);
        let conn;

        peer.on('open', () => { if (isController) setupController(); });

        function setupController() {
            conn = peer.connect(CHAT_ID);
            conn.on('open', () => {
                document.getElementById('status').innerText = "LINKED TO OBS";
                setInterval(() => { if(activeChan && conn.open) conn.send({ action: 'sync', chan: activeChan }); }, 5000);
            });
        }

        peer.on('connection', (c) => {
            conn = c;
            conn.on('data', (d) => {
                if(d.action === 'sync' && activeChan !== d.chan) {
                    activeChan = d.chan;
                    initChat(d.chan);
                }
            });
        });

        async function manualConnect() {
            activeChan = document.getElementById('channel-input').value.trim().toLowerCase();
            if(!activeChan) return;
            initChat(activeChan);
            document.getElementById('status').innerText = `LIVE: ${activeChan}`;
        }

        async function initChat(channel) {
            log(`Joining: ${channel}`);
            await fetchBadges(channel);
            await load3rdParty(channel);
            ComfyJS.Init(channel);
        }

        async function fetchBadges(channel) {
            try {
                // We fetch the channel's specific badge set to get live URLs
                const res = await fetch(`https://api.frankerfacez.com/v1/room/${channel}`);
                const data = await res.json();
                const tID = data.room.twitch_id;
                
                // Get Global + Channel Badges from Twitch API via FFZ proxy
                const bRes = await fetch(`https://api.frankerfacez.com/v1/badges/twitch/${tID}`);
                const bData = await bRes.json();
                badgeData = bData; // Store the URL mapping
                log("Badge URLs Synced.");
            } catch (e) { log("Badge Sync Failed."); }
        }

        async function load3rdParty(channel) {
            try {
                const res = await fetch(`https://api.frankerfacez.com/v1/room/${channel}`);
                const data = await res.json();
                const tID = data.room.twitch_id;
                fetch(`https://api.betterttv.net/3/cached/users/twitch/${tID}`).then(r=>r.json()).then(d=>[...(d.channelEmotes||[]),...(d.sharedEmotes||[])].forEach(e=>thirdPartyEmotes[e.code]=e.id));
                fetch(`https://7tv.io/v3/users/twitch/${tID}`).then(r=>r.json()).then(d=>{if(d.emote_set) d.emote_set.emotes.forEach(e=>thirdPartyEmotes[e.name]=e.id)});
            } catch (e) {}
        }

        ComfyJS.onChat = (user, message, flags, self, extra) => {
            const row = document.createElement('div');
            row.className = 'message-row';

            const badgeWrapper = document.createElement('div');
            badgeWrapper.className = 'badges-wrapper';
            
            // DYNAMIC BADGE LOADING
            if (extra.userBadges) {
                Object.keys(extra.userBadges).forEach(type => {
                    const version = extra.userBadges[type];
                    // Direct Twitch Badge URL Construction for 2026
                    // Most global/channel badges follow this pattern
                    const url = `https://static-cdn.jtvnw.net/badges/v1/${getStaticID(type, version)}/3`;
                    badgeWrapper.innerHTML += `<img class="badge-icon" src="${url}" onerror="this.style.display='none'">`;
                });
            }

            const userSpan = document.createElement('span');
            userSpan.className = 'user-name';
            userSpan.style.color = extra.userColor || '#00FF7F'; 
            userSpan.innerText = `${user}:`;

            const contentSpan = document.createElement('span');
            contentSpan.className = 'message-content';
            
            let htmlContent = message;

            // TWITCH EMOTES
            if (extra.messageEmotes) {
                Object.entries(extra.messageEmotes).forEach(([id, ranges]) => {
                    const name = message.substring(parseInt(ranges[0].split('-')[0]), parseInt(ranges[0].split('-')[1]) + 1);
                    const img = `<img class="chat-emote" src="https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/3.0">`;
                    htmlContent = htmlContent.split(name).join(img);
                });
            }

            // 3rd PARTY EMOTES
            Object.keys(thirdPartyEmotes).forEach(code => {
                const id = thirdPartyEmotes[code];
                const url = id.length > 10 ? `https://cdn.7tv.app/emote/${id}/2x.webp` : `https://cdn.betterttv.net/emote/${id}/2x`;
                htmlContent = htmlContent.split(code).join(`<img class="chat-emote" src="${url}">`);
            });

            contentSpan.innerHTML = htmlContent;
            row.appendChild(badgeWrapper);
            row.appendChild(userSpan);
            row.appendChild(contentSpan);
            container.appendChild(row);

            const rowHeight = row.offsetHeight + 4;
            container.style.transition = "none";
            container.style.transform = `translateY(${rowHeight}px)`;
            container.offsetHeight; 
            container.style.transition = "transform 0.3s cubic-bezier(0.2, 0, 0.1, 1)";
            container.style.transform = "translateY(0px)";

            setTimeout(() => { row.style.opacity = "0"; setTimeout(() => row.remove(), 500); }, 20000);
            if (container.children.length > 25) container.removeChild(container.firstChild);
        };

        function getStaticID(type, version) {
            const map = {
                'broadcaster': '5527c47c-427c-4a30-89bb-fd19ad9f010b',
                'moderator': '326785d4-da13-4d24-8182-b03d151d0a01',
                'vip': 'b817aba4-fad8-49e2-b88a-7cc744dfa6ec',
                'subscriber': '5d9f294d-44c8-4d0d-88bc-98c91d84639f', // Base sub badge
                'partner': 'd12a2e27-16f6-41d0-ab77-b78058f83199'
            };
            return map[type] || map['subscriber'];
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Mugi Chat - Integrated</title>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        
        /* OVERLAY STYLE */
        body { background: transparent; margin: 0; padding: 20px; overflow: hidden; height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; font-family: 'Luckiest Guy', sans-serif; }
        #chat-container { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 800px; }
        .message-row { display: flex; align-items: flex-start; animation: fadeIn 0.3s ease-out; text-shadow: 3px 3px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000; margin-bottom: 5px; }
        .user-name { color: #FFD700; font-size: 28px; margin-right: 12px; white-space: nowrap; flex-shrink: 0; }
        .message-content { color: white; font-size: 26px; display: flex; flex-wrap: wrap; align-items: center; gap: 6px; line-height: 1.2; }
        .chat-emote { height: 50px; vertical-align: middle; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .fade-out { animation: fadeOut 0.5s ease-in forwards; }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-20px); } }

        /* CONTROLLER UI (Hidden by default) */
        #controls { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #121212; z-index: 9999; display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .control-box { 
            background: #fff; color: #000; border: 6px solid #000; 
            padding: 25px; border-radius: 25px; width: 350px; 
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5); font-family: sans-serif;
        }
        input { width: 100%; padding: 12px; font-size: 16px; border: 3px solid #000; border-radius: 10px; box-sizing: border-box; margin: 10px 0; }
        button { width: 100%; padding: 12px; cursor: pointer; font-weight: bold; background: #9146FF; color: white; border: 3px solid #000; border-radius: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="chat-container"></div>

    <div id="controls">
        <div class="control-box">
            <h2 style="margin:0; text-align:center;">MUGI CHAT CONTROLLER</h2>
            <p style="font-size: 12px; font-weight: bold; color: #555; margin: 10px 0 0 0;">ENTER TWITCH CHANNEL</p>
            <input type="text" id="channel-input" placeholder="Channel Name">
            <button onclick="manualConnect()">CONNECT CHAT</button>
            <p id="status" style="font-size: 11px; text-align: center; margin-top: 10px; font-weight: bold;">DISCONNECTED</p>
        </div>
    </div>

    <script>
        const CHAT_ID = 'mugi-chat-2026';
        const container = document.getElementById('chat-container');
        const isController = window.location.hash.includes('control');
        let thirdPartyEmotes = {};

        // Toggle UI based on #control
        if(isController) {
            document.getElementById('controls').style.display = 'flex';
            const saved = localStorage.getItem('mugi_chan');
            if(saved) document.getElementById('channel-input').value = saved;
        }

        const peer = new Peer(isController ? null : CHAT_ID);
        let conn;

        peer.on('open', (id) => {
            if (isController) {
                conn = peer.connect(CHAT_ID);
                conn.on('open', () => {
                    document.getElementById('status').innerText = "CONNECTED TO OBS";
                    document.getElementById('status').style.color = "green";
                });
            }
        });

        peer.on('connection', (c) => {
            conn = c;
            conn.on('data', (d) => {
                if(d.action === 'sync_chan') {
                    loadThirdPartyEmotes(d.chan);
                    ComfyJS.Init(d.chan);
                }
            });
        });

        async function manualConnect() {
            const chan = document.getElementById('channel-input').value.trim();
            if(!chan) return;
            localStorage.setItem('mugi_chan', chan);
            
            // Connect this page
            loadThirdPartyEmotes(chan);
            ComfyJS.Init(chan);
            
            // Sync the OBS Overlay
            if(conn) conn.send({ action: 'sync_chan', chan: chan });
            
            document.getElementById('status').innerText = `CHAT ACTIVE: ${chan}`;
        }

        async function loadThirdPartyEmotes(channel) {
            thirdPartyEmotes = {}; 
            try {
                const userRes = await fetch(`https://api.frankerfacez.com/v1/room/${channel}`);
                const userData = await userRes.json();
                const twitchId = userData.room.twitch_id;

                // BTTV
                const bttvGlobal = await fetch('https://api.betterttv.net/3/cached/emotes/global');
                (await bttvGlobal.json()).forEach(e => thirdPartyEmotes[e.code] = `https://cdn.betterttv.net/emote/${e.id}/3x`);
                const bttvChan = await fetch(`https://api.betterttv.net/3/cached/users/twitch/${twitchId}`);
                const bttvData = await bttvChan.json();
                [...(bttvData.channelEmotes || []), ...(bttvData.sharedEmotes || [])].forEach(e => thirdPartyEmotes[e.code] = `https://cdn.betterttv.net/emote/${e.id}/3x`);

                // FFZ
                userData.sets[userData.room.set].emoticons.forEach(e => thirdPartyEmotes[e.name] = e.urls['4'] || e.urls['1']);

                // 7TV
                const stvRes = await fetch(`https://7tv.io/v3/users/twitch/${twitchId}`);
                const stvData = await stvRes.json();
                if(stvData.emote_set) {
                    stvData.emote_set.emotes.forEach(e => {
                        thirdPartyEmotes[e.name] = `https://cdn.7tv.app/emote/${e.id}/4x.webp`;
                    });
                }
            } catch (err) { console.error("Emote Load Error:", err); }
        }

        ComfyJS.onChat = (user, message, flags, self, extra) => {
            const row = document.createElement('div');
            row.className = 'message-row';
            const userSpan = document.createElement('span');
            userSpan.className = 'user-name';
            userSpan.innerText = `${user}:`;
            const contentSpan = document.createElement('span');
            contentSpan.className = 'message-content';

            const words = message.split(' ');
            const formattedNodes = words.map(word => {
                if (extra.emotes) {
                    for (const id in extra.emotes) {
                        for (const range of extra.emotes[id]) {
                            const [start, end] = range.split('-').map(Number);
                            if (message.substring(start, end + 1) === word) {
                                return `<img class="chat-emote" src="https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/3.0">`;
                            }
                        }
                    }
                }
                if (thirdPartyEmotes[word]) return `<img class="chat-emote" src="${thirdPartyEmotes[word]}">`;
                return word;
            });

            contentSpan.innerHTML = formattedNodes.join(' ');
            row.appendChild(userSpan);
            row.appendChild(contentSpan);
            container.appendChild(row);

            setTimeout(() => {
                row.classList.add('fade-out');
                setTimeout(() => row.remove(), 500);
            }, 15000);

            while (container.children.length > 12) { container.removeChild(container.firstChild); }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Mugi Rater - Final Stable</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tmi.js/1.8.5/tmi.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        body { 
            background: #00ff00; 
            font-family: 'Luckiest Guy', sans-serif; 
            margin: 0; padding: 0;
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .smooth-outline { filter: url(#crispOutline); }

        #rating-display {
            text-align: center;
            transform: skewX(-5deg);
            padding: 100px;
            overflow: visible !important;
        }

        .status-label {
            color: white; font-size: 60px; text-transform: uppercase;
            letter-spacing: 4px; margin-bottom: -10px;
        }

        .score-row {
            display: flex; align-items: baseline; justify-content: center; line-height: 1;
        }

        .score-prefix { color: white; font-size: 80px; margin-right: 20px; }

        #average-score {
            font-size: 200px; font-style: italic;
            background: linear-gradient(to bottom, #FFD700 20%, #FFA500 85%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            padding-right: 80px; min-width: 300px;
        }

        #timer-text { color: #FF4444; font-size: 110px; margin-top: 10px; }

        /* DEBUG LOG (Bottom of Overlay) */
        #debug-log {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.8); color: #00FF00;
            font-family: monospace; font-size: 12px; padding: 5px;
            display: block; z-index: 1000;
        }

        /* CONTROL PANEL (#control) */
        #controls { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; color: black; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            font-family: sans-serif;
        }
        .control-box {
            background: #f0f0f0; border: 5px solid black; padding: 30px; border-radius: 30px;
            text-align: center; width: 450px;
        }
        .status-line { font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        input { width: 50%; padding: 10px; font-size: 18px; margin-bottom: 10px; border: 3px solid black; border-radius: 10px; text-align: center; }
        button { width: 100%; padding: 15px; cursor: pointer; font-weight: bold; font-size: 20px; border: 4px solid #000; border-radius: 15px; margin-top: 10px; text-transform: uppercase; }
        .start-btn { background: #43B047; color: white; }
        .reset-btn { background: #E52521; color: white; }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position: absolute;">
      <defs>
        <filter id="crispOutline" x="-50%" y="-50%" width="200%" height="200%">
          <feMorphology in="SourceAlpha" result="dilated" operator="dilate" radius="5"/>
          <feOffset in="dilated" dx="12" dy="12" result="shadow"/>
          <feFlood flood-color="black" result="blackColor"/>
          <feComposite in="blackColor" in2="shadow" operator="in" result="shadowLayer"/>
          <feComposite in="blackColor" in2="dilated" operator="in" result="outlineLayer"/>
          <feMerge><feMergeNode in="shadowLayer"/><feMergeNode in="outlineLayer"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
    </svg>

    <div id="rating-display">
        <div id="status-msg" class="status-label smooth-outline">READY</div>
        <div class="score-row">
            <span class="score-prefix smooth-outline">SCORE:</span>
            <span id="average-score" class="smooth-outline">0.0</span>
        </div>
        <div id="timer-text" class="smooth-outline"></div>
    </div>

    <div id="debug-log">System: Initializing...</div>

    <div id="controls">
        <div class="control-box">
            <h2 style="margin:0">MUGI RATER CONTROL</h2>
            <div class="status-line">OBS Connection: <span id="peer-status" style="color:red">OFFLINE</span></div>
            <div class="status-line">Twitch Chat: <span id="twitch-status" style="color:red">OFFLINE</span></div>
            
            <label style="font-weight:bold;">VOTING TIME (SEC):</label><br>
            <input type="number" id="timer-input" value="30">
            
            <button class="start-btn" onclick="startVoting()">▶ START VOTING</button>
            <button class="reset-btn" onclick="resetAll()">✖ RESET</button>
        </div>
    </div>

    <script>
        const RATER_ID = 'mugi-rater-stable-2026';
        const TWITCH_CHANNEL = 'crazyjapanese';
        const isController = window.location.hash.includes('control');
        
        function updateLog(msg) {
            document.getElementById('debug-log').innerText = `LOG: ${msg}`;
        }

        if (isController) document.getElementById('controls').style.display = 'flex';

        let votes = {};
        let isVotingOpen = false;
        let timeLeft = 30;
        let timerInterval;

        // PeerJS Setup
        const peer = new Peer(isController ? null : RATER_ID);
        let conn;

        peer.on('open', (id) => {
            updateLog(`Peer Open: ${id}`);
            if (isController) connectToOBS();
        });

        function connectToOBS() {
            conn = peer.connect(RATER_ID);
            conn.on('open', () => {
                document.getElementById('peer-status').innerText = "ONLINE";
                document.getElementById('peer-status').style.color = "green";
                updateLog("Connected to OBS Window");
            });
        }

        peer.on('connection', (c) => {
            conn = c;
            conn.on('data', (data) => {
                if (data.action === 'start') executeStart(data.time);
                if (data.action === 'reset') executeReset();
            });
        });

        // Twitch Setup
        const client = new tmi.Client({
            connection: { secure: true, reconnect: true },
            channels: [TWITCH_CHANNEL]
        });

        client.connect().then(() => {
            updateLog("Twitch Chat Connected");
            if(isController) {
                document.getElementById('twitch-status').innerText = "ONLINE";
                document.getElementById('twitch-status').style.color = "green";
            }
        }).catch(err => updateLog(`Twitch Error: ${err}`));

        client.on('message', (channel, tags, message) => {
            if (!isVotingOpen) return;
            const score = parseFloat(message.trim());
            if (!isNaN(score) && score >= 0 && score <= 10) {
                votes[tags.username] = score;
                updateDisplay();
                updateLog(`Vote from ${tags.username}: ${score}`);
            }
        });

        function startVoting() {
            const time = parseInt(document.getElementById('timer-input').value) || 30;
            if (conn) conn.send({ action: 'start', time: time });
            executeStart(time);
        }

        function executeStart(time) {
            executeReset();
            isVotingOpen = true;
            timeLeft = time;
            document.getElementById('status-msg').innerText = "VOTING OPEN!";
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-text').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isVotingOpen = false;
                    document.getElementById('status-msg').innerText = "VOTING CLOSED";
                    document.getElementById('timer-text').innerText = "";
                    updateLog("Voting Finished");
                }
            }, 1000);
        }

        function resetAll() {
            if (conn) conn.send({ action: 'reset' });
            executeReset();
        }

        function executeReset() {
            clearInterval(timerInterval);
            votes = {};
            isVotingOpen = false;
            document.getElementById('average-score').innerText = "0.0";
            document.getElementById('status-msg').innerText = "READY";
            document.getElementById('timer-text').innerText = "";
            updateLog("System Reset");
        }

        function updateDisplay() {
            const scores = Object.values(votes);
            const avg = scores.length ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : "0.0";
            document.getElementById('average-score').innerText = avg;
        }
    </script>
</body>
</html>

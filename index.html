<!DOCTYPE html>
<html>
<head>
    <title>Sakura Remote Master v2</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #00ff00; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #timer { font-size: 160px; color: #ff69b4; -webkit-text-stroke: 4px black; text-shadow: 4px 4px 0px #000; margin-bottom: 20px; }
        .admin-panel { background: white; padding: 20px; border: 3px solid black; border-radius: 15px; text-align: center; font-family: sans-serif; min-width: 300px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        button { padding: 15px 25px; font-size: 18px; cursor: pointer; font-weight: bold; border-radius: 8px; border: 2px solid black; transition: 0.1s; }
        button:active { transform: translateY(2px); }
        .start { background: #90ee90; }
        .pause { background: #ffcccb; }
        #status { font-size: 12px; margin-top: 10px; color: #666; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="timer">200000</div>

    <div id="controls" class="admin-panel hidden">
        <div id="connection-msg">Connecting to Stream PC...</div>
        <div class="btn-group">
            <button class="start" onclick="triggerAction('start')">START</button>
            <button class="pause" onclick="triggerAction('pause')">PAUSE</button>
            <button onclick="triggerAction('reset')">RESET</button>
        </div>
        <div id="status">STATUS: INITIALIZING</div>
    </div>

    <script>
        const TIMER_ID = 'mugi-sakura-timer-2026'; 
        const isController = window.location.hash === '#control';
        
        let baseSeconds = 200000;
        let startTime = null;
        let interval;
        let conn;

        if (isController) document.getElementById('controls').classList.remove('hidden');

        const peer = new Peer(isController ? null : TIMER_ID);

        peer.on('open', (id) => {
            if (isController) {
                const connection = peer.connect(TIMER_ID);
                setupConnection(connection);
            }
        });

        peer.on('connection', (c) => {
            conn = c;
            setupConnection(c);
        });

        function setupConnection(c) {
            conn = c;
            conn.on('open', () => {
                if (isController) {
                    document.getElementById('connection-msg').innerText = "CONNECTED TO OBS";
                    document.getElementById('status').innerText = "STATUS: SYNCING...";
                    // AS THE CONTROLLER: Ask the OBS PC for its current time
                    conn.send({ action: 'requestSync' });
                }
            });

            conn.on('data', (data) => {
                // If I am the OBS PC and the Controller asks for sync:
                if (data.action === 'requestSync' && !isController) {
                    conn.send({ action: 'syncResponse', base: baseSeconds, start: startTime });
                }
                
                // If I am the Controller and receive the sync data:
                if (data.action === 'syncResponse') {
                    baseSeconds = data.base;
                    startTime = data.start;
                    if (startTime) runStart(startTime);
                    else updateDisplay();
                    document.getElementById('status').innerText = "STATUS: READY";
                }

                // Standard controls
                if (data.action === 'start') runStart(data.time);
                if (data.action === 'pause') runPause(data.val);
                if (data.action === 'reset') runReset();
            });
        }

        function updateDisplay() {
            let current = baseSeconds;
            if (startTime) {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                current = Math.max(0, baseSeconds - elapsed);
            }
            document.getElementById('timer').innerText = current;
        }

        function runStart(remoteTime) {
            startTime = remoteTime || Date.now();
            clearInterval(interval);
            interval = setInterval(updateDisplay, 1000);
        }

        function runPause(val) {
            clearInterval(interval);
            baseSeconds = val;
            startTime = null;
            updateDisplay();
        }

        function runReset() {
            clearInterval(interval);
            baseSeconds = 200000;
            startTime = null;
            updateDisplay();
        }

        function triggerAction(action) {
            const now = Date.now();
            const currentVal = parseInt(document.getElementById('timer').innerText);

            if (action === 'start') {
                runStart(now);
                if (conn) conn.send({ action: 'start', time: now });
            } else if (action === 'pause') {
                runPause(currentVal);
                if (conn) conn.send({ action: 'pause', val: currentVal });
            } else if (action === 'reset') {
                if(confirm("Reset to 200,000?")) {
                    runReset();
                    if (conn) conn.send({ action: 'reset' });
                }
            }
        }

        updateDisplay();
    </script>
</body>
</html>

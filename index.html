<!DOCTYPE html>
<html>
<head>
    <title>Sakura Timer - Spaced Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        body { 
            background: #00ff00; 
            font-family: 'Luckiest Guy', sans-serif; 
            margin: 0; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: flex-start; 
            padding-left: 120px; 
        }
        
        #timer-wrapper { 
            font-size: 300px; 
            font-style: italic;
            transform: skewX(-5deg); 
            user-select: none;
            font-variant-numeric: tabular-nums;
            text-rendering: geometricPrecision;
            white-space: nowrap;
            
            /* ADDED: Spacing between the numbers */
            letter-spacing: 20px; 
            
            /* ADJUSTED: Extra space for the last number's shadow */
            padding-right: 100px; 

            background: linear-gradient(to bottom, #FFFFFF 30%, #A0A0A0 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            filter: 
                drop-shadow(0 0 0 black) 
                drop-shadow(4px 0 0 black) 
                drop-shadow(-4px 0 0 black) 
                drop-shadow(0 4px 0 black) 
                drop-shadow(0 -4px 0 black)
                drop-shadow(4px 4px 0 black)
                drop-shadow(-4px -4px 0 black)
                drop-shadow(4px -4px 0 black)
                drop-shadow(-4px 4px 0 black)
                drop-shadow(12px 12px 0px rgba(0,0,0,1));
        }

        /* --- MANAGER REMOTE UI --- */
        #controls { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; border: 6px solid #000; border-radius: 35px; padding: 20px; 
            text-align: center; box-shadow: 0 12px 0 #333; z-index: 9999; font-family: sans-serif; display: none; 
        }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        input { font-size: 20px; padding: 10px; width: 140px; border: 4px solid #000; border-radius: 12px; text-align: center; margin-bottom: 10px; font-weight: bold; }
        button { padding: 12px 25px; font-size: 18px; cursor: pointer; font-weight: bold; border-radius: 50px; border: 4px solid #000; box-shadow: 0 5px 0 #000; transition: 0.1s; }
        .start { background: #43B047; color: white; }
        .pause { background: #E52521; color: white; }
        .reset { background: #FBD000; color: black; }
        .update-btn { background: #000; color: #fff; font-size: 14px; width: 100%; cursor: pointer; border-radius: 10px; padding: 8px; }
    </style>
</head>
<body>

    <div id="timer-wrapper">
        <span id="timer">200000</span>
    </div>

    <div id="controls">
        <div style="font-weight: bold; font-size: 20px; margin-bottom: 10px; color: #000;">SPACED TIMER REMOTE</div>
        <div style="background: #f0f0f0; padding: 15px; border-radius: 20px; border: 3px dashed #000;">
            <input type="number" id="new-max" value="200000">
            <button class="update-btn" onclick="updateMaxVal()">UPDATE START TIME</button>
        </div>
        <div id="conn-status" style="font-size: 11px; color: #666; margin: 12px 0;">Status: Offline</div>
        <div class="btn-group">
            <button class="pause" onclick="triggerAction('pause')">PAUSE</button>
            <button class="start" onclick="triggerAction('start')">START</button>
        </div>
        <button class="reset" onclick="triggerAction('reset')" style="margin-top:15px; width:100%;">RESET TO START</button>
    </div>

    <script>
        const TIMER_ID = 'mugi-sakura-timer-2026'; 
        const isController = window.location.hash.includes('control');
        if (isController) document.getElementById('controls').style.display = 'block';

        let maxVal = localStorage.getItem('sakura_max') ? parseInt(localStorage.getItem('sakura_max')) : 200000;
        let baseSeconds = localStorage.getItem('sakura_base') ? parseInt(localStorage.getItem('sakura_base')) : maxVal;
        let startTime = localStorage.getItem('sakura_start') ? parseInt(localStorage.getItem('sakura_start')) : null;
        let interval;
        let conn;

        const peer = new Peer(isController ? null : TIMER_ID);
        peer.on('open', () => { if (isController) connectToOBS(); });
        peer.on('connection', (c) => { conn = c; setupConnection(c); });

        function connectToOBS() { conn = peer.connect(TIMER_ID); setupConnection(conn); }

        function setupConnection(c) {
            conn = c;
            conn.on('open', () => {
                if (isController) {
                    document.getElementById('conn-status').innerText = "Status: CONNECTED";
                    document.getElementById('conn-status').style.color = "green";
                }
            });
            conn.on('data', (data) => {
                if (data.action === 'requestSync' && !isController) {
                    conn.send({ action: 'syncResponse', base: baseSeconds, start: startTime, max: maxVal });
                }
                if (data.action === 'syncResponse') {
                    maxVal = data.max; baseSeconds = data.base; startTime = data.start;
                    if (startTime) runStart(startTime); else runPause(baseSeconds);
                }
                if (data.action === 'updateMax') runUpdateMax(data.val);
                if (data.action === 'start') runStart(data.time);
                if (data.action === 'pause') runPause(data.val);
                if (data.action === 'reset') runReset();
            });
        }

        function updateDisplay() {
            let current = baseSeconds;
            if (startTime) {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                current = Math.max(0, baseSeconds - elapsed);
            }
            document.getElementById('timer').innerText = current;
            if (current === 0) clearInterval(interval);
        }

        function updateMaxVal() {
            const val = parseInt(document.getElementById('new-max').value);
            if (!isNaN(val)) { runUpdateMax(val); if (conn) conn.send({ action: 'updateMax', val: val }); }
        }

        function runUpdateMax(val) {
            maxVal = val; baseSeconds = val; startTime = null;
            localStorage.setItem('sakura_max', maxVal);
            localStorage.setItem('sakura_base', baseSeconds);
            updateDisplay();
        }

        function runStart(remoteTime) {
            startTime = remoteTime || Date.now();
            localStorage.setItem('sakura_start', startTime);
            clearInterval(interval);
            interval = setInterval(updateDisplay, 1000);
        }

        function runPause(val) {
            clearInterval(interval);
            baseSeconds = val; startTime = null;
            localStorage.setItem('sakura_base', baseSeconds);
            updateDisplay();
        }

        function runReset() { runUpdateMax(maxVal); }

        function triggerAction(action) {
            const now = Date.now();
            const cur = parseInt(document.getElementById('timer').innerText);
            if (action === 'start') { runStart(now); if (conn) conn.send({ action: 'start', time: now }); }
            else if (action === 'pause') { runPause(cur); if (conn) conn.send({ action: 'pause', val: cur }); }
            else if (action === 'reset') { if(confirm("Reset?")) { runReset(); if (conn) conn.send({ action: 'reset' }); } }
        }

        if (startTime) runStart(startTime);
        updateDisplay();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Sakura Timer - Mario Party Style</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* Using a heavier, more 'game-like' font */
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        body { 
            background: #00ff00; 
            font-family: 'Luckiest Guy', sans-serif; 
            margin: 0; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: flex-start; 
        }
        
        #timer-wrapper { 
            padding-left: 80px; 
            font-size: 240px; /* Slightly bigger for that 'Big Number' feel */
            
            /* THE MARIO PARTY COMBO: White text + Black Stroke + 3D offset shadow */
            color: #FFFFFF;
            -webkit-text-stroke: 10px #000; 
            
            /* Creates that 'hard' block shadow seen in Nintendo UI */
            filter: drop-shadow(12px 12px 0px #000);
            
            /* Slants the numbers slightly to the right for energy */
            transform: skewX(-5deg); 
            
            user-select: none;
            transition: color 1s linear;
            font-variant-numeric: tabular-nums;
        }

        /* The 'Nintendo Pop' - makes it feel like it's bouncing out of a block */
        @keyframes nintendoPop {
            0% { transform: skewX(-5deg) scale(1); }
            30% { transform: skewX(-5deg) scale(1.15); filter: drop-shadow(15px 15px 0px #000) brightness(1.2); } 
            100% { transform: skewX(-5deg) scale(1); }
        }

        .pop-effect { 
            animation: nintendoPop 0.25s ease-out forwards; 
            transform-origin: left center; 
        }

        /* --- CONTROL PANEL (Manager Remote) --- */
        #controls { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #fff; border: 6px solid #000; border-radius: 30px; 
            padding: 20px; text-align: center; box-shadow: 0 10px 0 #333; 
            z-index: 9999; font-family: sans-serif; display: none; 
        }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        input { font-size: 18px; padding: 10px; width: 120px; border: 3px solid #000; border-radius: 10px; text-align: center; margin-bottom: 10px; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; font-weight: bold; border-radius: 50px; border: 3px solid #000; box-shadow: 0 4px 0 #000; transition: 0.1s; }
        button:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; }
        .update-btn { background: #000; color: #fff; font-size: 14px; width: 100%; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="timer-wrapper">
        <span id="timer">200000</span>
    </div>

    <div id="controls">
        <div style="font-weight: bold; font-size: 18px; margin-bottom: 5px; color: #000;">MANAGER REMOTE</div>
        <div style="background: #f0f0f0; padding: 10px; border-radius: 15px; border: 2px dashed #000;">
            <div style="font-size: 11px; margin-bottom: 5px; font-weight: bold;">STARTING SECONDS:</div>
            <input type="number" id="new-max" value="200000">
            <button class="update-btn" onclick="updateMaxVal()">UPDATE & RESET</button>
        </div>
        <div id="conn-status" style="font-size: 10px; color: #666; margin: 8px 0;">Status: Offline</div>
        <div class="btn-group">
            <button onclick="triggerAction('pause')" style="background:#E52521; color:white;">PAUSE</button>
            <button onclick="triggerAction('start')" style="background:#43B047; color:white;">START</button>
        </div>
        <button onclick="triggerAction('reset')" style="margin-top:10px; font-size:12px; background:#FBD000; border:2px solid #000; box-shadow:none;">RESET TO START</button>
    </div>

    <script>
        const TIMER_ID = 'mugi-sakura-timer-2026'; 
        const isController = window.location.hash.includes('control');
        if (isController) document.getElementById('controls').style.display = 'block';

        let maxVal = localStorage.getItem('sakura_max') ? parseInt(localStorage.getItem('sakura_max')) : 200000;
        let baseSeconds = localStorage.getItem('sakura_base') ? parseInt(localStorage.getItem('sakura_base')) : maxVal;
        let startTime = localStorage.getItem('sakura_start') ? parseInt(localStorage.getItem('sakura_start')) : null;
        let interval;
        let conn;

        document.getElementById('timer').innerText = baseSeconds;

        const peer = new Peer(isController ? null : TIMER_ID);
        peer.on('open', () => { if (isController) connectToOBS(); });
        peer.on('connection', (c) => { conn = c; setupConnection(c); });

        function connectToOBS() { conn = peer.connect(TIMER_ID); setupConnection(conn); }

        function setupConnection(c) {
            conn = c;
            conn.on('open', () => {
                if (isController) {
                    document.getElementById('conn-status').innerText = "Status: CONNECTED";
                    document.getElementById('conn-status').style.color = "green";
                    setTimeout(requestManualSync, 500);
                }
            });
            conn.on('data', (data) => {
                if (data.action === 'requestSync' && !isController) {
                    conn.send({ action: 'syncResponse', base: baseSeconds, start: startTime, max: maxVal });
                }
                if (data.action === 'syncResponse') {
                    maxVal = data.max; baseSeconds = data.base; startTime = data.start;
                    document.getElementById('new-max').value = maxVal;
                    if (startTime) runStart(startTime); else runPause(baseSeconds);
                }
                if (data.action === 'updateMax') runUpdateMax(data.val);
                if (data.action === 'start') runStart(data.time);
                if (data.action === 'pause') runPause(data.val);
                if (data.action === 'reset') runReset();
            });
        }

        // --- COLOR LOGIC (20% YELLOW / 5% RED) ---
        function getColorForTime(seconds) {
            const thresholdYellow = maxVal * 0.20; 
            const thresholdRed = maxVal * 0.05;    

            if (seconds > thresholdYellow) return "rgb(255, 255, 255)";
            if (seconds > thresholdRed) {
                const range = thresholdYellow - thresholdRed;
                const ratio = (seconds - thresholdRed) / range;
                return `rgb(255, 255, ${Math.floor(255 * ratio)})`;
            } 
            return "rgb(255, 0, 0)";
        }

        function updateDisplay() {
            let current = baseSeconds;
            if (startTime) {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                current = Math.max(0, baseSeconds - elapsed);
            }
            document.getElementById('timer').innerText = current;
            document.getElementById('timer-wrapper').style.color = getColorForTime(current);
            if (current === 0) clearInterval(interval);
        }

        function updateMaxVal() {
            const val = parseInt(document.getElementById('new-max').value);
            if (isNaN(val)) return;
            runUpdateMax(val);
            if (conn) conn.send({ action: 'updateMax', val: val });
        }

        function runUpdateMax(val) {
            maxVal = val; baseSeconds = val; startTime = null;
            localStorage.setItem('sakura_max', maxVal);
            localStorage.setItem('sakura_base', baseSeconds);
            localStorage.removeItem('sakura_start');
            updateDisplay();
            triggerFlash();
        }

        function runStart(remoteTime) {
            startTime = remoteTime || Date.now();
            localStorage.setItem('sakura_start', startTime);
            clearInterval(interval);
            interval = setInterval(updateDisplay, 1000);
            triggerFlash();
        }

        function runPause(val) {
            clearInterval(interval);
            baseSeconds = val; startTime = null;
            localStorage.setItem('sakura_base', baseSeconds);
            localStorage.removeItem('sakura_start');
            updateDisplay();
            triggerFlash();
        }

        function runReset() { runUpdateMax(maxVal); }

        function triggerFlash() {
            const w = document.getElementById('timer-wrapper');
            w.classList.remove('pop-effect');
            void w.offsetWidth;
            w.classList.add('pop-effect');
        }

        function triggerAction(action) {
            const now = Date.now();
            const cur = parseInt(document.getElementById('timer').innerText);
            if (action === 'start') { runStart(now); if (conn) conn.send({ action: 'start', time: now }); }
            else if (action === 'pause') { runPause(cur); if (conn) conn.send({ action: 'pause', val: cur }); }
            else if (action === 'reset') { if(confirm("Reset?")) { runReset(); if (conn) conn.send({ action: 'reset' }); } }
        }

        function requestManualSync() { if (conn && conn.open) conn.send({ action: 'requestSync' }); }

        if (startTime) runStart(startTime);
        updateDisplay();
    </script>
</body>
</html>

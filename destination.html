<!DOCTYPE html>
<html>
<head>
    <title>Mugi Travel - Connected Countdown</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        body { 
            background: #00ff00; 
            font-family: 'Luckiest Guy', sans-serif; 
            margin: 0; padding: 0;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .smooth-outline { filter: url(#crispOutline); }

        #travel-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: skewX(-5deg);
            text-align: center;
        }

        .arriving-label {
            color: white;
            font-size: 60px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 5px;
        }

        .destination-name {
            color: #FFD700; 
            font-size: 130px;
            text-transform: uppercase;
            margin-bottom: 15px;
            padding-right: 60px;
        }

        .timer-display {
            color: white;
            font-size: 200px;
            font-style: italic;
            background: linear-gradient(to bottom, #FFFFFF 20%, #A0A0A0 85%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
            display: block;
            white-space: nowrap;
            padding-right: 120px; 
            margin-right: -60px;
        }

        /* CONTROL PANEL */
        #controls { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; color: white;
            z-index: 1000; font-family: sans-serif;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .control-box { background: white; color: black; padding: 30px; border-radius: 30px; width: 350px; text-align: center; }
        input { width: 90%; padding: 12px; margin-bottom: 10px; border: 3px solid #000; border-radius: 12px; font-weight: bold; font-size: 16px; }
        .time-inputs { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .time-inputs input { width: 60px; text-align: center; }
        button { width: 100%; padding: 15px; cursor: pointer; font-weight: bold; background: #43B047; color: white; border: none; border-radius: 15px; font-size: 18px; text-transform: uppercase; }
        .reset-btn { background: #E52521; margin-top: 10px; }
        #status-indicator { margin-top: 15px; font-size: 12px; font-weight: bold; color: red; }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position: absolute;">
      <defs>
        <filter id="crispOutline" x="-50%" y="-50%" width="200%" height="200%">
          <feMorphology in="SourceAlpha" result="dilated" operator="dilate" radius="5"/>
          <feOffset in="dilated" dx="12" dy="12" result="shadow"/>
          <feFlood flood-color="black" result="blackColor"/>
          <feComposite in="blackColor" in2="shadow" operator="in" result="shadowLayer"/>
          <feComposite in="blackColor" in2="dilated" operator="in" result="outlineLayer"/>
          <feMerge><feMergeNode in="shadowLayer"/><feMergeNode in="outlineLayer"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
    </svg>

    <div id="travel-display">
        <div class="arriving-label smooth-outline">Arriving</div>
        <div id="dest-text" class="destination-name smooth-outline">---</div>
        <div id="timer-text" class="timer-display smooth-outline">0:00</div>
    </div>

    <div id="controls">
        <div class="control-box">
            <h2 style="margin-top:0">TRAIN CONTROLS</h2>
            <input type="text" id="input-dest" placeholder="DESTINATION (e.g. OSAKA)">
            <div class="time-inputs">
                <div><small>HR</small><br><input type="number" id="input-hr" value="0" min="0"></div>
                <div><small>MIN</small><br><input type="number" id="input-min" value="0" min="0" max="59"></div>
                <div><small>SEC</small><br><input type="number" id="input-sec" value="0" min="0" max="59"></div>
            </div>
            <button onclick="sendStart()">▶ START JOURNEY</button>
            <button class="reset-btn" onclick="sendReset()">✖ RESET</button>
            <div id="status-indicator">LINK: DISCONNECTED</div>
        </div>
    </div>

    <script>
        const TRAVEL_ID = 'mugi-travel-timer-2026';
        const isController = window.location.hash.includes('control');
        
        if (isController) document.getElementById('controls').style.display = 'flex';

        let countdownInterval;
        let totalSeconds = 0;

        // PEERJS CONNECTION LOGIC
        const peer = new Peer(isController ? null : TRAVEL_ID);
        let conn;

        peer.on('open', () => {
            if (isController) {
                conn = peer.connect(TRAVEL_ID);
                setupControllerEvents();
            }
        });

        // Overlay Side: Handle incoming commands
        peer.on('connection', (c) => {
            conn = c;
            conn.on('data', (data) => {
                if (data.action === 'start') {
                    document.getElementById('dest-text').innerText = data.dest;
                    runCountdown(data.totalSecs);
                }
                if (data.action === 'reset') resetDisplay();
            });
        });

        function setupControllerEvents() {
            conn.on('open', () => {
                document.getElementById('status-indicator').innerText = "LINK: CONNECTED";
                document.getElementById('status-indicator').style.color = "green";
            });
        }

        // Action Functions
        function sendStart() {
            const dest = document.getElementById('input-dest').value || "Destination";
            const h = parseInt(document.getElementById('input-hr').value) || 0;
            const m = parseInt(document.getElementById('input-min').value) || 0;
            const s = parseInt(document.getElementById('input-sec').value) || 0;
            const secs = (h * 3600) + (m * 60) + s;

            if (conn && conn.open) {
                conn.send({ action: 'start', dest: dest, totalSecs: secs });
            }
        }

        function sendReset() {
            if (conn && conn.open) conn.send({ action: 'reset' });
        }

        // Timer Logic
        function runCountdown(secs) {
            clearInterval(countdownInterval);
            totalSeconds = secs;
            updateDisplay();

            countdownInterval = setInterval(() => {
                totalSeconds--;
                if (totalSeconds <= 0) {
                    totalSeconds = 0;
                    clearInterval(countdownInterval);
                    document.getElementById('timer-text').innerText = "SOON";
                } else {
                    updateDisplay();
                }
            }, 1000);
        }

        function updateDisplay() {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            let displayTime = h > 0 ? 
                `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}` : 
                (m > 0 ? `${m}:${s.toString().padStart(2, '0')}` : `${s}`);
            document.getElementById('timer-text').innerText = displayTime;
        }

        function resetDisplay() {
            clearInterval(countdownInterval);
            totalSeconds = 0;
            document.getElementById('dest-text').innerText = "---";
            document.getElementById('timer-text').innerText = "0:00";
        }
    </script>
</body>
</html>

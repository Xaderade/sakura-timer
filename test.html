<!DOCTYPE html>
<html>
<head>
    <title>Mugi Choice - Dual Leader v16.7.23</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        
        body { background: #00ff00; font-family: 'Luckiest Guy', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        
        #display-container { position: relative; width: 850px; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 0.5s ease; }
        #header-area { text-align: center; margin-bottom: 20px; }
        #main-title { font-size: 80px; color: white; text-shadow: 6px 6px 0px #000; margin: 0; }
        #sub-title { font-size: 24px; color: #FFD700; text-shadow: 3px 3px 0px #000; margin: 0; text-transform: uppercase; }

        #pie-wrapper { position: relative; width: 600px; height: 600px; display: flex; justify-content: center; align-items: center; }
        #center-number { 
            position: absolute; 
            z-index: 10; 
            width: 80%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            pointer-events: none; 
            text-align: center; 
            text-shadow: 6px 6px 0px #000;
        }

        #timer-text { position: absolute; top: -40px; right: -40px; font-size: 70px; color: #FF4444; text-shadow: 4px 4px 0px #000; }
        #win-announcement { position: absolute; font-size: 120px; color: #FFD700; text-shadow: 10px 10px 0px #000; display: none; text-align: center; width: 100%; z-index: 20; }
        .hidden { opacity: 0 !important; transform: scale(0.9); }

        /* CONTROL PANEL */
        #controls { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; color: white; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; }
        .control-box { background: white; color: black; border: 5px solid black; padding: 30px; border-radius: 30px; text-align: center; width: 480px; }
        .input-group { margin: 15px 0; text-align: left; }
        label { font-weight: bold; font-size: 14px; }
        input, textarea { width: 100%; padding: 10px; font-size: 16px; border: 3px solid black; border-radius: 10px; box-sizing: border-box; font-family: sans-serif; }
        textarea { height: 60px; resize: none; font-weight: bold; color: #2196F3; }
        button { width: 100%; padding: 15px; cursor: pointer; font-weight: bold; font-size: 18px; border: 4px solid #000; border-radius: 15px; margin-top: 10px; text-transform: uppercase; }
        .start-btn { background: #43B047; color: white; }
        .toggle-btn { background: #2196F3; color: white; }
        .reset-btn { background: #E52521; color: white; }
        .status-tray { margin-top: 20px; padding-top: 10px; border-top: 2px dashed #ccc; display: flex; justify-content: space-around; font-size: 12px; }
        .dot { height: 10px; width: 10px; border-radius: 50%; background: red; }
        .online { background: #43B047; box-shadow: 0 0 5px #43B047; }
    </style>
</head>
<body>

    <div id="win-announcement"></div>

    <div id="display-container" class="hidden">
        <div id="header-area">
            <h1 id="main-title">VOTE NOW</h1>
            <p id="sub-title">Type choice in chat</p>
        </div>
        <div id="pie-wrapper">
            <div id="timer-text"></div>
            <div id="center-number"></div>
            <canvas id="voteChart"></canvas>
        </div>
    </div>

    <div id="controls">
        <div class="control-box">
            <h2 style="margin:0;">MUGI DUAL CONTROL</h2>
            <div class="input-group">
                <label>CHOICES (Comma Separated):</label>
                <textarea id="choices-input">Pog, OOOO, LOL, KEKW</textarea>
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex:1;"><label>TIMER:</label><input type="number" id="timer-input" value="30"></div>
                <div class="input-group" style="flex:2;"><label>OVERLAY TITLE:</label><input type="text" id="title-input" value="CHOOSE NOW"></div>
            </div>
            <button class="start-btn" onclick="startVoting()">▶ START VOTING</button>
            <button class="toggle-btn" onclick="toggleVisibility()">👁 SHOW / HIDE PIE</button>
            <button class="reset-btn" onclick="resetAll()">✖ RESET & CLEAR</button>
            <div class="status-tray">
                <div style="display:flex; align-items:center; gap:5px;"><div id="dot-obs" class="dot"></div> OBS</div>
                <div style="display:flex; align-items:center; gap:5px;"><div id="dot-twitch" class="dot"></div> CHAT</div>
            </div>
        </div>
    </div>

    <script>
        const RATER_ID = 'mugi-dynamic-pie-2026';
        const CHANNEL = 'robcdee';
        const isController = window.location.hash.includes('control');
        const colorPalette = ['#43B047', '#2196F3', '#E52521', '#9C27B0', '#FF9800', '#FFEB3B', '#00BCD4', '#E91E63'];
        
        let dynamicColors = {};
        let votes = {}; 
        let isVotingOpen = false;
        let timerInterval;

        const ctx = document.getElementById('voteChart').getContext('2d');
        const voteChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: [], datasets: [{ data: [], backgroundColor: [], borderColor: 'black', borderWidth: 5 }] },
            options: { cutout: '65%', responsive: true, animation: { duration: 400 }, plugins: { legend: { display: false } } }
        });

        const peer = new Peer(isController ? null : RATER_ID);
        let conn;

        peer.on('open', () => { if (isController) connectToOBS(); });
        function connectToOBS() {
            conn = peer.connect(RATER_ID);
            conn.on('open', () => { if(isController) document.getElementById('dot-obs').classList.add('online'); });
        }

        peer.on('connection', (c) => {
            conn = c;
            conn.on('data', (data) => {
                if (data.action === 'start') executeStart(data);
                if (data.action === 'reset') executeReset();
                if (data.action === 'toggle') executeToggle();
            });
        });

        ComfyJS.onChat = (user, message, flags, self, extra) => {
            if (!isVotingOpen) return;
            const msg = message.trim(); 
            if (dynamicColors.hasOwnProperty(msg)) {
                votes[user] = msg; 
                updateChart();
            }
        };

        ComfyJS.Init(CHANNEL);
        setTimeout(() => { if(isController) document.getElementById('dot-twitch').classList.add('online'); }, 1500);

        function startVoting() {
            const rawChoices = document.getElementById('choices-input').value.split(',').map(s => s.trim());
            const newColors = {};
            rawChoices.forEach((choice, index) => { newColors[choice] = colorPalette[index % colorPalette.length]; });
            const startData = { action: 'start', time: document.getElementById('timer-input').value || 30, title: document.getElementById('title-input').value || "VOTE NOW", colorMap: newColors };
            if (conn && conn.open) conn.send(startData);
            executeStart(startData);
        }

        function toggleVisibility() { if (conn && conn.open) conn.send({ action: 'toggle' }); executeToggle(); }
        function resetAll() { if (conn && conn.open) conn.send({ action: 'reset' }); executeReset(); }

        function executeStart(data) {
            executeReset();
            dynamicColors = data.colorMap;
            isVotingOpen = true;
            document.getElementById('main-title').innerText = data.title;
            document.getElementById('sub-title').innerText = "VOTE: " + Object.keys(dynamicColors).join(" / ");
            document.getElementById('display-container').classList.remove('hidden');
            let timeLeft = data.time;
            document.getElementById('timer-text').innerText = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-text').innerText = timeLeft;
                if (timeLeft <= 0) { clearInterval(timerInterval); finishVoting(); }
            }, 1000);
        }

        function updateChart() {
            const counts = {};
            Object.values(votes).forEach(v => counts[v] = (counts[v] || 0) + 1);
            const sortedChoices = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
            const dataValues = sortedChoices.map(c => counts[c]);
            const bgColors = sortedChoices.map(c => dynamicColors[c]);

            voteChart.data.labels = sortedChoices;
            voteChart.data.datasets[0].data = dataValues;
            voteChart.data.datasets[0].backgroundColor = bgColors;
            voteChart.update();

            if (sortedChoices.length > 0) {
                const total = dataValues.reduce((a, b) => a + b, 0);
                const centerEl = document.getElementById('center-number');
                let displayHTML = "";
                
                const top1Word = sortedChoices[0];
                const top1Perc = Math.round((counts[top1Word] / total) * 100);
                
                if (sortedChoices.length === 1) {
                    displayHTML = `<div style="color:${dynamicColors[top1Word]}; font-size:80px; line-height:0.9;">${top1Word}<br><span style="font-size:40px; color:white;">${top1Perc}%</span></div>`;
                } else {
                    const top2Word = sortedChoices[1];
                    const top2Perc = Math.round((counts[top2Word] / total) * 100);
                    displayHTML = `
                        <div style="display:flex; gap:15px; align-items:center; justify-content:center; line-height:0.9;">
                            <div style="color:${dynamicColors[top1Word]}; font-size:60px;">${top1Word}<br><span style="font-size:30px; color:white;">${top1Perc}%</span></div>
                            <div style="color:white; font-size:25px; opacity:0.6; margin-top: -20px;">VS</div>
                            <div style="color:${dynamicColors[top2Word]}; font-size:60px;">${top2Word}<br><span style="font-size:30px; color:white;">${top2Perc}%</span></div>
                        </div>`;
                }
                centerEl.innerHTML = displayHTML;
                centerEl.style.transform = `scale(${1 + (counts[top1Word] / total) * 0.3})`;
            }
        }

        function finishVoting() {
            isVotingOpen = false;
            const data = voteChart.data.datasets[0].data;
            const labels = voteChart.data.labels;
            if (labels.length > 0) {
                const max = Math.max(...data);
                const winner = labels[data.indexOf(max)];
                const announce = document.getElementById('win-announcement');
                announce.innerText = `${winner} WINS!`;
                announce.style.color = dynamicColors[winner];
                announce.style.display = 'block';
                document.getElementById('display-container').classList.add('hidden');
                setTimeout(() => { announce.style.display = 'none'; }, 5000);
            }
        }

        function executeToggle() { document.getElementById('display-container').classList.toggle('hidden'); }
        function executeReset() {
            clearInterval(timerInterval);
            votes = {};
            isVotingOpen = false;
            document.getElementById('timer-text').innerText = "";
            document.getElementById('center-number').innerHTML = "";
            document.getElementById('win-announcement').style.display = 'none';
            voteChart.data.labels = [];
            voteChart.data.datasets[0].data = [];
            voteChart.update();
        }
    </script>
</body>
</html>

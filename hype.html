<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugi Co. | Engine v16.6 [RESTORED]</title>
    
    <script src="tmi.min.js"></script>
    <script src="peerjs.min.js"></script>

    <script>
        const PEER_ID = 'mugi-link-123'; 
        const urlParams = new URLSearchParams(window.location.search);
        const isRemote = urlParams.has('control');
        const peer = new Peer(isRemote ? null : PEER_ID);
        let remoteConn = null;

        function updateCtrlStatus(id, text, state) {
            const el = document.getElementById(`ctrl-${id}`);
            if(el) {
                el.innerText = text;
                el.className = state === 'on' ? 'live' : 'wait';
            }
        }

        if (!isRemote) {
            peer.on('open', () => updateCtrlStatus('obs', 'ENGINE LIVE', 'on'));
            peer.on('connection', (conn) => {
                updateCtrlStatus('obs', 'REMOTE LINKED', 'on');
                conn.on('data', (data) => {
                    if (data.type === 'BOOT') {
                        document.getElementById('inp-ch').value = data.ch;
                        document.getElementById('inp-7id').value = data.id7;
                        reboot(true); 
                    }
                });
            });
        } 
        
        if (isRemote) {
            peer.on('open', () => {
                const conn = peer.connect(PEER_ID);
                conn.on('open', () => {
                    remoteConn = conn;
                    updateCtrlStatus('obs', 'LINKED TO OBS', 'on');
                });
            });
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        :root { --p: #9146ff; --cyan: #00ffff; --red: #ff4d4d; --ui-bg: rgba(0, 0, 0, 0.95); --font-main: 'Inter', sans-serif; }
        body { margin: 0; background-color: transparent; color: white; font-family: var(--font-main); overflow: hidden; }
        #hud { position: absolute; top: 10px; left: 10px; z-index: 100; display: flex; flex-direction: column; gap: 3px; }
        .indicator { font-size: 10px; font-weight: 900; padding: 4px 12px; background: rgba(0,0,0,0.95); border-left: 4px solid #444; min-width: 280px; text-transform: uppercase; }
        .indicator.on { border-left-color: #00ffcc; color: #00ffcc; }
        #leaderboard { display: flex; justify-content: center; align-items: flex-end; gap: 50px; width: 100vw; height: 100vh; padding-bottom: 80px; position: absolute; bottom: 0; left: 0; }
        .emote-slot { position: relative; display: flex; flex-direction: column; align-items: center; transition: 0.4s; opacity: 0.01; transform: translateY(50px); }
        .emote-slot.active { opacity: 1; transform: translateY(0); }
        .img-wrap { height: 220px; width: 220px; display: flex; align-items: center; justify-content: center; background: var(--ui-bg); border: 6px solid #fff; box-shadow: 10px 10px 0px #000; margin-bottom: 20px; }
        .emote-img { max-height: 190px; max-width: 190px; object-fit: contain; }
        .count { font-size: 72px; font-weight: 900; text-shadow: 5px 5px 0px var(--p); }
        #control { position: absolute; top: 0; right: 0; width: 340px; height: 100vh; background: #0a0a0a; border-left: 4px solid var(--p); padding: 30px; z-index: 200; transform: translateX(100%); transition: 0.3s; box-sizing: border-box; }
        #control.active { transform: translateX(0); }
        input { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 12px; margin-top: 5px; font-weight: bold; }
        #m-toggle { position: absolute; top: 10px; right: 10px; background: var(--p); border: none; color: white; width: 45px; height: 45px; cursor: pointer; font-weight: 900; z-index: 210; }
        .monitor { background: #111; padding: 15px; margin-top: 25px; border: 1px solid #222; }
        .mon-item { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 8px; color: #666; }
        .mon-item span.live { color: #00ffcc; }
        .mon-item span.wait { color: var(--red); }
        .asset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; border-top: 1px solid #222; padding-top: 10px; }
        .asset-tag { font-size: 9px; background: #000; padding: 4px; border: 1px solid #333; color: #888; text-align: center; }
    </style>
</head>
<body>

<div id="hud">
    <div class="indicator" style="background:var(--p); border:none; text-align:center;">MUGI ENGINE v16.6</div>
    <div id="stat-tmi" class="indicator">Twitch: IDLE</div>
    <div id="stat-assets" class="indicator">ASSETS: 0</div>
</div>

<button id="m-toggle" onclick="document.getElementById('control').classList.toggle('active')">☰</button>

<div id="control">
    <h2 style="margin:0 0 5px 0; color:var(--p);">SYSTEM CONTROL</h2>
    <label style="font-size:10px;">TWITCH CHANNEL</label>
    <input type="text" id="inp-ch" placeholder="Username">
    <label style="font-size:10px; margin-top:15px; display:block;">7TV ID</label>
    <input type="text" id="inp-7id" placeholder="Optional">
    <button id="btn-boot" style="width:100%; padding:20px; background:var(--p); color:white; border:none; cursor:pointer; font-weight:900; margin-top: 25px;" onclick="reboot()">UPDATE ENGINE</button>

    <div class="monitor">
        <div class="mon-item">OBS Connection: <span id="ctrl-obs" class="wait">OFFLINE</span></div>
        <div class="mon-item">Twitch Status: <span id="ctrl-tmi" class="wait">OFFLINE</span></div>
        <div class="mon-item">Active: <span id="ctrl-chan">-</span></div>
        <div class="asset-grid">
            <div class="asset-tag">7TV: <b id="cnt-7tv">0</b></div>
            <div class="asset-tag">BTTV: <b id="cnt-bttv">0</b></div>
            <div class="asset-tag">FFZ: <b id="cnt-ffz">0</b></div>
            <div class="asset-tag">Twitch: <b id="cnt-tw">0</b></div>
        </div>
    </div>
</div>

<div id="leaderboard">
    <div id="slot-0" class="emote-slot"><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-1" class="emote-slot"><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-2" class="emote-slot"><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-3" class="emote-slot"><div class="img-wrap"></div><div class="count">0</div></div>
</div>

<script>
    let emoteMap = {};
    let emoteCounts = {};
    let client = null;
    let mainLoop = null;
    let c7 = 0, cb = 0, cf = 0, ct = 0;

    function syncUI() {
        const total = Object.keys(emoteMap).length;
        document.getElementById('stat-assets').innerText = `ASSETS: ${total}`;
        document.getElementById('cnt-7tv').innerText = c7;
        document.getElementById('cnt-bttv').innerText = cb;
        document.getElementById('cnt-ffz').innerText = cf;
        document.getElementById('cnt-tw').innerText = ct;
    }

    // RESTORED: Original working fetch logic
    async function loadAssets(userId, channel) {
        emoteMap = {}; c7 = 0; cb = 0; cf = 0; ct = 0;
        
        // 7TV Global
        fetch('https://7tv.io/v3/emote-sets/global').then(r => r.json()).then(g => {
            g.emotes?.forEach(e => { emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/4x.webp`; c7++; });
            syncUI();
        });

        try {
            const twRes = await fetch(`https://api.ivr.fi/v2/twitch/user?login=${channel}`);
            const twData = await twRes.json();
            const tId = twData[0]?.id;

            if(tId) {
                // BTTV
                fetch(`https://api.betterttv.net/3/cached/users/twitch/${tId}`).then(r => r.json()).then(d => {
                    [...(d.channelEmotes||[]), ...(d.sharedEmotes||[])].forEach(e => { emoteMap[e.code] = `https://cdn.betterttv.net/emote/${e.id}/3x`; cb++; });
                    syncUI();
                });
                // FFZ
                fetch(`https://api.betterttv.net/3/cached/frankerfacez/users/twitch/${tId}`).then(r => r.json()).then(d => {
                    d.forEach(e => { emoteMap[e.code] = e.images['4x'] || e.images['1x']; cf++; });
                    syncUI();
                });
            }
            if(userId) {
                // 7TV Personal
                fetch(`https://7tv.io/v3/users/${userId}`).then(r => r.json()).then(async d => {
                    const setId = d.emote_set?.id || d.connections?.find(c => c.platform === 'TWITCH')?.emote_set?.id;
                    if(setId) {
                        const sRes = await fetch(`https://7tv.io/v3/emote-sets/${setId}`);
                        const sData = await sRes.json();
                        sData.emotes?.forEach(e => { emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/4x.webp`; c7++; });
                        syncUI();
                    }
                });
            }
        } catch(e) {}
    }

    function reboot(isInternal = false) {
        const CH = document.getElementById('inp-ch').value.trim().toLowerCase();
        const ID7 = document.getElementById('inp-7id').value.trim();
        if(!CH) return;

        if(isRemote && !isInternal) {
            if(remoteConn && remoteConn.open) {
                remoteConn.send({ type: 'BOOT', ch: CH, id7: ID7 });
                document.getElementById('btn-boot').innerText = "PUSHED!";
                setTimeout(() => document.getElementById('btn-boot').innerText = "UPDATE ENGINE", 2000);
            }
            return;
        }

        localStorage.setItem('mugi_ch', CH);
        localStorage.setItem('mugi_id7', ID7);
        loadAssets(ID7, CH);

        if(client) client.disconnect();
        if(mainLoop) clearInterval(mainLoop);
        emoteCounts = {};

        mainLoop = setInterval(() => {
            Object.keys(emoteCounts).forEach(k => { 
                emoteCounts[k] -= (0.15 + (emoteCounts[k] * 0.02)); 
                if(emoteCounts[k] <= 0) delete emoteCounts[k]; 
            });
            updateLeaderboard();
        }, 1000);

        client = new tmi.Client({ channels: [CH] });
        client.on('connected', () => {
            updateCtrlStatus('tmi', 'LIVE', 'on');
            document.getElementById('stat-tmi').innerText = `TWITCH: ${CH.toUpperCase()}`;
            document.getElementById('stat-tmi').className = 'indicator on';
            document.getElementById('ctrl-chan').innerText = CH.toUpperCase();
        });

        client.on('message', (chan, tags, msg) => {
            let found = [];
            msg.split(' ').forEach(w => { if(emoteMap[w]) found.push(w); });
            if(tags.emotes) {
                Object.keys(tags.emotes).forEach(id => {
                    const range = tags.emotes[id][0].split('-');
                    const n = msg.substring(parseInt(range[0]), parseInt(range[1]) + 1);
                    if(!emoteMap[n]) { 
                        emoteMap[n] = `https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/3.0`;
                        ct++; syncUI();
                    }
                    tags.emotes[id].forEach(() => found.push(n));
                });
            }
            [...new Set(found)].forEach(e => { emoteCounts[e] = (emoteCounts[e] || 0) + 1; });
        });

        client.connect();
        document.getElementById('control').classList.remove('active');
    }

    function updateLeaderboard() {
        const sorted = Object.entries(emoteCounts).sort((a,b) => b[1]-a[1]).slice(0,4);
        for(let i=0; i<4; i++){
            const slot = document.getElementById(`slot-${i}`);
            if(sorted[i]){
                const [n, c] = sorted[i];
                const wrap = slot.querySelector('.img-wrap');
                if(wrap.getAttribute('data-name') !== n){
                    wrap.innerHTML = `<img src="${emoteMap[n]}" class="emote-img">`;
                    wrap.setAttribute('data-name', n);
                }
                slot.querySelector('.count').innerText = Math.ceil(c);
                slot.classList.add('active');
            } else { slot.classList.remove('active'); }
        }
    }

    window.onload = () => {
        const sc = localStorage.getItem('mugi_ch');
        if(sc) {
            document.getElementById('inp-ch').value = sc;
            document.getElementById('inp-7id').value = localStorage.getItem('mugi_id7') || '';
            if(!isRemote) reboot(true);
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugi Co. | Engine v16.8 [LEGACY FEEL]</title>
    
    <script src="tmi.min.js"></script>
    <script src="peerjs.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        :root { 
            --p: #9146ff; --cyan: #00ffff; --g: #ffd700; --red: #ff4d4d; 
            --ui-bg: rgba(0, 0, 0, 0.95); --font-main: 'Inter', sans-serif; 
        }
        
        body { margin: 0; background-color: transparent; color: white; font-family: var(--font-main); overflow: hidden; user-select: none; }
        
        /* HUD UI */
        #hud { position: absolute; top: 10px; left: 10px; z-index: 100; display: flex; flex-direction: column; gap: 3px; }
        .indicator { font-size: 10px; font-weight: 900; padding: 4px 12px; background: rgba(0,0,0,0.95); border-left: 4px solid #444; min-width: 280px; text-transform: uppercase; }
        .indicator.version { background: var(--p); border-left: none; text-align: center; font-size: 11px; margin-bottom: 2px; }

        /* LEADERBOARD & COMBO STYLING */
        #leaderboard { display: flex; justify-content: center; align-items: flex-end; gap: 40px; width: 100vw; height: 100vh; padding-bottom: 80px; box-sizing: border-box; position: absolute; bottom: 0; left: 0; }
        
        .emote-slot { position: relative; display: flex; flex-direction: column; align-items: center; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.4); opacity: 0; transform: translateY(50px); }
        .emote-slot.active { opacity: 1; transform: translateY(0); }

        .emote-name {
            font-size: 14px; background: var(--p); color: white; padding: 2px 10px; margin-bottom: 5px;
            text-transform: uppercase; letter-spacing: 1px; box-shadow: 4px 4px 0 #000; z-index: 15;
        }

        .img-wrap { 
            height: 200px; width: 200px; display: flex; align-items: center; justify-content: center; 
            background: var(--ui-bg); border: 8px solid #fff; box-shadow: 10px 10px 0px #000; 
            margin-bottom: -15px; position: relative; z-index: 5; transition: border-color 0.3s;
        }

        /* Flash Keyframes */
        @keyframes tierFlash {
            0% { background: white; transform: scale(1.05); }
            100% { background: var(--ui-bg); transform: scale(1); }
        }
        .flash-trigger { animation: tierFlash 0.4s ease-out forwards; }

        .emote-img { max-height: 170px; max-width: 170px; object-fit: contain; }
        
        .count { 
            font-size: 84px; font-weight: 900; position: relative; z-index: 10;
            color: #fff; -webkit-text-stroke: 4px #000; text-shadow: 6px 6px 0px #000;
            letter-spacing: -4px; margin-top: -10px;
        }

        /* Riser Animation */
        .riser {
            position: absolute; font-weight: 900; font-size: 48px; color: #fff;
            text-shadow: 3px 3px 0 #000; pointer-events: none; z-index: 100;
            animation: riseAndFade 0.7s ease-out forwards;
        }
        @keyframes riseAndFade {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }

        .pop { animation: hitPop 0.12s ease-out; }
        @keyframes hitPop { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

        /* CONTROL PANEL */
        #control { position: absolute; top: 0; right: 0; width: 340px; height: 100vh; background: #0a0a0a; border-left: 4px solid var(--p); padding: 30px; z-index: 200; transform: translateX(100%); transition: 0.3s; box-sizing: border-box; overflow-y: auto; }
        #control.active { transform: translateX(0); }
        input { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 12px; margin-top: 5px; font-weight: bold; }
        #m-toggle { position: absolute; top: 10px; right: 10px; background: var(--p); border: none; color: white; width: 45px; height: 45px; cursor: pointer; font-weight: 900; z-index: 210; }
        .monitor { background: #111; padding: 15px; margin-top: 25px; border: 1px solid #222; }
        .mon-item { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 8px; color: #666; text-transform: uppercase; }
        .asset-tag { font-size: 9px; background: #000; padding: 4px; border: 1px solid #333; color: #888; text-align: center; margin-top: 5px;}
    </style>
</head>
<body>

<div id="hud">
    <div class="indicator version">MUGI ENGINE v16.8</div>
    <div id="stat-assets" class="indicator">ASSETS: 0</div>
</div>

<button id="m-toggle" onclick="document.getElementById('control').classList.toggle('active')">☰</button>

<div id="control">
    <h2 style="margin:0 0 5px 0; color:var(--p);">SYSTEM CONTROL</h2>
    <input type="text" id="inp-ch" placeholder="Username">
    <input type="text" id="inp-7id" placeholder="7TV ID">
    <button style="width:100%; padding:20px; background:var(--p); color:white; border:none; cursor:pointer; font-weight:900; margin-top: 25px;" onclick="reboot()">BOOT ENGINE</button>

    <div class="monitor">
        <div class="mon-item">OBS: <span id="ctrl-obs">WAITING</span></div>
        <div class="mon-item">Channel: <span id="ctrl-chan">-</span></div>
        <div id="cnt-7tv" class="asset-tag">7TV: 0</div>
        <div id="cnt-bttv" class="asset-tag">BTTV: 0</div>
    </div>
</div>

<div id="leaderboard">
    <div id="slot-0" class="emote-slot"><div class="emote-name"></div><div class="img-wrap"></div><div class="count">x0</div></div>
    <div id="slot-1" class="emote-slot"><div class="emote-name"></div><div class="img-wrap"></div><div class="count">x0</div></div>
    <div id="slot-2" class="emote-slot"><div class="emote-name"></div><div class="img-wrap"></div><div class="count">x0</div></div>
    <div id="slot-3" class="emote-slot"><div class="emote-name"></div><div class="img-wrap"></div><div class="count">x0</div></div>
</div>

<script>
    const PEER_ID = 'mugi-link-123'; 
    const urlParams = new URLSearchParams(window.location.search);
    const isRemote = urlParams.has('control');
    const peer = new Peer(isRemote ? null : PEER_ID);
    
    let activeConn = null;
    let emoteMap = {};
    let emoteCounts = {};
    let currentTiers = [0, 0, 0, 0];
    let client = null;
    let mainLoop = null;

    // PEER CONNECTIVITY
    if (!isRemote) {
        peer.on('connection', (conn) => {
            activeConn = conn;
            document.getElementById('ctrl-obs').innerText = 'REMOTE ACTIVE';
            conn.on('data', (data) => {
                if (data.type === 'BOOT') {
                    document.getElementById('inp-ch').value = data.ch;
                    document.getElementById('inp-7id').value = data.id7 || '';
                    reboot(); 
                }
            });
        });
    }

    function spawnRiser(slot) {
        const riser = document.createElement('div');
        riser.className = 'riser';
        riser.innerText = '+1';
        riser.style.left = (Math.random() * 40 + 30) + '%'; 
        slot.appendChild(riser);
        setTimeout(() => riser.remove(), 700);
    }

    async function loadAssets(userId, channel) {
        emoteMap = {};
        // Add basic asset loading here (7TV, BTTV etc)
        // Simplified for brevity, similar to your previous logic
        document.getElementById('stat-assets').innerText = `ASSETS LOADING...`;
        
        fetch(`https://api.ivr.fi/v2/twitch/user?login=${channel}`).then(r => r.json()).then(tw => {
            const tId = tw[0]?.id;
            if(tId) {
                fetch(`https://api.betterttv.net/3/cached/users/twitch/${tId}`).then(r => r.json()).then(d => {
                    [...(d.channelEmotes||[]), ...(d.sharedEmotes||[])].forEach(e => { emoteMap[e.code] = `https://cdn.betterttv.net/emote/${e.id}/3x`; });
                });
            }
        });
    }

    function reboot() {
        const CH = document.getElementById('inp-ch').value.trim().toLowerCase();
        const ID7 = document.getElementById('inp-7id').value.trim();
        if(!CH) return;

        if (isRemote && peer.open) {
            const conn = peer.connect(PEER_ID);
            conn.on('open', () => conn.send({ type: 'BOOT', ch: CH, id7: ID7 }));
            return;
        }

        loadAssets(ID7, CH);
        if(client) client.disconnect();
        if(mainLoop) clearInterval(mainLoop);
        emoteCounts = {};
        
        mainLoop = setInterval(() => {
            Object.keys(emoteCounts).forEach(k => { 
                emoteCounts[k] -= (0.1 + (emoteCounts[k] * 0.015)); 
                if(emoteCounts[k] <= 0.5) delete emoteCounts[k]; 
            });
            updateLeaderboard(null);
        }, 800);

        client = new tmi.Client({ channels: [CH] });
        client.on('message', (chan, tags, msg) => {
            let found = [];
            msg.split(' ').forEach(w => { if(emoteMap[w]) found.push(w); });
            if(tags.emotes) {
                Object.keys(tags.emotes).forEach(id => {
                    const name = msg.substring(parseInt(tags.emotes[id][0].split('-')[0]), parseInt(tags.emotes[id][0].split('-')[1]) + 1);
                    if(!emoteMap[name]) emoteMap[name] = `https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/3.0`;
                    tags.emotes[id].forEach(() => found.push(name));
                });
            }
            found.forEach(e => { 
                emoteCounts[e] = (emoteCounts[e] || 0) + 1; 
                updateLeaderboard(e); 
            });
        });
        client.connect();
        document.getElementById('ctrl-chan').innerText = CH;
    }

    function updateLeaderboard(trig) {
        const sorted = Object.entries(emoteCounts).sort((a,b) => b[1]-a[1]).slice(0,4);
        
        for(let i=0; i<4; i++){
            const slot = document.getElementById(`slot-${i}`);
            const wrap = slot.querySelector('.img-wrap');
            const countEl = slot.querySelector('.count');
            const nameEl = slot.querySelector('.emote-name');
            
            if(sorted[i]){
                const [n, c] = sorted[i];
                const roundedC = Math.ceil(c);
                
                if(wrap.getAttribute('data-name') !== n){
                    wrap.innerHTML = `<img src="${emoteMap[n]}" class="emote-img">`;
                    wrap.setAttribute('data-name', n);
                    nameEl.innerText = n;
                }
                
                countEl.innerText = `x${roundedC}`;
                slot.classList.add('active');

                let newTier = 0;
                if(roundedC >= 50) newTier = 4;
                else if(roundedC >= 25) newTier = 3;
                else if(roundedC >= 10) newTier = 2;
                else if(roundedC >= 1) newTier = 1;

                if(newTier > currentTiers[i]) {
                    wrap.classList.remove('flash-trigger');
                    void wrap.offsetWidth; 
                    wrap.classList.add('flash-trigger');
                    
                    if(newTier === 4) wrap.style.borderColor = 'var(--red)';
                    else if(newTier === 3) wrap.style.borderColor = 'var(--g)';
                    else if(newTier === 2) wrap.style.borderColor = 'var(--cyan)';
                    else wrap.style.borderColor = '#fff';
                }
                currentTiers[i] = newTier;

                if(trig === n) {
                    wrap.classList.remove('pop'); void wrap.offsetWidth; wrap.classList.add('pop');
                    spawnRiser(slot);
                }
            } else { 
                slot.classList.remove('active'); 
                currentTiers[i] = 0;
            }
        }
    }
</script>
</body>
</html>

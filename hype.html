<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugi Co. | Deep Scan v5.3</title>
    <script src="tmi.min.js"></script>
    <style>
        :root { --p: #9146ff; --g: #ffd700; --bg: rgba(13, 13, 18, 0.98); --success: #00ffcc; }
        body { margin: 0; background: transparent; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        #control { position: absolute; top: 0; right: 0; width: 320px; height: 100vh; background: var(--bg); border-left: 2px solid var(--p); padding: 25px; z-index: 100; transform: translateX(100%); transition: 0.4s; }
        #control.active { transform: translateX(0); }
        input { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 12px; margin: 8px 0 18px 0; border-radius: 6px; }
        .stat { background: #111; padding: 10px; border-radius: 6px; font-size: 10px; text-align: center; border: 1px solid #222; margin-bottom: 5px; }
        .stat.on { border-color: var(--success); color: var(--success); }
        #chat { position: absolute; bottom: 40px; left: 30px; width: 600px; }
        .msg { font-size: 28px; font-weight: 700; text-shadow: 2px 2px 4px #000; margin-bottom: 15px; }
        .user { color: var(--p); margin-right: 10px; }
        .emote { height: 1.35em; vertical-align: middle; margin: -4px 2px; }
        .btn-boot { width: 100%; background: var(--p); color: white; border: none; padding: 15px; font-weight: 900; cursor: pointer; border-radius: 6px; }
        #m-toggle { position: absolute; top: 20px; right: 20px; background: var(--p); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; z-index: 101; cursor: pointer; }
    </style>
</head>
<body>

<button id="m-toggle" onclick="document.getElementById('control').classList.toggle('active')">M</button>

<div id="control">
    <div style="font-weight: 900; color: var(--p); margin-bottom: 20px;">MUGI_SCANNER_v5.3</div>
    <label style="font-size:10px;">CHANNEL</label><input type="text" id="ch-name" value="CrazyJapanese">
    <label style="font-size:10px;">7TV USER ID</label><input type="text" id="ch-id" value="01FEBH4WVG0008A7S9XD2BPYFJ">
    <div id="st-tw" class="stat">TWITCH: OFF</div>
    <div id="st-7v" class="stat">7TV: OFF</div>
    <button class="btn-boot" onclick="boot()">BOOT SYSTEM</button>
    <div id="log" style="margin-top: 20px; font-size: 11px; color: var(--g);">Waiting...</div>
</div>

<div id="chat"></div>

<script>
    let tmiClient = null;
    let emoteMap = {};

    async function boot() {
        const log = document.getElementById('log');
        const ch = document.getElementById('ch-name').value.trim().toLowerCase();
        const id = document.getElementById('ch-id').value.trim();

        log.innerText = "Scanning 7TV API...";
        
        try {
            // Using a slightly broader 7TV search
            const [uRes, gRes] = await Promise.all([
                fetch(`https://7tv.io/v3/users/${id}`),
                fetch(`https://7tv.io/v3/emote-sets/global`)
            ]);
            
            const uData = await uRes.json();
            const gData = await gRes.json();

            // DEBUG: Check console to see if emotes are actually arriving
            console.log("7TV Data Received:", uData);

            emoteMap = {};
            // The path can sometimes vary; we check both 'emotes' and 'emote_set.emotes'
            const channelEmotes = uData.emote_set?.emotes || uData.emotes || [];
            const allEmotes = [...channelEmotes, ...gData.emotes];
            
            allEmotes.forEach(e => {
                // Store image URL for the word
                emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/2x.webp`;
            });

            document.getElementById('st-7v').className = 'stat on';
            document.getElementById('st-7v').innerText = `7TV: ${Object.keys(emoteMap).length} ASSETS`;
            log.innerText = "7TV Ready. Handshaking Twitch...";
        } catch (e) {
            log.innerText = "7TV Error. Check Console (F12).";
            console.error("7TV Fetch Error:", e);
        }

        if(tmiClient) tmiClient.disconnect();
        tmiClient = new tmi.Client({ connection: { secure: true, reconnect: true }, channels: [ch] });

        tmiClient.connect().then(() => {
            document.getElementById('st-tw').className = 'stat on';
            document.getElementById('st-tw').innerText = "TWITCH: ONLINE";
            log.innerText = "System Live. Close menu and test.";
        });

        tmiClient.on('message', (chan, tags, msg, self) => {
            const chatContainer = document.getElementById('chat');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'msg';

            // New Regex Parsing: Handles emotes even with punctuation (e.g., "LUL!")
            let parsedContent = msg.split(' ').map(word => {
                // Strip punctuation for the check
                const cleanWord = word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
                if (emoteMap[cleanWord]) {
                    return `<img src="${emoteMap[cleanWord]}" class="emote">`;
                }
                return word;
            }).join(' ');

            messageDiv.innerHTML = `<span class="user" style="color:${tags.color || '#9146ff'}">${tags['display-name']}:</span> ${parsedContent}`;
            chatContainer.appendChild(messageDiv);
            if (chatContainer.childNodes.length > 10) chatContainer.removeChild(chatContainer.firstChild);
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugi Co. | Engine v14.8 [RETRO-4]</title>
    <script src="tmi.min.js"></script>
    <style>
        :root { 
            --p: #9146ff; 
            --p-glow: rgba(145, 70, 255, 0.8);
            --g: #ffd700; 
            --g-glow: rgba(255, 215, 0, 0.8);
            --cyan: #00ffff;
            --chroma: #00FF00; 
            --ui-bg: rgba(0, 0, 0, 0.95);
            /* Retro Font Stack */
            --font-retro: 'Courier New', Courier, monospace; 
        }
        
        body { margin: 0; background-color: var(--chroma); color: white; font-family: var(--font-retro); overflow: hidden; user-select: none; }
        
        /* HUD - FULL STATUS RESTORED */
        #hud { position: absolute; top: 10px; left: 10px; z-index: 100; display: flex; flex-direction: column; gap: 5px; }
        .indicator { font-size: 11px; font-weight: bold; padding: 6px 12px; border-radius: 2px; background: rgba(0,0,0,0.95); border-left: 4px solid #444; min-width: 280px; box-shadow: 0 4px 0px rgba(0,0,0,0.5); }
        .indicator.version { background: var(--p); border-left: none; text-align: center; letter-spacing: 2px; margin-bottom: 5px; }
        .indicator.on { border-left-color: #00ffcc; color: #00ffcc; }
        .indicator.err { border-left-color: #ff4d4d; color: #ff4d4d; }
        .indicator.wait { border-left-color: var(--g); color: var(--g); }
        
        #activity-log { font-size: 10px; color: #aaa; background: rgba(0,0,0,0.95); padding: 10px; border-radius: 2px; margin-top: 5px; max-width: 280px; border: 1px solid #333; }
        .log-entry { border-bottom: 1px solid #222; padding: 4px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* LEADERBOARD - TOP 4 REDUCTION */
        #leaderboard { display: flex; justify-content: center; align-items: flex-end; gap: 40px; width: 100vw; height: 100vh; padding-bottom: 100px; box-sizing: border-box; }
        
        .emote-slot { 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            transition: opacity 0.3s steps(4), transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.4);
            opacity: 0;
            transform: translateY(50px);
        }

        .emote-slot.active { opacity: 1; transform: translateY(0); }

        .img-wrap { 
            height: 220px; width: 220px; 
            display: flex; align-items: center; justify-content: center; 
            background: var(--ui-bg);
            border: 4px solid #fff;
            box-shadow: 8px 8px 0px #000;
            margin-bottom: 20px;
            position: relative;
        }

        .emote-img { max-height: 190px; max-width: 190px; object-fit: contain; image-rendering: pixelated; }
        
        .count { 
            font-size: 64px; 
            font-weight: 900; 
            color: #fff;
            text-shadow: 4px 4px 0px var(--p);
            letter-spacing: -2px;
        }

        /* JUICE */
        .pop { animation: retroHit 0.2s steps(2); }
        @keyframes retroHit { 
            0% { transform: scale(1); filter: invert(0); } 
            50% { transform: scale(1.1); filter: invert(1); } 
            100% { transform: scale(1); filter: invert(0); } 
        }

        /* RISER SYSTEM */
        .combo-container {
            position: absolute;
            bottom: 260px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        .riser {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 900;
            font-size: 32px;
            animation: retroRise 0.8s ease-out forwards;
            white-space: nowrap;
        }

        @keyframes retroRise {
            0% { transform: translate(-50%, 0); opacity: 1; color: #fff; }
            100% { transform: translate(-50%, -100px); opacity: 0; color: var(--cyan); }
        }

        /* MILESTONE SPLASH */
        .milestone {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            color: var(--g);
            text-shadow: 4px 4px 0 #000;
            animation: milestonePop 1.5s steps(8) forwards;
        }

        @keyframes milestonePop {
            0% { transform: translate(-50%, -20px) scale(0); opacity: 1; }
            20% { transform: translate(-50%, -50px) scale(1.5); }
            80% { opacity: 1; }
            100% { transform: translate(-50%, -150px) scale(1); opacity: 0; }
        }

        #control { position: absolute; top: 0; right: 0; width: 340px; height: 100vh; background: #111; border-left: 4px solid var(--p); padding: 30px; z-index: 200; transform: translateX(100%); transition: 0.3s; box-sizing: border-box; }
        #control.active { transform: translateX(0); }
        input, select { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 12px; margin-top: 5px; }
        #m-toggle { position: absolute; top: 10px; right: 10px; background: var(--p); border: none; color: white; width: 45px; height: 45px; cursor: pointer; }
    </style>
</head>
<body>

<div id="hud">
    <div class="indicator version">MUGI ENGINE v14.8 [RETRO-4]</div>
    <div id="stat-tmi" class="indicator">Twitch: IDLE</div>
    <div id="stat-bttv" class="indicator">BTTV: 0 LOADED</div>
    <div id="stat-7tv" class="indicator">7TV: 0 LOADED</div>
    
    <div id="activity-log">
        <div id="log-0" class="log-entry">SYSTEM READY...</div>
        <div id="log-1" class="log-entry">Waiting for Initialization</div>
    </div>
</div>

<button id="m-toggle" onclick="document.getElementById('control').classList.toggle('active')">⚙</button>

<div id="control">
    <h2 style="margin:0 0 20px 0; color:var(--p);">CONFIG_v14.8</h2>
    <label style="font-size:11px;">CHANNEL</label>
    <input type="text" id="inp-ch" placeholder="Channel">
    <label style="font-size:11px; margin-top:15px; display:block;">7TV ID</label>
    <input type="text" id="inp-7id" placeholder="User ID">
    <label style="font-size:11px; margin-top:15px; display:block;">DECAY</label>
    <select id="inp-decay">
        <option value="0.15">Normal</option>
        <option value="0.5">Fast</option>
    </select>
    <button style="width:100%; padding:20px; background:var(--p); color:white; border:none; cursor:pointer; font-weight:bold; margin-top: 30px;" onclick="reboot()">BOOT ENGINE</button>
</div>

<div id="leaderboard">
    <div id="slot-0" class="emote-slot"><div class="combo-container"></div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-1" class="emote-slot"><div class="combo-container"></div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-2" class="emote-slot"><div class="combo-container"></div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-3" class="emote-slot"><div class="combo-container"></div><div class="img-wrap"></div><div class="count">0</div></div>
</div>

<script>
    let emoteMap = {};
    let emoteCounts = {};
    let client = null;
    let mainLoop = null;
    let decaySpeed = 0.15;

    const updateLog = (msg) => {
        document.getElementById('log-1').innerText = document.getElementById('log-0').innerText;
        document.getElementById('log-0').innerText = `> ${msg}`;
    };

    const setStat = (id, text, state) => {
        const el = document.getElementById(`stat-${id}`);
        if(el) { el.innerText = text; el.className = `indicator ${state || ''}`; }
    };

    async function loadAssets(userId, channel) {
        let c7 = 0; let cB = 0;
        try {
            const twRes = await fetch(`https://api.ivr.fi/v2/twitch/user?login=${channel}`);
            if(twRes.ok) {
                const twData = await twRes.json();
                const tId = twData[0]?.id;
                if(tId) {
                    fetch(`https://api.betterttv.net/3/cached/users/twitch/${tId}`).then(r => r.json()).then(d => {
                        [...(d.channelEmotes||[]), ...(d.sharedEmotes||[])].forEach(e => {
                            emoteMap[e.code] = `https://cdn.betterttv.net/emote/${e.id}/3x`; cB++;
                        });
                        setStat('bttv', `BTTV: ${cB} LOADED`, 'on');
                    });
                }
            }
            if(userId) {
                fetch(`https://7tv.io/v3/users/${userId}`).then(r => r.json()).then(async d => {
                    const setId = d.emote_set?.id || d.connections?.find(c => c.platform === 'TWITCH')?.emote_set?.id;
                    if(setId) {
                        const sRes = await fetch(`https://7tv.io/v3/emote-sets/${setId}`);
                        const sData = await sRes.json();
                        sData.emotes?.forEach(e => { emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/4x.webp`; c7++; });
                        setStat('7tv', `7TV: ${c7} LOADED`, 'on');
                    }
                });
            }
        } catch(e) { updateLog("ERR: ASSET_LOAD_FAIL"); }
    }

    function reboot() {
        const CH = document.getElementById('inp-ch').value.trim().toLowerCase();
        const ID7 = document.getElementById('inp-7id').value.trim();
        decaySpeed = parseFloat(document.getElementById('inp-decay').value);
        if(!CH) return;

        localStorage.setItem('mugi_ch', CH);
        localStorage.setItem('mugi_id7', ID7);

        loadAssets(ID7, CH);
        if(client) client.disconnect();
        if(mainLoop) clearInterval(mainLoop);

        emoteCounts = {};
        mainLoop = setInterval(() => {
            Object.keys(emoteCounts).forEach(k => { 
                emoteCounts[k] -= decaySpeed; 
                if(emoteCounts[k] <= 0) delete emoteCounts[k]; 
            });
            updateLeaderboard(null);
        }, 1000);

        client = new tmi.Client({ channels: [CH] });
        client.on('connected', () => { setStat('tmi', `Twitch: ONLINE`, 'on'); updateLog("LINK ESTABLISHED"); });
        client.on('message', (chan, tags, msg) => {
            let found = new Set();
            msg.split(' ').forEach(w => { if(emoteMap[w]) found.add(w); });
            if(tags.emotes) {
                Object.keys(tags.emotes).forEach(id => {
                    const name = msg.substring(parseInt(tags.emotes[id][0].split('-')[0]), parseInt(tags.emotes[id][0].split('-')[1]) + 1);
                    if(!emoteMap[name]) emoteMap[name] = `https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/3.0`;
                    found.add(name);
                });
            }
            found.forEach(e => { emoteCounts[e] = (emoteCounts[e] || 0) + 1; updateLeaderboard(e); });
        });
        client.connect();
        document.getElementById('control').classList.remove('active');
    }

    function spawnRiser(container, count) {
        const el = document.createElement('div');
        el.className = 'riser';
        el.innerText = '+1';
        container.appendChild(el);
        setTimeout(() => el.remove(), 800);

        // Milestone logic
        const val = Math.floor(count);
        if([10, 25, 50, 100].includes(val)) {
            const m = document.createElement('div');
            m.className = 'milestone';
            m.innerText = `COMBO ${val}!!`;
            container.appendChild(m);
            setTimeout(() => m.remove(), 1500);
        }
    }

    function updateLeaderboard(triggeredEmoteName) {
        const sorted = Object.entries(emoteCounts).sort((a,b) => b[1]-a[1]).slice(0,4);
        for(let i=0; i<4; i++){
            const slot = document.getElementById(`slot-${i}`);
            const wrap = slot.querySelector('.img-wrap');
            const comboCon = slot.querySelector('.combo-container');
            if(sorted[i]){
                const [n, c] = sorted[i];
                if(wrap.getAttribute('data-name') !== n){
                    wrap.innerHTML = `<img src="${emoteMap[n]}" class="emote-img">`;
                    wrap.setAttribute('data-name', n);
                }
                slot.querySelector('.count').innerText = Math.ceil(c);
                slot.classList.add('active');
                if(triggeredEmoteName === n) {
                    slot.classList.remove('pop');
                    void slot.offsetWidth;
                    slot.classList.add('pop');
                    spawnRiser(comboCon, c);
                }
            } else {
                slot.classList.remove('active');
                setTimeout(() => { if(!slot.classList.contains('active')) wrap.setAttribute('data-name', ''); }, 500);
            }
        }
    }

    window.onload = () => {
        const savedCh = localStorage.getItem('mugi_ch');
        if(savedCh) {
            document.getElementById('inp-ch').value = savedCh;
            document.getElementById('inp-7id').value = localStorage.getItem('mugi_id7') || '';
            setTimeout(reboot, 500);
        }
    };
</script>
</body>
</html>

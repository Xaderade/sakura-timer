<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugi Co. | Production Suite</title>
    <script src="tmi.min.js"></script>
    <style>
        :root { --p: #9146ff; --g: #ffd700; --bg: rgba(10,10,15,0.98); }
        body { margin: 0; background: transparent; color: white; font-family: sans-serif; overflow: hidden; }
        #control { position: absolute; top: 0; right: 0; width: 300px; height: 100vh; background: var(--bg); border-left: 2px solid var(--p); padding: 20px; z-index: 100; transform: translateX(100%); transition: 0.3s; }
        #control.active { transform: translateX(0); }
        input { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 10px; margin: 10px 0; border-radius: 4px; }
        #chat { position: absolute; bottom: 20px; left: 20px; width: 500px; }
        .msg { font-size: 24px; font-weight: bold; text-shadow: 2px 2px 2px #000; margin-top: 10px; }
        .user { color: var(--p); }
        .btn { width: 100%; background: var(--p); color: white; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
        #m-btn { position: absolute; top: 10px; right: 10px; background: var(--p); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; z-index: 101; cursor: pointer; }
    </style>
</head>
<body>

<button id="m-btn" onclick="document.getElementById('control').classList.toggle('active')">M</button>

<div id="control">
    <h2 style="color:var(--p)">MUGI_CORE</h2>
    <label>Channel</label><input type="text" id="ch" value="CrazyJapanese">
    <button class="btn" onclick="boot()">BOOT ENGINE</button>
    <p id="log" style="font-size: 12px; color: var(--g); margin-top: 20px;">Ready...</p>
</div>

<div id="chat"></div>

<script>
    let client = null;

    function boot() {
        const log = document.getElementById('log');
        if (typeof tmi === 'undefined') {
            log.innerText = "ERROR: tmi.min.js not found in your GitHub folder.";
            return;
        }

        const channel = document.getElementById('ch').value.toLowerCase();
        if(client) client.disconnect();

        client = new tmi.Client({ connection: { secure: true, reconnect: true }, channels: [channel] });
        client.connect().then(() => log.innerText = "ONLINE").catch(() => log.innerText = "CONN ERROR");

        client.on('message', (chan, tags, msg) => {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span class="user">${tags['display-name']}:</span> ${msg}`;
            chat.appendChild(div);
            if(chat.childNodes.length > 8) chat.removeChild(chat.firstChild);
        });
    }
</script>
</body>
</html>

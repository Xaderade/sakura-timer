<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugi Co. | Path-Finder Leaderboard v7.8</title>
    <script src="tmi.min.js"></script>
    <style>
        :root { --p: #9146ff; --g: #ffd700; --bg: rgba(10, 10, 15, 0.98); --success: #00ffcc; }
        body { margin: 0; background: transparent; color: white; font-family: sans-serif; overflow: hidden; }

        /* --- STATUS LIGHT (RESTORED) --- */
        #status { position: absolute; top: 10px; left: 10px; font-size: 14px; font-weight: bold; color: #555; z-index: 10; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 4px; }

        /* --- LEADERBOARD --- */
        #leaderboard { display: flex; gap: 20px; padding: 20px; background: rgba(0,0,0,0.85); width: fit-content; border-bottom: 4px solid var(--p); border-radius: 0 0 20px 0; margin-top: 50px; }
        .emote-slot { display: flex; flex-direction: column; align-items: center; min-width: 85px; }
        .rank-tag { font-size: 11px; font-weight: 900; background: var(--g); color: #000; padding: 2px 10px; border-radius: 4px; margin-bottom: 8px; }
        .img-wrap { height: 80px; width: 80px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); border-radius: 12px; }
        .emote-img { max-height: 65px; max-width: 65px; }
        .count { font-size: 26px; font-weight: 900; margin-top: 8px; text-shadow: 2px 2px 0 var(--p); }
        
        /* --- CONTROL PANEL --- */
        #control { position: absolute; top: 0; right: 0; width: 320px; height: 100vh; background: var(--bg); border-left: 2px solid var(--p); padding: 25px; z-index: 100; transform: translateX(100%); transition: 0.3s; }
        #control.active { transform: translateX(0); }
        input { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 12px; margin: 5px 0 15px 0; border-radius: 4px; box-sizing: border-box; }
        #m-toggle { position: absolute; top: 15px; right: 15px; background: var(--p); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; z-index: 101; cursor: pointer; font-weight: 900; }
        .pop { transform: scale(1.15); transition: 0.2s; }
    </style>
</head>
<body>

<div id="status">INITIALIZING...</div>
<button id="m-toggle" onclick="document.getElementById('control').classList.toggle('active')">M</button>

<div id="control">
    <h3 style="color:var(--p); margin-top:0;">MUGI_LEADERBOARD_v7.8</h3>
    <label style="font-size:11px; color:#888;">CHANNEL NAME</label>
    <input type="text" id="inp-ch" value="CrazyJapanese">
    <label style="font-size:11px; color:#888;">7TV USER ID</label>
    <input type="text" id="inp-id" value="01FEBH4WVG0008A7S9XD2BPYFJ">
    <button style="width:100%; padding:15px; background:var(--p); color:white; border:none; border-radius:6px; font-weight:900; cursor:pointer;" onclick="boot()">BOOT SYSTEM</button>
    <button style="width:100%; padding:10px; background:#222; color:#888; border:none; border-radius:6px; margin-top:15px; font-size:11px; cursor:pointer;" onclick="resetCounts()">RESET ALL COUNTS</button>
</div>

<div id="leaderboard">
    <div id="slot-0" class="emote-slot"><div class="rank-tag">RANK 1</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-1" class="emote-slot"><div class="rank-tag">RANK 2</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-2" class="emote-slot"><div class="rank-tag">RANK 3</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-3" class="emote-slot"><div class="rank-tag">RANK 4</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-4" class="emote-slot"><div class="rank-tag">RANK 5</div><div class="img-wrap"></div><div class="count">0</div></div>
</div>

<script>
    let tmiClient = null;
    let emoteMap = {};
    let emoteCounts = {};

    // --- STEP 1: YOUR EXACT WORKING v6.2 FETCH ---
    async function loadEmotes(SEVENTV_ID) {
        const status = document.getElementById('status');
        try {
            const response = await fetch(`https://7tv.io/v3/users/${SEVENTV_ID}`);
            const data = await response.json();
            const channelEmotes = data.emote_set.emotes;

            emoteMap = {}; // Reset Map
            channelEmotes.forEach(emote => {
                emoteMap[emote.name] = `https://cdn.7tv.app/emote/${emote.id}/2x.webp`;
            });

            const gRes = await fetch('https://7tv.io/v3/emote-sets/global');
            const gData = await gRes.json();
            gData.emotes.forEach(e => { emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/2x.webp`; });

            status.innerText = `ONLINE: ${Object.keys(emoteMap).length} EMOTES LOADED`;
            status.style.color = 'var(--success)';
        } catch (err) {
            console.error(err);
            status.innerText = "7TV FETCH FAILED";
        }
    }

    // --- STEP 2: DYNAMIC BOOT ---
    async function boot() {
        const ch = document.getElementById('inp-ch').value.trim();
        const id = document.getElementById('inp-id').value.trim();
        
        if (tmiClient) tmiClient.disconnect();
        
        // Run the working fetch logic first
        await loadEmotes(id);

        tmiClient = new tmi.Client({
            connection: { secure: true, reconnect: true },
            channels: [ch]
        });

        tmiClient.on('message', (chan, tags, msg) => {
            let found = new Set();
            msg.split(' ').forEach(word => {
                const clean = word.replace(/[\u200B-\u200D\uFEFF]/g, "");
                if (emoteMap[clean]) found.add(clean);
                if (tags.emotes) {
                    Object.keys(tags.emotes).forEach(id => {
                        const range = tags.emotes[id][0].split('-');
                        const name = msg.substring(parseInt(range[0]), parseInt(range[1]) + 1);
                        if(!emoteMap[name]) emoteMap[name] = `https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/2.0`;
                        found.add(name);
                    });
                }
            });

            found.forEach(e => { emoteCounts[e] = (emoteCounts[e] || 0) + 1; });
            if (found.size > 0) updateLeaderboard();
        });

        tmiClient.connect().then(() => {
            document.getElementById('control').classList.remove('active');
        });
    }

    function updateLeaderboard() {
        const sorted = Object.entries(emoteCounts).sort((a,b) => b[1] - a[1]).slice(0,5);
        sorted.forEach((item, i) => {
            const [name, count] = item;
            const slot = document.getElementById(`slot-${i}`);
            const wrap = slot.querySelector('.img-wrap');
            if (wrap.getAttribute('data-name') !== name) {
                wrap.innerHTML = `<img src="${emoteMap[name]}" class="emote-img">`;
                wrap.setAttribute('data-name', name);
                slot.classList.add('pop');
                setTimeout(() => slot.classList.remove('pop'), 300);
            }
            slot.querySelector('.count').innerText = count;
        });
    }

    function resetCounts() {
        emoteCounts = {};
        for(let i=0; i<5; i++) {
            const slot = document.getElementById(`slot-${i}`);
            slot.querySelector('.img-wrap').innerHTML = "";
            slot.querySelector('.img-wrap').removeAttribute('data-name');
            slot.querySelector('.count').innerText = "0";
        }
    }

    // Auto-run on load with default values
    boot();
</script>
</body>
</html>

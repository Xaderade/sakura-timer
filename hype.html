<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugi Co. | Emote Leaderboard v7.0</title>
    <script src="tmi.min.js"></script>
    <style>
        :root { --p: #9146ff; --g: #ffd700; --bg: rgba(0, 0, 0, 0.7); }
        body { margin: 0; background: transparent; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- LEADERBOARD CONTAINER --- */
        #leaderboard {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: var(--bg);
            border-bottom: 3px solid var(--p);
            width: fit-content;
            border-radius: 0 0 15px 0;
        }

        .emote-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .rank-box {
            font-size: 14px;
            font-weight: 900;
            color: var(--g);
            background: #000;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 5px;
            border: 1px solid var(--g);
        }

        .emote-img {
            height: 64px;
            width: 64px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }

        .count {
            font-size: 22px;
            font-weight: 900;
            margin-top: 5px;
            font-family: 'Roboto Mono', monospace;
        }

        /* Animation for when a rank changes */
        .pop { transform: scale(1.2); }
    </style>
</head>
<body>

<div id="leaderboard">
    <div id="slot-0" class="emote-slot"><div class="rank-box">#1</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-1" class="emote-slot"><div class="rank-box">#2</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-2" class="emote-slot"><div class="rank-box">#3</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-3" class="emote-slot"><div class="rank-box">#4</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-4" class="emote-slot"><div class="rank-box">#5</div><div class="img-wrap"></div><div class="count">0</div></div>
</div>

<script>
    const CHANNEL = 'CrazyJapanese';
    const SEVENTV_ID = '01FEBH4WVG0008A7S9XD2BPYFJ';
    
    let emoteMap = {};
    let emoteCounts = {}; // Stores { "catJAM": 15, "LUL": 10 }

    async function loadEmotes() {
        try {
            const response = await fetch(`https://7tv.io/v3/users/${SEVENTV_ID}`);
            const data = await response.json();
            data.emote_set.emotes.forEach(e => {
                emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/4x.webp`; // 4x for high quality
            });
            const gRes = await fetch('https://7tv.io/v3/emote-sets/global');
            const gData = await gRes.json();
            gData.emotes.forEach(e => { emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/4x.webp`; });
        } catch (err) { console.error("7TV Load Error", err); }
    }

    const client = new tmi.Client({ connection: { secure: true, reconnect: true }, channels: [CHANNEL] });

    client.on('message', (chan, tags, msg) => {
        const words = msg.split(' ');
        let foundInMsg = new Set(); // Prevent one person spamming 10 of the same emote in 1 msg from counting as 10

        words.forEach(word => {
            const clean = word.replace(/[\u200B-\u200D\uFEFF]/g, "");
            
            // Handle 7TV
            if (emoteMap[clean]) foundInMsg.add(clean);
            
            // Handle Twitch Native
            if (tags.emotes) {
                Object.keys(tags.emotes).forEach(id => {
                    // Twitch emotes are identified by ID, but we use the name for the leaderboard
                    const range = tags.emotes[id][0].split('-');
                    const name = msg.substring(parseInt(range[0]), parseInt(range[1]) + 1);
                    if (!emoteMap[name]) {
                        emoteMap[name] = `https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/3.0`;
                    }
                    foundInMsg.add(name);
                });
            }
        });

        // Update the counts
        foundInMsg.forEach(emote => {
            emoteCounts[emote] = (emoteCounts[emote] || 0) + 1;
        });

        updateLeaderboard();
    });

    function updateLeaderboard() {
        // Sort emotes by count
        const sorted = Object.entries(emoteCounts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 5); // Take top 5

        sorted.forEach((data, index) => {
            const [name, count] = data;
            const slot = document.getElementById(`slot-${index}`);
            const imgWrap = slot.querySelector('.img-wrap');
            const countDiv = slot.querySelector('.count');

            // Update Image if changed
            const currentImg = imgWrap.querySelector('img');
            if (!currentImg || currentImg.getAttribute('data-name') !== name) {
                imgWrap.innerHTML = `<img src="${emoteMap[name]}" class="emote-img" data-name="${name}">`;
                slot.classList.add('pop');
                setTimeout(() => slot.classList.remove('pop'), 500);
            }

            // Update Count
            countDiv.innerText = count;
        });
    }

    client.connect();
    loadEmotes();
</script>
</body>
</html>

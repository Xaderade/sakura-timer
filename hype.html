<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugi Co. | Manual v9.7</title>
    <script src="tmi.min.js"></script>
    <style>
        :root { --p: #9146ff; --g: #ffd700; --chroma: #00FF00; }
        body { margin: 0; background-color: var(--chroma); color: white; font-family: sans-serif; overflow: hidden; }
        
        #hud { position: absolute; top: 10px; left: 10px; z-index: 100; display: flex; flex-direction: column; gap: 4px; }
        .indicator { font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 3px; background: rgba(0,0,0,0.8); border-left: 3px solid #444; width: fit-content; min-width: 100px; }
        .indicator.on { border-left-color: #00ffcc; color: #00ffcc; }
        .indicator.err { border-left-color: #ff4d4d; color: #ff4d4d; }
        .indicator.total { border-left-color: var(--p); color: #fff; }

        #leaderboard { display: flex; justify-content: center; align-items: flex-end; gap: 60px; width: 100vw; height: 100vh; padding-bottom: 50px; box-sizing: border-box; }
        .emote-slot { display: flex; flex-direction: column; align-items: center; transition: transform 0.1s; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.9)); }
        .rank-tag { font-size: 20px; font-weight: 900; background: var(--g); color: #000; padding: 4px 15px; border-radius: 6px; margin-bottom: 15px; }
        .img-wrap { height: 200px; width: 200px; display: flex; align-items: center; justify-content: center; }
        .emote-img { max-height: 200px; max-width: 200px; object-fit: contain; }
        .count { font-size: 64px; font-weight: 900; margin-top: 10px; text-shadow: 5px 5px 0 var(--p), -2px -2px 0 #000; }

        #control { position: absolute; top: 0; right: 0; width: 280px; height: 100vh; background: #111; border-left: 4px solid var(--p); padding: 20px; z-index: 200; transform: translateX(100%); transition: 0.3s; }
        #control.active { transform: translateX(0); }
        input { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 8px; margin: 4px 0 10px 0; border-radius: 4px; font-size: 12px; }
        #m-toggle { position: absolute; top: 10px; right: 10px; background: var(--p); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; z-index: 201; cursor: pointer; font-size: 20px; }
        .pop { transform: scale(1.2); }
    </style>
</head>
<body>

<div id="hud">
    <div id="stat-7tv" class="indicator">7TV: 0</div>
    <div id="stat-bttv" class="indicator">BTTV: 0</div>
    <div id="stat-total" class="indicator total">TOTAL: 0</div>
    <div id="stat-tmi" class="indicator">TWITCH: STANDBY</div>
</div>

<button id="m-toggle" onclick="document.getElementById('control').classList.toggle('active')">M</button>

<div id="control">
    <h3 style="margin:0; color:var(--p);">MUGI_RESTORE_v9.7</h3>
    <label style="font-size:10px; color:#777;">CHANNEL NAME</label>
    <input type="text" id="inp-ch" value="forsen">
    <label style="font-size:10px; color:#777;">7TV USER ID</label>
    <input type="text" id="inp-7id" value="60a4f32c969317208d927d2c">
    <label style="font-size:10px; color:#777;">BTTV TWITCH ID (Numeric)</label>
    <input type="text" id="inp-bid" value="22484632">
    <label style="font-size:10px; color:#777;">DRAIN SEC</label>
    <input type="number" id="inp-decay" value="0.2" step="0.1">
    <button style="width:100%; padding:15px; background:var(--p); color:white; border:none; cursor:pointer; font-weight:bold; border-radius:5px;" onclick="reboot()">BOOT OVERLAY</button>
</div>

<div id="leaderboard">
    <div id="slot-0" class="emote-slot" style="display:none;"><div class="rank-tag">#1</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-1" class="emote-slot" style="display:none;"><div class="rank-tag">#2</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-2" class="emote-slot" style="display:none;"><div class="rank-tag">#3</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-3" class="emote-slot" style="display:none;"><div class="rank-tag">#4</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-4" class="emote-slot" style="display:none;"><div class="rank-tag">#5</div><div class="img-wrap"></div><div class="count">0</div></div>
</div>

<script>
    let emoteMap = {};
    let emoteCounts = {};
    let client = null;
    let mainLoop = null;

    const setStat = (id, text, state) => {
        const el = document.getElementById(`stat-${id}`);
        if(el) { el.innerText = text; if(state) el.className = `indicator ${state}`; }
    };

    async function loadAssets(sId, bId) {
        emoteMap = {};
        let count7tv = 0;
        let countBttv = 0;

        // 7TV Channel
        try {
            const sRes = await fetch(`https://7tv.io/v3/users/${sId}`);
            if(sRes.ok) {
                const sData = await sRes.json();
                sData.emote_set.emotes.forEach(e => { emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/4x.webp`; count7tv++; });
            }
        } catch(e) {}

        // 7TV Global
        try {
            const g7 = await fetch('https://7tv.io/v3/emote-sets/global').then(r => r.json());
            g7.emotes.forEach(e => { if(!emoteMap[e.name]) { emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/4x.webp`; count7tv++; } });
            setStat('7tv', `7TV: ${count7tv} LOADED`, 'on');
        } catch(e) { setStat('7tv', '7TV: FAILED', 'err'); }

        // BTTV Channel
        try {
            const bLook = await fetch(`https://api.betterttv.net/3/cached/users/twitch/${bId}`);
            if(bLook.ok) {
                const bData = await bLook.json();
                [...(bData.sharedEmotes||[]), ...(bData.channelEmotes||[])].forEach(e => {
                    emoteMap[e.code] = `https://cdn.betterttv.net/emote/${e.id}/3x`;
                    countBttv++;
                });
                setStat('bttv', `BTTV: ${countBttv} LOADED`, 'on');
            }
        } catch(e) { setStat('bttv', 'BTTV: FAILED', 'err'); }

        setStat('total', `TOTAL: ${Object.keys(emoteMap).length} EMOTES`, 'total');
    }

    function startEngine() {
        if(mainLoop) clearInterval(mainLoop);
        mainLoop = setInterval(() => {
            const drain = parseFloat(document.getElementById('inp-decay').value) || 0.2;
            Object.keys(emoteCounts).forEach(k => {
                emoteCounts[k] -= drain;
                if(emoteCounts[k] <= 0) delete emoteCounts[k];
            });
            updateLeaderboard(false);
        }, 1000);
    }

    async function reboot() {
        if (typeof tmi === 'undefined') return;
        const CH = document.getElementById('inp-ch').value.trim().toLowerCase();
        const S_ID = document.getElementById('inp-7id').value.trim();
        const B_ID = document.getElementById('inp-bid').value.trim();

        if (client) { try { await client.disconnect(); } catch(e){} }
        
        emoteCounts = {};
        await loadAssets(S_ID, B_ID);
        startEngine();

        client = new tmi.Client({ connection: { secure: true, reconnect: true }, channels: [CH] });
        client.on('message', (chan, tags, msg) => {
            let found = new Set();
            msg.split(' ').forEach(w => {
                const c = w.replace(/[\u200B-\u200D\uFEFF]/g, "");
                if (emoteMap[c]) found.add(c);
            });
            if (tags.emotes) {
                Object.keys(tags.emotes).forEach(id => {
                    tags.emotes[id].forEach(r => {
                        const rr = r.split('-');
                        const n = msg.substring(parseInt(rr[0]), parseInt(rr[1]) + 1);
                        if(!emoteMap[n]) emoteMap[n] = `https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/3.0`;
                        found.add(n);
                    });
                });
            }
            if (found.size > 0) {
                found.forEach(e => { emoteCounts[e] = (emoteCounts[e] || 0) + 1; });
                updateLeaderboard(true);
            }
        });
        client.connect().then(() => setStat('tmi', `TWITCH: ${CH.toUpperCase()}`, 'on')).catch(() => setStat('tmi', 'TWITCH: FAIL', 'err'));
        document.getElementById('control').classList.remove('active');
    }

    function updateLeaderboard(isChat) {
        const sorted = Object.entries(emoteCounts).sort((a,b) => b[1] - a[1]).slice(0,5);
        for(let i=0; i<5; i++) {
            const slot = document.getElementById(`slot-${i}`);
            const wrap = slot.querySelector('.img-wrap');
            const countEl = slot.querySelector('.count');
            if(sorted[i]) {
                const [n, c] = sorted[i];
                const cur = Math.floor(c);
                const last = parseInt(slot.getAttribute('data-lastcount') || 0);
                if (wrap.getAttribute('data-name') !== n) {
                    wrap.innerHTML = `<img src="${emoteMap[n]}" class="emote-img">`;
                    wrap.setAttribute('data-name', n);
                }
                if (isChat && cur > last) {
                    slot.classList.remove('pop'); void slot.offsetWidth; slot.classList.add('pop');
                    setTimeout(() => slot.classList.remove('pop'), 100);
                }
                countEl.innerText = cur;
                slot.setAttribute('data-lastcount', cur);
                slot.style.display = "flex";
            } else {
                slot.style.display = "none";
            }
        }
    }
    window.onload = () => { setTimeout(reboot, 500); };
</script>
</body>
</html>

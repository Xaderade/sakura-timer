<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugi Co. | Hype Engine v16.5 [PEER-CORE]</title>
    <script src="tmi.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

        :root { 
            --p: #9146ff; --cyan: #00ffff; --g: #ffd700; --red: #ff4d4d; --chroma: #00FF00; 
            --ui-bg: rgba(0, 0, 0, 0.95);
            --font-main: 'Inter', sans-serif; 
        }
        
        body { margin: 0; background-color: transparent; color: white; font-family: var(--font-main); overflow: hidden; user-select: none; }
        
        /* HUD & Indicators */
        #hud { position: absolute; top: 10px; left: 10px; z-index: 100; display: flex; flex-direction: column; gap: 3px; display: none; }
        .indicator { font-size: 10px; font-weight: 900; padding: 4px 12px; background: rgba(0,0,0,0.95); border-left: 4px solid #444; min-width: 250px; text-transform: uppercase; }
        .indicator.on { border-left-color: #00ffcc; color: #00ffcc; }

        /* Leaderboard */
        #leaderboard { display: flex; justify-content: center; align-items: flex-end; gap: 50px; width: 100vw; height: 100vh; padding-bottom: 100px; box-sizing: border-box; }
        .emote-slot { position: relative; display: flex; flex-direction: column; align-items: center; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.4); opacity: 0; transform: translateY(50px); }
        .emote-slot.active { opacity: 1; transform: translateY(0); }

        .img-wrap { 
            height: 220px; width: 220px; display: flex; align-items: center; justify-content: center; 
            background: var(--ui-bg); border: 6px solid #fff; box-shadow: 10px 10px 0px #000; 
            margin-bottom: 20px; position: relative; z-index: 5; transition: 0.2s;
        }
        .emote-img { max-height: 210px; max-width: 210px; object-fit: contain; }
        
        .flash-1 { background-color: rgba(145, 70, 255, 0.5) !important; border-color: var(--p) !important; box-shadow: 0 0 20px var(--p), 10px 10px 0px #000 !important; }
        .flash-2 { background-color: rgba(0, 255, 255, 0.5) !important; border-color: var(--cyan) !important; box-shadow: 0 0 30px var(--cyan), 10px 10px 0px #000 !important; }
        .flash-3 { background-color: rgba(255, 215, 0, 0.5) !important; border-color: var(--g) !important; box-shadow: 0 0 40px var(--g), 10px 10px 0px #000 !important; }
        .flash-4 { background-color: rgba(255, 77, 77, 0.5) !important; border-color: var(--red) !important; box-shadow: 0 0 60px var(--red), 10px 10px 0px #000 !important; }

        .count { 
            font-size: 92px; font-weight: 900; margin-top: -70px; position: relative; z-index: 10;
            text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000, 8px 8px 0 #000; 
        }

        /* Animations */
        .count-pop { animation: countBump 0.15s ease-out; }
        @keyframes countBump { 0% { transform: scale(1.2); } 100% { transform: scale(1); } }
        
        .combo-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .riser {
            position: absolute; left: 50%; top: 40%; font-weight: 900; font-size: 56px; color: #fff;
            text-shadow: -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000;
            animation: interRise 1.2s forwards; white-space: nowrap;
        }
        @keyframes interRise { 0% { transform: translate(-50%, 0) scale(0.4); opacity: 0; } 15% { opacity: 1; } 100% { transform: translate(-50%, -200px); opacity: 0; } }

        .milestone {
            position: absolute; left: 50%; bottom: 250px; font-weight: 900; white-space: nowrap; z-index: 100;
            animation: milestoneSplash 2.0s forwards;
        }
        .m-tier-4 { font-size: 65px; color: #fff; text-shadow: 0 0 50px var(--red); animation: glitch 0.1s infinite; }
        @keyframes glitch { 0% { transform: translate(-50.5%, 0); } 100% { transform: translate(-49.5%, 0); } }
        @keyframes milestoneSplash { 0% { transform: translate(-50%, 50px); opacity: 0; } 10% { opacity: 1; } 100% { transform: translate(-50%, -150px); opacity: 0; } }

        /* Control UI */
        #control { 
            position: fixed; inset: 0; background: #111; z-index: 200; padding: 40px; 
            display: none; flex-direction: column; gap: 15px; overflow-y: auto;
        }
        .card { background: #1a1a1a; padding: 20px; border-radius: 8px; border-left: 5px solid var(--p); }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; margin-top: 10px; box-sizing: border-box; font-weight: bold; }
        button { width: 100%; padding: 20px; background: var(--p); color: #fff; border: none; font-weight: 900; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="hud">
    <div class="indicator on" id="stat-peer">PEER: INITIALIZING</div>
    <div class="indicator" id="stat-tmi">TWITCH: IDLE</div>
    <div class="indicator" id="stat-assets">ASSETS: 0</div>
</div>

<div id="control">
    <h1 style="color:var(--p); margin:0;">MUGI REMOTE CONTROL</h1>
    <div class="card">
        <label>TWITCH CHANNEL</label>
        <input type="text" id="inp-ch" placeholder="Channel Name">
        <label style="display:block; margin-top:15px;">7TV USER ID (OPTIONAL)</label>
        <input type="text" id="inp-7id" placeholder="User ID">
        <button onclick="peerBoot()">SEND BOOT COMMAND</button>
    </div>
    <button onclick="peerReset()" style="background:#444;">RESET ALL COUNTS</button>
    <div id="status-msg" style="color:#666; font-size:12px; margin-top:10px;">Status: Waiting for Peer ID...</div>
</div>

<div id="leaderboard">
    <div id="slot-0" class="emote-slot"><div class="combo-container"></div><div class="img-wrap"></div><div class="count">x0</div></div>
    <div id="slot-1" class="emote-slot"><div class="combo-container"></div><div class="img-wrap"></div><div class="count">x0</div></div>
    <div id="slot-2" class="emote-slot"><div class="combo-container"></div><div class="img-wrap"></div><div class="count">x0</div></div>
    <div id="slot-3" class="emote-slot"><div class="combo-container"></div><div class="img-wrap"></div><div class="count">x0</div></div>
</div>

<script>
    const PEER_ID = 'mugi-hype-engine-2026';
    const isController = window.location.hash.includes('control');
    let emoteMap = {};
    let emoteCounts = {};
    let client = null;
    let mainLoop = null;
    let decayRate = 0.15;

    // --- PeerJS Setup ---
    const peer = new Peer(isController ? null : PEER_ID);
    
    peer.on('open', (id) => {
        if(isController) {
            document.getElementById('control').style.display = 'flex';
            document.getElementById('status-msg').innerText = "Status: Ready. Controller ID: " + id;
        } else {
            document.getElementById('hud').style.display = 'flex';
            document.getElementById('stat-peer').innerText = "PEER: HOST READY";
        }
    });

    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            if(data.type === 'BOOT') reboot(data.ch, data.id7);
            if(data.type === 'RESET') { emoteCounts = {}; updateLeaderboard(null); }
        });
    });

    function peerBoot() {
        const ch = document.getElementById('inp-ch').value.trim();
        const id7 = document.getElementById('inp-7id').value.trim();
        if(!ch) return;
        const conn = peer.connect(PEER_ID);
        conn.on('open', () => {
            conn.send({ type: 'BOOT', ch, id7 });
            document.getElementById('status-msg').innerText = "Status: Boot command sent to OBS!";
        });
    }

    function peerReset() {
        const conn = peer.connect(PEER_ID);
        conn.on('open', () => conn.send({ type: 'RESET' }));
    }

    // --- Asset Loading ---
    async function loadAssets(userId, channel) {
        let assetCount = 0;
        const updateAssetStat = () => document.getElementById('stat-assets').innerText = `ASSETS: ${assetCount}`;

        fetch('https://7tv.io/v3/emote-sets/global').then(r => r.json()).then(g => {
            g.emotes?.forEach(e => { emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/4x.webp`; assetCount++; });
            updateAssetStat();
        });

        try {
            const twRes = await fetch(`https://api.ivr.fi/v2/twitch/user?login=${channel}`);
            const twData = await twRes.json();
            const tId = twData[0]?.id;
            if(tId) {
                fetch(`https://api.betterttv.net/3/cached/users/twitch/${tId}`).then(r => r.json()).then(d => {
                    [...(d.channelEmotes||[]), ...(d.sharedEmotes||[])].forEach(e => { emoteMap[e.code] = `https://cdn.betterttv.net/emote/${e.id}/3x`; assetCount++; });
                    updateAssetStat();
                });
            }
        } catch(e) {}
    }

    // --- Core Engine ---
    function reboot(CH, ID7) {
        loadAssets(ID7, CH);
        if(client) client.disconnect();
        if(mainLoop) clearInterval(mainLoop);
        emoteCounts = {};

        mainLoop = setInterval(() => {
            Object.keys(emoteCounts).forEach(k => {
                const pressure = emoteCounts[k] * 0.02;
                emoteCounts[k] -= (decayRate + pressure);
                if(emoteCounts[k] <= 0) delete emoteCounts[k];
            });
            updateLeaderboard(null);
        }, 1000);

        client = new tmi.Client({ channels: [CH] });
        client.on('connected', () => document.getElementById('stat-tmi').innerText = `CONNECTED: ${CH.toUpperCase()}`);
        client.on('message', (chan, tags, msg) => {
            let found = [];
            msg.split(' ').forEach(w => { if(emoteMap[w]) found.push(w); });
            if(tags.emotes) {
                Object.keys(tags.emotes).forEach(id => {
                    const n = msg.substring(parseInt(tags.emotes[id][0].split('-')[0]), parseInt(tags.emotes[id][0].split('-')[1]) + 1);
                    if(!emoteMap[n]) emoteMap[n] = `https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/3.0`;
                    tags.emotes[id].forEach(() => found.push(n));
                });
            }
            [...new Set(found)].forEach(e => { 
                emoteCounts[e] = (emoteCounts[e] || 0) + 1; 
                updateLeaderboard(e); 
            });
        });
        client.connect();
    }

    function spawnComboEffect(slot, count) {
        const container = slot.querySelector('.combo-container');
        const wrap = slot.querySelector('.img-wrap');
        const riser = document.createElement('div');
        riser.className = 'riser'; riser.innerText = '+1';
        container.appendChild(riser);
        setTimeout(() => riser.remove(), 1200);

        const val = Math.floor(count);
        let tier = 0, text = "";
        if (val === 10) { tier = 1; text = "+10 COMBO"; }
        else if (val === 25) { tier = 2; text = "+25 ULTRA!!"; }
        else if (val === 50) { tier = 3; text = "+50 MEGA!!"; }
        else if (val === 100) { tier = 4; text = "100 GODLIKE"; }

        if (text) {
            const m = document.createElement('div');
            m.className = `milestone m-tier-${tier}`; m.innerText = text;
            container.appendChild(m);
            wrap.className = `img-wrap flash-${tier}`;
            setTimeout(() => { wrap.className = 'img-wrap'; m.remove(); }, 2000);
        }
    }

    function updateLeaderboard(triggered) {
        const sorted = Object.entries(emoteCounts).sort((a,b) => b[1]-a[1]).slice(0,4);
        for(let i=0; i<4; i++){
            const slot = document.getElementById(`slot-${i}`);
            const wrap = slot.querySelector('.img-wrap');
            const countEl = slot.querySelector('.count');
            if(sorted[i]){
                const [n, c] = sorted[i];
                if(wrap.getAttribute('data-name') !== n){
                    wrap.innerHTML = `<img src="${emoteMap[n]}" class="emote-img">`;
                    wrap.setAttribute('data-name', n);
                }
                countEl.innerText = 'x' + Math.ceil(c);
                slot.classList.add('active');
                if(triggered === n) {
                    countEl.classList.remove('count-pop'); void countEl.offsetWidth; countEl.classList.add('count-pop');
                    spawnComboEffect(slot, c);
                }
            } else { slot.classList.remove('active'); }
        }
    }

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const ch = urlParams.get('ch');
        if(ch && !isController) setTimeout(() => reboot(ch, ""), 1500);
    };
</script>
</body>
</html>

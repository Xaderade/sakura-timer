<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugi Co. | No-Fail v10.3</title>
    <script src="tmi.min.js"></script>
    <style>
        :root { --p: #9146ff; --g: #ffd700; --chroma: #00FF00; }
        body { margin: 0; background-color: var(--chroma); color: white; font-family: sans-serif; overflow: hidden; }
        
        #hud { position: absolute; top: 10px; left: 10px; z-index: 100; display: flex; flex-direction: column; gap: 4px; }
        .indicator { font-size: 10px; font-weight: bold; padding: 4px 12px; border-radius: 3px; background: rgba(0,0,0,0.85); border-left: 3px solid #444; width: fit-content; min-width: 150px; }
        .indicator.on { border-left-color: #00ffcc; color: #00ffcc; }
        .indicator.err { border-left-color: #ff4d4d; color: #ff4d4d; }

        #leaderboard { display: flex; justify-content: center; align-items: flex-end; gap: 60px; width: 100vw; height: 100vh; padding-bottom: 50px; box-sizing: border-box; }
        .emote-slot { display: flex; flex-direction: column; align-items: center; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.9)); }
        .rank-tag { font-size: 20px; font-weight: 900; background: var(--g); color: #000; padding: 4px 15px; border-radius: 6px; margin-bottom: 15px; }
        .img-wrap { height: 220px; width: 220px; display: flex; align-items: center; justify-content: center; }
        .emote-img { max-height: 220px; max-width: 220px; object-fit: contain; }
        .count { font-size: 72px; font-weight: 900; margin-top: 10px; text-shadow: 6px 6px 0 var(--p), -2px -2px 0 #000; }

        #control { position: absolute; top: 0; right: 0; width: 300px; height: 100vh; background: #111; border-left: 4px solid var(--p); padding: 25px; z-index: 200; transform: translateX(100%); transition: 0.3s; box-sizing: border-box; }
        #control.active { transform: translateX(0); }
        label { font-size: 11px; color: var(--p); font-weight: bold; display: block; margin-top: 15px; }
        input { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 12px; margin-top: 5px; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        #m-toggle { position: absolute; top: 10px; right: 10px; background: var(--p); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; z-index: 201; cursor: pointer; font-size: 22px; font-weight: bold; }
        .pop { transform: scale(1.15); transition: 0.05s; }
    </style>
</head>
<body>

<div id="hud">
    <div id="stat-7tv" class="indicator">7TV: 0 LOADED</div>
    <div id="stat-total" class="indicator">TOTAL: 0 LOADED</div>
    <div id="stat-tmi" class="indicator">TWITCH: STANDBY</div>
</div>

<button id="m-toggle" onclick="document.getElementById('control').classList.toggle('active')">M</button>

<div id="control">
    <h3 style="margin:0; color:var(--p);">MUGI_STABLE v10.3</h3>
    <label>Twitch Channel</label>
    <input type="text" id="inp-ch" value="CrazyJapanese">
    <label>7TV User ID</label>
    <input type="text" id="inp-7id" value="01FEBH4WVG0008A7S9XD2BPYFJ">
    <label>Drain Rate</label>
    <input type="number" id="inp-decay" value="0.2" step="0.1">
    <button style="width:100%; padding:18px; background:var(--p); color:white; border:none; cursor:pointer; font-weight:bold; border-radius:6px; margin-top: 25px;" onclick="reboot()">BOOT OVERLAY</button>
</div>

<div id="leaderboard">
    <div id="slot-0" class="emote-slot" style="display:none;"><div class="rank-tag">#1</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-1" class="emote-slot" style="display:none;"><div class="rank-tag">#2</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-2" class="emote-slot" style="display:none;"><div class="rank-tag">#3</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-3" class="emote-slot" style="display:none;"><div class="rank-tag">#4</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-4" class="emote-slot" style="display:none;"><div class="rank-tag">#5</div><div class="img-wrap"></div><div class="count">0</div></div>
</div>

<script>
    let emoteMap = {};
    let emoteCounts = {};
    let client = null;
    let mainLoop = null;

    const setStat = (id, text, state) => {
        const el = document.getElementById(`stat-${id}`);
        if(el) { el.innerText = text; if(state) el.className = `indicator ${state}`; }
    };

    async function loadAssets(userId) {
        emoteMap = {};
        let count7tv = 0;

        try {
            // STEP 1: USER CHANNEL EMOTES (v6.2 Path)
            const response = await fetch(`https://7tv.io/v3/users/${userId}`);
            const data = await response.json();
            
            if(data.emote_set && data.emote_set.emotes) {
                data.emote_set.emotes.forEach(emote => {
                    emoteMap[emote.name] = `https://cdn.7tv.app/emote/${emote.id}/4x.webp`;
                    count7tv++;
                });
            }

            // STEP 2: GLOBAL EMOTES
            const gRes = await fetch('https://7tv.io/v3/emote-sets/global');
            const gData = await gRes.json();
            if(gData.emotes) {
                gData.emotes.forEach(e => { 
                    if(!emoteMap[e.name]) {
                        emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/4x.webp`;
                        count7tv++;
                    }
                });
            }

            setStat('7tv', `7TV: ${count7tv} LOADED`, 'on');
            setStat('total', `TOTAL: ${Object.keys(emoteMap).length} LOADED`, 'on');
        } catch (err) {
            console.error("Asset Load Error:", err);
            setStat('7tv', "FETCH FAILED", 'err');
        }
    }

    function startEngine() {
        if(mainLoop) clearInterval(mainLoop);
        mainLoop = setInterval(() => {
            const drain = parseFloat(document.getElementById('inp-decay').value) || 0.2;
            Object.keys(emoteCounts).forEach(k => {
                emoteCounts[k] -= drain;
                if(emoteCounts[k] <= 0) delete emoteCounts[k];
            });
            updateLeaderboard(false);
        }, 1000);
    }

    async function reboot() {
        const CH = document.getElementById('inp-ch').value.trim();
        const ID = document.getElementById('inp-7id').value.trim();

        if (client) { try { await client.disconnect(); } catch(e){} }
        
        emoteCounts = {};
        await loadAssets(ID);
        startEngine();

        if (typeof tmi === 'undefined') {
            setStat('tmi', 'TMI.JS MISSING', 'err');
            return;
        }

        client = new tmi.Client({ connection: { secure: true, reconnect: true }, channels: [CH] });
        
        client.on('message', (chan, tags, msg) => {
            let found = new Set();
            
            // 7TV & Global Detection
            msg.split(' ').forEach(w => {
                const cleanWord = w.replace(/[\u200B-\u200D\uFEFF]/g, "");
                if (emoteMap[cleanWord]) found.add(cleanWord);
            });
            
            // Twitch Native Detection
            if (tags.emotes) {
                Object.keys(tags.emotes).forEach(id => {
                    tags.emotes[id].forEach(range => {
                        const r = range.split('-');
                        const name = msg.substring(parseInt(r[0]), parseInt(r[1]) + 1);
                        if(!emoteMap[name]) emoteMap[name] = `https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/3.0`;
                        found.add(name);
                    });
                });
            }
            
            if (found.size > 0) {
                found.forEach(e => { emoteCounts[e] = (emoteCounts[e] || 0) + 1; });
                updateLeaderboard(true);
            }
        });
        
        client.connect()
            .then(() => setStat('tmi', `TWITCH: ${CH.toUpperCase()}`, 'on'))
            .catch(() => setStat('tmi', 'TWITCH: FAIL', 'err'));
            
        document.getElementById('control').classList.remove('active');
    }

    function updateLeaderboard(isChat) {
        const sorted = Object.entries(emoteCounts).sort((a,b) => b[1] - a[1]).slice(0,5);
        for(let i=0; i<5; i++) {
            const slot = document.getElementById(`slot-${i}`);
            const wrap = slot.querySelector('.img-wrap');
            const countEl = slot.querySelector('.count');
            
            if(sorted[i]) {
                const [n, c] = sorted[i];
                const cur = Math.floor(c);
                const last = parseInt(slot.getAttribute('data-lastcount') || 0);
                
                if (wrap.getAttribute('data-name') !== n) {
                    wrap.innerHTML = `<img src="${emoteMap[n]}" class="emote-img">`;
                    wrap.setAttribute('data-name', n);
                }
                
                if (isChat && cur > last) {
                    slot.classList.remove('pop'); void slot.offsetWidth; slot.classList.add('pop');
                    setTimeout(() => slot.classList.remove('pop'), 100);
                }
                
                countEl.innerText = cur;
                slot.setAttribute('data-lastcount', cur);
                slot.style.display = "flex";
            } else {
                slot.style.display = "none";
            }
        }
    }
    
    // Auto-boot on load
    window.onload = () => { setTimeout(reboot, 800); };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugi Co. | Engine v16.7.1 [RISER ADDITION]</title>
    
    <script src="tmi.min.js"></script>
    <script src="peerjs.min.js"></script>

    <script>
        const PEER_ID = 'mugi-link-123'; 
        const urlParams = new URLSearchParams(window.location.search);
        const isRemote = urlParams.has('control');
        const peer = new Peer(isRemote ? null : PEER_ID);
        let activeConn = null;

        if (!isRemote) {
            peer.on('connection', (conn) => {
                activeConn = conn;
                updateCtrlStatus('obs', 'REMOTE ACTIVE', 'on');
                conn.on('data', (data) => {
                    if (data.type === 'BOOT') {
                        document.getElementById('inp-ch').value = data.ch;
                        if(data.id7) document.getElementById('inp-7id').value = data.id7;
                        reboot(); 
                    }
                });
            });
        } else {
            peer.on('open', () => {
                const conn = peer.connect(PEER_ID);
                conn.on('open', () => {
                    activeConn = conn;
                    updateCtrlStatus('obs', 'LINKED TO OBS', 'on');
                });
                conn.on('data', (data) => {
                    if (data.type === 'SYNC_ASSETS') {
                        document.getElementById('cnt-7tv').innerText = data.counts.s7;
                        document.getElementById('cnt-bttv').innerText = data.counts.bttv;
                        document.getElementById('cnt-ffz').innerText = data.counts.ffz;
                        document.getElementById('cnt-tw').innerText = data.counts.tw;
                        document.getElementById('stat-assets').innerText = `ASSETS: ${data.total}`;
                    }
                });
            });
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        :root { 
            --p: #9146ff; --cyan: #00ffff; --g: #ffd700; --red: #ff4d4d; 
            --ui-bg: rgba(0, 0, 0, 0.95); --font-main: 'Inter', sans-serif; 
        }
        
        body { margin: 0; background-color: transparent; color: white; font-family: var(--font-main); overflow: hidden; user-select: none; }
        
        /* HUD & CONTROL UI */
        #hud { position: absolute; top: 10px; left: 10px; z-index: 100; display: flex; flex-direction: column; gap: 3px; }
        .indicator { font-size: 10px; font-weight: 900; padding: 4px 12px; background: rgba(0,0,0,0.95); border-left: 4px solid #444; min-width: 280px; text-transform: uppercase; }
        .indicator.version { background: var(--p); border-left: none; text-align: center; font-size: 11px; margin-bottom: 2px; }
        .indicator.on { border-left-color: #00ffcc; color: #00ffcc; }

        /* LEADERBOARD & COMBO STYLING */
        #leaderboard { display: flex; justify-content: center; align-items: flex-end; gap: 40px; width: 100vw; height: 100vh; padding-bottom: 60px; box-sizing: border-box; position: absolute; bottom: 0; left: 0; }
        
        .emote-slot { position: relative; display: flex; flex-direction: column; align-items: center; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.4); opacity: 0; transform: translateY(50px); }
        .emote-slot.active { opacity: 1; transform: translateY(0); }

        .img-wrap { 
            height: 200px; width: 200px; display: flex; align-items: center; justify-content: center; 
            background: var(--ui-bg); border: 8px solid #fff; box-shadow: 10px 10px 0px #000; 
            margin-bottom: -15px; position: relative; z-index: 5; transition: background 0.3s, border-color 0.3s;
        }
        
        /* Combo Tiers */
        .tier-low .img-wrap { border-color: #fff; background: rgba(0,0,0,0.95); }
        .tier-mid .img-wrap { border-color: var(--cyan); background: rgba(0, 255, 255, 0.2); }
        .tier-high .img-wrap { border-color: var(--g); background: rgba(255, 215, 0, 0.3); }
        .tier-ultra .img-wrap { border-color: var(--red); background: rgba(255, 77, 77, 0.4); }

        .emote-img { max-height: 170px; max-width: 170px; object-fit: contain; }
        
        .count { 
            font-size: 84px; font-weight: 900; position: relative; z-index: 10;
            color: #fff; -webkit-text-stroke: 4px #000; text-shadow: 6px 6px 0px #000;
            letter-spacing: -4px; margin-top: -10px;
        }

        /* --- RISER CSS --- */
        .riser {
            position: absolute; font-weight: 900; font-size: 48px; color: #fff;
            text-shadow: 4px 4px 0 #000; pointer-events: none; z-index: 100;
            animation: riseAndFade 0.6s ease-out forwards;
        }
        @keyframes riseAndFade {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-140px) scale(1.5); opacity: 0; }
        }

        .pop { animation: hitPop 0.12s ease-out; }
        @keyframes hitPop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* CONTROL PANEL STUFF */
        #control { position: absolute; top: 0; right: 0; width: 340px; height: 100vh; background: #0a0a0a; border-left: 4px solid var(--p); padding: 30px; z-index: 200; transform: translateX(100%); transition: 0.3s; box-sizing: border-box; overflow-y: auto; }
        #control.active { transform: translateX(0); }
        input { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 12px; margin-top: 5px; font-weight: bold; }
        #m-toggle { position: absolute; top: 10px; right: 10px; background: var(--p); border: none; color: white; width: 45px; height: 45px; cursor: pointer; font-weight: 900; z-index: 210; }
        .monitor { background: #111; padding: 15px; margin-top: 25px; border: 1px solid #222; }
        .mon-item { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 8px; color: #666; text-transform: uppercase; }
        .asset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; border-top: 1px solid #222; padding-top: 10px; }
        .asset-tag { font-size: 9px; background: #000; padding: 4px; border: 1px solid #333; color: #888; text-align: center; }
    </style>
</head>
<body>

<div id="hud">
    <div class="indicator version">MUGI ENGINE v16.7.1</div>
    <div id="stat-tmi" class="indicator">Twitch: IDLE</div>
    <div id="stat-assets" class="indicator">ASSETS: 0</div>
</div>

<button id="m-toggle" onclick="document.getElementById('control').classList.toggle('active')">☰</button>

<div id="control">
    <h2 style="margin:0 0 5px 0; color:var(--p);">SYSTEM CONTROL</h2>
    <input type="text" id="inp-ch" placeholder="Username">
    <input type="text" id="inp-7id" placeholder="7TV ID">
    <button style="width:100%; padding:20px; background:var(--p); color:white; border:none; cursor:pointer; font-weight:900; margin-top: 25px;" onclick="reboot()">BOOT ENGINE</button>

    <div class="monitor">
        <div class="mon-item">OBS: <span id="ctrl-obs">WAITING</span></div>
        <div class="mon-item">Twitch: <span id="ctrl-tmi">OFFLINE</span></div>
        <div class="mon-item">Channel: <span id="ctrl-chan">-</span></div>
        <div class="asset-grid">
            <div class="asset-tag">7TV: <b id="cnt-7tv">0</b></div>
            <div class="asset-tag">BTTV: <b id="cnt-bttv">0</b></div>
            <div class="asset-tag">FFZ: <b id="cnt-ffz">0</b></div>
            <div class="asset-tag">TW: <b id="cnt-tw">0</b></div>
        </div>
    </div>
</div>

<div id="leaderboard">
    <div id="slot-0" class="emote-slot"><div class="img-wrap"></div><div class="count">x0</div></div>
    <div id="slot-1" class="emote-slot"><div class="img-wrap"></div><div class="count">x0</div></div>
    <div id="slot-2" class="emote-slot"><div class="img-wrap"></div><div class="count">x0</div></div>
    <div id="slot-3" class="emote-slot"><div class="img-wrap"></div><div class="count">x0</div></div>
</div>

<script>
    let emoteMap = {};
    let emoteCounts = {};
    let client = null;
    let mainLoop = null;
    let counts = { s7: 0, bttv: 0, ffz: 0, tw: 0 };

    function updateCtrlStatus(id, text, state) {
        const el = document.getElementById(`ctrl-${id}`);
        if(el) { el.innerText = text; el.className = state === 'on' ? 'live' : 'wait'; }
    }

    // --- RISER LOGIC ---
    function spawnRiser(slot) {
        const riser = document.createElement('div');
        riser.className = 'riser';
        riser.innerText = '+1';
        riser.style.left = (Math.random() * 40 + 30) + '%'; 
        slot.appendChild(riser);
        riser.addEventListener('animationend', () => riser.remove());
    }

    async function loadAssets(userId, channel) {
        emoteMap = {}; counts = { s7: 0, bttv: 0, ffz: 0, tw: 0 };
        fetch('https://7tv.io/v3/emote-sets/global').then(r => r.json()).then(g => {
            g.emotes?.forEach(e => { emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/4x.webp`; counts.s7++; });
            syncAssetUI();
        });
        try {
            const twRes = await fetch(`https://api.ivr.fi/v2/twitch/user?login=${channel}`);
            const twData = await twRes.json();
            const tId = twData[0]?.id;
            if(tId) {
                fetch(`https://api.betterttv.net/3/cached/users/twitch/${tId}`).then(r => r.json()).then(d => {
                    [...(d.channelEmotes||[]), ...(d.sharedEmotes||[])].forEach(e => { emoteMap[e.code] = `https://cdn.betterttv.net/emote/${e.id}/3x`; counts.bttv++; });
                    syncAssetUI();
                });
                fetch(`https://api.betterttv.net/3/cached/frankerfacez/users/twitch/${tId}`).then(r => r.json()).then(d => {
                    d.forEach(e => { emoteMap[e.code] = e.images['4x'] || e.images['2x'] || e.images['1x']; counts.ffz++; });
                    syncAssetUI();
                });
            }
            if(userId) {
                fetch(`https://7tv.io/v3/users/${userId}`).then(r => r.json()).then(async d => {
                    const setId = d.emote_set?.id || d.connections?.find(c => c.platform === 'TWITCH')?.emote_set?.id;
                    if(setId) {
                        const sRes = await fetch(`https://7tv.io/v3/emote-sets/${setId}`);
                        const sData = await sRes.json();
                        sData.emotes?.forEach(e => { emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/4x.webp`; counts.s7++; });
                        syncAssetUI();
                    }
                });
            }
        } catch(e) { console.error(e); }
    }

    function syncAssetUI() {
        let total = Object.keys(emoteMap).length;
        document.getElementById('stat-assets').innerText = `ASSETS: ${total}`;
        document.getElementById('cnt-7tv').innerText = counts.s7;
        document.getElementById('cnt-bttv').innerText = counts.bttv;
        document.getElementById('cnt-ffz').innerText = counts.ffz;
        document.getElementById('cnt-tw').innerText = counts.tw;
        if(!isRemote && activeConn?.open) activeConn.send({ type: 'SYNC_ASSETS', counts, total });
    }

    function reboot() {
        const CH = document.getElementById('inp-ch').value.trim().toLowerCase();
        const ID7 = document.getElementById('inp-7id').value.trim();
        if(!CH) return;
        if (isRemote && activeConn?.open) { activeConn.send({ type: 'BOOT', ch: CH, id7: ID7 }); return; }

        loadAssets(ID7, CH);
        if(client) client.disconnect();
        if(mainLoop) clearInterval(mainLoop);
        emoteCounts = {};
        
        mainLoop = setInterval(() => {
            Object.keys(emoteCounts).forEach(k => { 
                emoteCounts[k] -= (0.1 + (emoteCounts[k] * 0.015)); 
                if(emoteCounts[k] <= 0.5) delete emoteCounts[k]; 
            });
            updateLeaderboard(null);
        }, 800);

        client = new tmi.Client({ channels: [CH] });
        client.on('message', (chan, tags, msg) => {
            let found = [];
            msg.split(' ').forEach(w => { if(emoteMap[w]) found.push(w); });
            if(tags.emotes) {
                Object.keys(tags.emotes).forEach(id => {
                    const range = tags.emotes[id][0].split('-');
                    const n = msg.substring(parseInt(range[0]), parseInt(range[1]) + 1);
                    if(!emoteMap[n]) { emoteMap[n] = `https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/3.0`; counts.tw++; syncAssetUI(); }
                    tags.emotes[id].forEach(() => found.push(n));
                });
            }
            found.forEach(e => { 
                emoteCounts[e] = (emoteCounts[e] || 0) + 1; 
                updateLeaderboard(e); 
            });
        });
        client.connect();
    }

    function updateLeaderboard(trig) {
        const sorted = Object.entries(emoteCounts).sort((a,b) => b[1]-a[1]).slice(0,4);
        for(let i=0; i<4; i++){
            const slot = document.getElementById(`slot-${i}`);
            const wrap = slot.querySelector('.img-wrap');
            const countEl = slot.querySelector('.count');
            
            if(sorted[i]){
                const [n, c] = sorted[i];
                const roundedC = Math.ceil(c);
                if(wrap.getAttribute('data-name') !== n){
                    wrap.innerHTML = `<img src="${emoteMap[n]}" class="emote-img">`;
                    wrap.setAttribute('data-name', n);
                }
                
                countEl.innerText = `x${roundedC}`;
                slot.classList.add('active');

                slot.classList.remove('tier-low', 'tier-mid', 'tier-high', 'tier-ultra');
                if(roundedC > 50) slot.classList.add('tier-ultra');
                else if(roundedC > 20) slot.classList.add('tier-high');
                else if(roundedC > 10) slot.classList.add('tier-mid');
                else slot.classList.add('tier-low');

                if(trig === n) {
                    wrap.classList.remove('pop'); void wrap.offsetWidth; wrap.classList.add('pop');
                    // TRIGGER RISER
                    spawnRiser(slot);
                }
            } else { slot.classList.remove('active'); }
        }
    }

    window.onload = () => {
        if(!isRemote) {
            const savedCh = localStorage.getItem('mugi_ch');
            if(savedCh) {
                document.getElementById('inp-ch').value = savedCh;
                document.getElementById('inp-7id').value = localStorage.getItem('mugi_id7') || '';
                setTimeout(reboot, 500);
            }
        }
    };
</script>
</body>
</html>

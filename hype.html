<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugi Co. | Full Diagnostics v11.9</title>
    <script src="tmi.min.js"></script>
    <style>
        :root { --p: #9146ff; --g: #ffd700; --chroma: #00FF00; }
        body { margin: 0; background-color: var(--chroma); color: white; font-family: sans-serif; overflow: hidden; }
        
        /* DIAGNOSTIC HUD */
        #hud { position: absolute; top: 10px; left: 10px; z-index: 100; display: flex; flex-direction: column; gap: 5px; }
        .indicator { font-size: 11px; font-weight: bold; padding: 6px 12px; border-radius: 4px; background: rgba(0,0,0,0.9); border-left: 4px solid #444; min-width: 240px; text-transform: uppercase; letter-spacing: 0.5px; }
        .indicator.on { border-left-color: #00ffcc; color: #00ffcc; }
        .indicator.err { border-left-color: #ff4d4d; color: #ff4d4d; }
        .indicator.wait { border-left-color: var(--g); color: var(--g); }

        #leaderboard { display: flex; justify-content: center; align-items: flex-end; gap: 60px; width: 100vw; height: 100vh; padding-bottom: 50px; box-sizing: border-box; }
        .emote-slot { display: flex; flex-direction: column; align-items: center; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.9)); }
        .rank-tag { font-size: 20px; font-weight: 900; background: var(--g); color: #000; padding: 4px 15px; border-radius: 6px; margin-bottom: 15px; }
        .img-wrap { height: 220px; width: 220px; display: flex; align-items: center; justify-content: center; }
        .emote-img { max-height: 220px; max-width: 220px; object-fit: contain; }
        .count { font-size: 72px; font-weight: 900; margin-top: 10px; text-shadow: 6px 6px 0 var(--p), -2px -2px 0 #000; }

        #control { position: absolute; top: 0; right: 0; width: 340px; height: 100vh; background: #111; border-left: 4px solid var(--p); padding: 30px; z-index: 200; transform: translateX(100%); transition: 0.3s; box-sizing: border-box; }
        #control.active { transform: translateX(0); }
        input { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 12px; margin-top: 5px; border-radius: 4px; font-family: monospace; }
        #m-toggle { position: absolute; top: 10px; right: 10px; background: var(--p); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; z-index: 201; cursor: pointer; font-size: 20px; font-weight: bold; }
        .pop { transform: scale(1.15); transition: 0.05s; }
    </style>
</head>
<body>

<div id="hud">
    <div id="stat-tmi" class="indicator">Twitch: Disconnected</div>
    <div id="stat-7tv" class="indicator">7TV: Waiting...</div>
    <div id="stat-7set" class="indicator">Set ID: None</div>
    <div id="stat-bttv" class="indicator">BTTV: Standby</div>
    <div id="stat-total" class="indicator">Total Active: 0</div>
</div>

<button id="m-toggle" onclick="document.getElementById('control').classList.toggle('active')">⚙</button>

<div id="control">
    <h2 style="margin:0 0 20px 0; color:var(--p);">MUGI ENGINE v11.9</h2>
    <label style="font-size:11px; font-weight:bold;">TWITCH CHANNEL</label>
    <input type="text" id="inp-ch" value="CrazyJapanese">
    <label style="font-size:11px; font-weight:bold; margin-top:15px; display:block;">7TV USER ID</label>
    <input type="text" id="inp-7id" placeholder="01GHNFF8W80001ZXYW7QBBPA9X">
    <button style="width:100%; padding:20px; background:var(--p); color:white; border:none; cursor:pointer; font-weight:bold; margin-top: 30px; border-radius: 8px;" onclick="reboot()">INITIALIZE ENGINE</button>
</div>

<div id="leaderboard">
    <div id="slot-0" class="emote-slot" style="display:none;"><div class="rank-tag">#1</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-1" class="emote-slot" style="display:none;"><div class="rank-tag">#2</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-2" class="emote-slot" style="display:none;"><div class="rank-tag">#3</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-3" class="emote-slot" style="display:none;"><div class="rank-tag">#4</div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-4" class="emote-slot" style="display:none;"><div class="rank-tag">#5</div><div class="img-wrap"></div><div class="count">0</div></div>
</div>

<script>
    let emoteMap = {};
    let emoteCounts = {};
    let client = null;
    let mainLoop = null;

    const setStat = (id, text, state) => {
        const el = document.getElementById(`stat-${id}`);
        if(el) { el.innerText = text; el.className = `indicator ${state || ''}`; }
    };

    async function loadAssets(userId, channel) {
        emoteMap = {};
        let count7tv = 0;
        let countBttv = 0;
        
        try {
            // 1. RESOLVE TWITCH ID (Needed for BTTV)
            const twRes = await fetch(`https://decapi.me/twitch/id/${channel.toLowerCase()}`);
            const twitchId = await twRes.text();

            // 2. 7TV DEEP FETCH (Stage 1: Find Set)
            setStat('7tv', "7TV: Resolving Set...", 'wait');
            const userRes = await fetch(`https://7tv.io/v3/users/${userId}`);
            const user = await userRes.json();
            const setId = user.emote_set?.id || user.active_emote_set?.id;
            
            if(setId) {
                setStat('7set', `Set ID: ${setId.substring(0,12)}...`, 'on');
                // Stage 2: Fetch Raw Set (Bypasses the 256 limit)
                const setRes = await fetch(`https://7tv.io/v3/emote-sets/${setId}`);
                const setData = await setRes.json();
                setData.emotes?.forEach(e => {
                    emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/2x.webp`;
                    count7tv++;
                });
            }

            // 3. BTTV FETCH
            setStat('bttv', "BTTV: Fetching...", 'wait');
            const bttvRes = await fetch(`https://api.betterttv.net/3/cached/users/twitch/${twitchId}`);
            if(bttvRes.ok) {
                const bttvData = await bttvRes.json();
                [...(bttvData.channelEmotes || []), ...(bttvData.sharedEmotes || [])].forEach(e => {
                    emoteMap[e.code] = `https://cdn.betterttv.net/emote/${e.id}/3x`;
                    countBttv++;
                });
            }

            // 4. GLOBAL 7TV
            const gRes = await fetch('https://7tv.io/v3/emote-sets/global');
            const gData = await gRes.json();
            gData.emotes?.forEach(e => { if(!emoteMap[e.name]) { emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/2x.webp`; count7tv++; } });

            setStat('7tv', `7TV: ${count7tv} Loaded`, 'on');
            setStat('bttv', `BTTV: ${countBttv} Loaded`, 'on');
            setStat('total', `Total Active: ${Object.keys(emoteMap).length}`, 'on');

        } catch(e) {
            setStat('7tv', "Sync Error", 'err');
            console.error(e);
        }
    }

    function startEngine() {
        if(mainLoop) clearInterval(mainLoop);
        mainLoop = setInterval(() => {
            Object.keys(emoteCounts).forEach(k => {
                emoteCounts[k] -= 0.2;
                if(emoteCounts[k] <= 0) delete emoteCounts[k];
            });
            updateLeaderboard(false);
        }, 1000);
    }

    async function reboot() {
        const CH = document.getElementById('inp-ch').value.trim();
        const ID = document.getElementById('inp-7id').value.trim();
        localStorage.setItem('mugi_ch', CH);
        localStorage.setItem('mugi_id', ID);

        if(client) { try { await client.disconnect(); } catch(e){} }
        setStat('tmi', `Twitch: Connecting...`, 'wait');
        
        emoteCounts = {};
        await loadAssets(ID, CH);
        startEngine();

        client = new tmi.Client({ connection: { secure: true, reconnect: true }, channels: [CH] });
        client.on('message', (chan, tags, msg) => {
            let found = new Set();
            msg.split(' ').forEach(w => {
                const clean = w.replace(/[\u200B-\u200D\uFEFF]/g, "");
                if (emoteMap[clean]) found.add(clean);
            });
            if (tags.emotes) {
                Object.keys(tags.emotes).forEach(id => {
                    tags.emotes[id].forEach(r => {
                        const b = r.split('-');
                        const name = msg.substring(parseInt(b[0]), parseInt(b[1]) + 1);
                        if(!emoteMap[name]) emoteMap[name] = `https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/3.0`;
                        found.add(name);
                    });
                });
            }
            found.forEach(e => { emoteCounts[e] = (emoteCounts[e] || 0) + 1; });
            if(found.size > 0) updateLeaderboard(true);
        });

        client.connect().then(() => setStat('tmi', `Twitch: ${CH.toUpperCase()}`, 'on'));
        document.getElementById('control').classList.remove('active');
    }

    function updateLeaderboard(isChat) {
        const sorted = Object.entries(emoteCounts).sort((a,b) => b[1]-a[1]).slice(0,5);
        for(let i=0; i<5; i++){
            const slot = document.getElementById(`slot-${i}`);
            if(sorted[i]){
                const [n, c] = sorted[i];
                const wrap = slot.querySelector('.img-wrap');
                if(wrap.getAttribute('data-name') !== n){
                    wrap.innerHTML = `<img src="${emoteMap[n]}" class="emote-img">`;
                    wrap.setAttribute('data-name', n);
                }
                slot.querySelector('.count').innerText = Math.floor(c);
                if(isChat) { slot.classList.remove('pop'); void slot.offsetWidth; slot.classList.add('pop'); }
                slot.style.display = "flex";
            } else { slot.style.display = "none"; }
        }
    }

    window.onload = () => {
        document.getElementById('inp-ch').value = localStorage.getItem('mugi_ch') || "CrazyJapanese";
        document.getElementById('inp-7id').value = localStorage.getItem('mugi_id') || "";
        if(document.getElementById('inp-7id').value) setTimeout(reboot, 800);
    };
</script>
</body>
</html>

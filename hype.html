<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugi Co. | Engine v16.3 [REMOTE READY]</title>
    
    <script src="https://bundle.run/tmi.js@1.8.5"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        const PEER_ID = 'mugi-link-123'; 
        const urlParams = new URLSearchParams(window.location.search);
        const isRemote = urlParams.has('control');
        const peer = new Peer(isRemote ? null : PEER_ID);

        if (!isRemote) {
            peer.on('open', () => console.log("Engine Peer ID Ready:", PEER_ID));
            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (data.type === 'BOOT') {
                        document.getElementById('inp-ch').value = data.ch;
                        if(data.id7) document.getElementById('inp-7id').value = data.id7;
                        reboot(); 
                    }
                });
            });
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

        :root { 
            --p: #9146ff; --cyan: #00ffff; --g: #ffd700; --red: #ff4d4d; 
            --ui-bg: rgba(0, 0, 0, 0.85);
            --font-main: 'Inter', sans-serif; 
        }
        
        body { margin: 0; background-color: transparent; color: white; font-family: var(--font-main); overflow: hidden; user-select: none; }
        
        #hud { position: absolute; top: 15px; left: 15px; z-index: 100; display: flex; flex-direction: column; gap: 4px; }
        .indicator { font-size: 10px; font-weight: 900; padding: 6px 14px; background: var(--ui-bg); border-left: 4px solid #444; min-width: 260px; text-transform: uppercase; backdrop-filter: blur(4px); }
        .indicator.version { background: var(--p); border-left: none; text-align: center; font-size: 11px; margin-bottom: 2px; box-shadow: 0 4px 15px rgba(145, 70, 255, 0.4); }
        .indicator.on { border-left-color: #00ffcc; color: #00ffcc; }

        #leaderboard { 
            display: flex; justify-content: center; align-items: flex-end; 
            gap: 40px; width: 100vw; height: 100vh; padding-bottom: 100px; 
            box-sizing: border-box; position: absolute; bottom: 0; left: 0;
        }
        
        .emote-slot { 
            position: relative; display: flex; flex-direction: column; align-items: center; 
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            opacity: 0; transform: translateY(100px); 
        }
        
        .emote-slot.active { opacity: 1; transform: translateY(0); }

        .img-wrap { 
            height: 180px; width: 180px; display: flex; align-items: center; justify-content: center; 
            background: var(--ui-bg); border: 6px solid #fff; box-shadow: 10px 10px 0px #000; 
            margin-bottom: 15px; position: relative; z-index: 5;
            transition: all 0.2s ease;
        }
        .emote-img { max-height: 150px; max-width: 150px; object-fit: contain; }
        
        /* Flash Tiers */
        .flash-1 { border-color: var(--p) !important; box-shadow: 0 0 20px var(--p), 10px 10px 0px #000 !important; }
        .flash-2 { border-color: var(--cyan) !important; box-shadow: 0 0 30px var(--cyan), 10px 10px 0px #000 !important; }
        .flash-3 { border-color: var(--g) !important; box-shadow: 0 0 40px var(--g), 10px 10px 0px #000 !important; }
        .flash-4 { border-color: var(--red) !important; box-shadow: 0 0 60px var(--red), 10px 10px 0px #000 !important; }

        .count { font-size: 64px; font-weight: 900; text-shadow: 4px 4px 0px var(--p), -2px -2px 0px #000; letter-spacing: -2px; }
        .pop { animation: hitPop 0.15s ease-out; }
        @keyframes hitPop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        .riser {
            position: absolute; left: 50%; top: 20%; font-weight: 900; font-size: 48px; color: #fff;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            animation: interRise 0.8s ease-out forwards; white-space: nowrap; pointer-events: none;
        }
        @keyframes interRise {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
            30% { opacity: 1; transform: translate(-50%, -30px) scale(1.1); }
            100% { transform: translate(var(--x-offset), -150px) scale(1); opacity: 0; }
        }

        .milestone {
            position: absolute; left: 50%; bottom: 220px; font-weight: 900; 
            white-space: nowrap; pointer-events: none; z-index: 100;
            animation: milestoneSplash 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .m-tier-1 { color: var(--p); font-size: 40px; }
        .m-tier-2 { color: var(--cyan); font-size: 45px; }
        .m-tier-3 { color: var(--g); font-size: 50px; text-shadow: 0 0 20px var(--g); }
        .m-tier-4 { color: #fff; font-size: 60px; text-shadow: 4px 0 var(--red), -4px 0 var(--cyan); }

        @keyframes milestoneSplash { 0% { transform: translate(-50%, 50px) scale(0); opacity: 0; } 20% { transform: translate(-50%, 0) scale(1); opacity: 1; } 100% { transform: translate(-50%, -100px) scale(0.8); opacity: 0; } }

        #control { position: absolute; top: 0; right: 0; width: 320px; height: 100vh; background: #0a0a0a; border-left: 4px solid var(--p); padding: 30px; z-index: 200; transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-sizing: border-box; }
        #control.active { transform: translateX(0); }
        input { width: 100%; background: #111; border: 2px solid #333; color: white; padding: 12px; margin: 8px 0 20px 0; font-family: inherit; }
        #m-toggle { position: absolute; top: 15px; right: 15px; background: var(--p); border: none; color: white; width: 40px; height: 40px; cursor: pointer; font-weight: 900; z-index: 210; border-radius: 4px; }
    </style>
</head>
<body>

<div id="hud">
    <div class="indicator version">MUGI ENGINE v16.3 [REMOTE ENABLED]</div>
    <div id="stat-tmi" class="indicator">Twitch: IDLE</div>
    <div id="stat-assets" class="indicator">ASSETS: 0</div>
</div>

<button id="m-toggle" onclick="document.getElementById('control').classList.toggle('active')">☰</button>

<div id="control">
    <h2 style="margin:0 0 25px 0; color:var(--p); letter-spacing: 2px;">SYSTEM CONFIG</h2>
    <label style="font-size:10px; color:#888;">TARGET CHANNEL</label>
    <input type="text" id="inp-ch" placeholder="Username">
    <label style="font-size:10px; color:#888;">7TV USER ID (OPTIONAL)</label>
    <input type="text" id="inp-7id" placeholder="User ID">
    <button style="width:100%; padding:18px; background:var(--p); color:white; border:none; cursor:pointer; font-weight:900; font-size:14px;" onclick="reboot()">INITIALIZE ENGINE</button>
</div>

<div id="leaderboard">
    <div id="slot-0" class="emote-slot"><div class="combo-container"></div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-1" class="emote-slot"><div class="combo-container"></div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-2" class="emote-slot"><div class="combo-container"></div><div class="img-wrap"></div><div class="count">0</div></div>
    <div id="slot-3" class="emote-slot"><div class="combo-container"></div><div class="img-wrap"></div><div class="count">0</div></div>
</div>

<script>
    let emoteMap = {};
    let emoteCounts = {};
    let client = null;
    let mainLoop = null;
    let decayRate = 0.12; 
    let assetCount = 0;

    // REMOTE OVERLAY GENERATION
    if (isRemote) {
        const remoteUI = document.createElement('div');
        remoteUI.style = "position:fixed; inset:0; background:#000; z-index:999; padding:40px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px;";
        remoteUI.innerHTML = `
            <h1 style="color:var(--p); margin:0; font-size:40px;">MUGI COMMAND</h1>
            <div id="remote-status" style="font-size:14px; color:#555; text-transform:uppercase; letter-spacing:2px;">Handshaking with OBS...</div>
            <button id="btn-remote-boot" style="width:100%; max-width:400px; padding:50px; background:var(--p); color:white; border:none; font-size:28px; font-weight:900; border-radius:15px; box-shadow: 0 10px 30px rgba(145,70,255,0.3);">BOOT OBS ENGINE</button>
        `;
        document.body.appendChild(remoteUI);

        const conn = peer.connect(PEER_ID);
        conn.on('open', () => {
            document.getElementById('remote-status').innerText = "LINK ESTABLISHED";
            document.getElementById('remote-status').style.color = "#00ffcc";
        });

        document.getElementById('btn-remote-boot').onclick = () => {
            const ch = document.getElementById('inp-ch').value || localStorage.getItem('mugi_ch');
            const id7 = document.getElementById('inp-7id').value || localStorage.getItem('mugi_id7');
            conn.send({ type: 'BOOT', ch: ch, id7: id7 });
            document.getElementById('btn-remote-boot').innerText = "COMMAND SENT";
            setTimeout(() => { document.getElementById('btn-remote-boot').innerText = "BOOT OBS ENGINE"; }, 1500);
        };
    }

    const setStat = (id, text, state) => {
        const el = document.getElementById(`stat-${id}`);
        if(el) { el.innerText = text; el.className = `indicator ${state || ''}`; }
    };

    async function loadAssets(userId, channel) {
        emoteMap = {}; assetCount = 0;
        
        // 1. Global 7TV
        const g7 = await fetch('https://7tv.io/v3/emote-sets/global').then(r => r.json());
        g7.emotes?.forEach(e => { emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/4x.webp`; assetCount++; });

        // 2. Twitch ID and BTTV
        try {
            const twRes = await fetch(`https://api.ivr.fi/v2/twitch/user?login=${channel}`);
            const twData = await twRes.json();
            const tId = twData[0]?.id;

            if(tId) {
                const bttv = await fetch(`https://api.betterttv.net/3/cached/users/twitch/${tId}`).then(r => r.json());
                [...(bttv.channelEmotes||[]), ...(bttv.sharedEmotes||[])].forEach(e => { 
                    emoteMap[e.code] = `https://cdn.betterttv.net/emote/${e.id}/3x`; assetCount++; 
                });
            }

            if(userId) {
                const s7 = await fetch(`https://7tv.io/v3/users/${userId}`).then(r => r.json());
                const setId = s7.emote_set?.id || s7.connections?.find(c => c.platform === 'TWITCH')?.emote_set?.id;
                if(setId) {
                    const set = await fetch(`https://7tv.io/v3/emote-sets/${setId}`).then(r => r.json());
                    set.emotes?.forEach(e => { emoteMap[e.name] = `https://cdn.7tv.app/emote/${e.id}/4x.webp`; assetCount++; });
                }
            }
        } catch(e) { console.warn("Asset fetch error", e); }
        
        setStat('assets', `ASSETS: ${assetCount}`, 'on');
    }

    function reboot() {
        const CH = document.getElementById('inp-ch').value.trim().toLowerCase();
        const ID7 = document.getElementById('inp-7id').value.trim();
        if(!CH) return;

        localStorage.setItem('mugi_ch', CH);
        localStorage.setItem('mugi_id7', ID7);

        loadAssets(ID7, CH);
        if(client) client.disconnect();
        if(mainLoop) clearInterval(mainLoop);
        emoteCounts = {};
        
        mainLoop = setInterval(() => {
            Object.keys(emoteCounts).forEach(k => { 
                emoteCounts[k] -= (decayRate + (emoteCounts[k] * 0.015)); 
                if(emoteCounts[k] <= 0) delete emoteCounts[k]; 
            });
            updateLeaderboard(null);
        }, 800);

        client = new tmi.Client({ channels: [CH] });
        client.on('connected', () => setStat('tmi', `STREAM: ${CH.toUpperCase()}`, 'on'));
        client.on('message', (chan, tags, msg) => {
            let words = msg.split(' ');
            let uniqueWords = [...new Set(words)];
            uniqueWords.forEach(w => {
                if(emoteMap[w]) {
                    emoteCounts[w] = (emoteCounts[w] || 0) + 1;
                    updateLeaderboard(w);
                }
            });

            if(tags.emotes) {
                Object.keys(tags.emotes).forEach(id => {
                    const name = msg.substring(parseInt(tags.emotes[id][0].split('-')[0]), parseInt(tags.emotes[id][0].split('-')[1]) + 1);
                    if(!emoteMap[name]) emoteMap[name] = `https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/3.0`;
                    emoteCounts[name] = (emoteCounts[name] || 0) + 1;
                    updateLeaderboard(name);
                });
            }
        });
        client.connect();
        document.getElementById('control').classList.remove('active');
    }

    function spawnComboEffect(slot, count) {
        const container = slot.querySelector('.combo-container');
        const riser = document.createElement('div');
        riser.className = 'riser'; riser.innerText = '+1';
        riser.style.setProperty('--x-offset', `${(Math.random() * 80 - 40)}px`);
        container.appendChild(riser);
        setTimeout(() => riser.remove(), 800);

        const val = Math.floor(count);
        let tier = 0, text = "";
        if (val === 10) { tier = 1; text = "NICE!"; }
        else if (val === 25) { tier = 2; text = "HYPE!!"; }
        else if (val === 50) { tier = 3; text = "MEGA!!!"; }
        else if (val === 100) { tier = 4; text = "GODLIKE!!!!"; }

        if (text) {
            const m = document.createElement('div');
            m.className = `milestone m-tier-${tier}`; m.innerText = text;
            container.appendChild(m);
            slot.querySelector('.img-wrap').className = `img-wrap flash-${tier}`;
            setTimeout(() => { 
                slot.querySelector('.img-wrap').className = 'img-wrap'; 
                m.remove(); 
            }, 1200);
        }
    }

    function updateLeaderboard(triggeredEmoteName) {
        const sorted = Object.entries(emoteCounts).sort((a,b) => b[1]-a[1]).slice(0,4);
        for(let i=0; i<4; i++){
            const slot = document.getElementById(`slot-${i}`);
            const wrap = slot.querySelector('.img-wrap');
            if(sorted[i]){
                const [n, c] = sorted[i];
                if(wrap.getAttribute('data-name') !== n){
                    wrap.innerHTML = `<img src="${emoteMap[n]}" class="emote-img">`;
                    wrap.setAttribute('data-name', n);
                }
                slot.querySelector('.count').innerText = Math.ceil(c);
                slot.classList.add('active');

                if(triggeredEmoteName === n) {
                    slot.classList.remove('pop'); void slot.offsetWidth; slot.classList.add('pop');
                    spawnComboEffect(slot, c);
                }
            } else { 
                slot.classList.remove('active');
            }
        }
    }

    window.onload = () => {
        const savedCh = localStorage.getItem('mugi_ch');
        if(savedCh) {
            document.getElementById('inp-ch').value = savedCh;
            document.getElementById('inp-7id').value = localStorage.getItem('mugi_id7') || '';
            if(!isRemote) setTimeout(reboot, 1000);
        }
    };
</script>
</body>
</html>

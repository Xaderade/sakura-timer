<!DOCTYPE html>
<html>
<head>
    <title>Mugi Counter - Perfect Fonts</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        body { 
            background: #00ff00; 
            margin: 0; 
            overflow: hidden; 
            display: flex;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #renderCanvas {
            image-rendering: auto;
            transform: skewX(-5deg);
            margin-left: 50px;
            transition: opacity 0.4s ease, transform 0.3s ease;
        }

        .hidden { opacity: 0 !important; transform: skewX(-5deg) scale(0.8) !important; }

        /* CONTROL PANEL */
        #controls { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; border: 6px solid #000; border-radius: 35px; 
            padding: 20px; text-align: center; box-shadow: 0 12px 0 #333; 
            z-index: 9999; font-family: sans-serif; display: none; 
            width: 450px;
        }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        button { padding: 15px 25px; font-size: 25px; cursor: pointer; font-weight: bold; border-radius: 15px; border: 4px solid #000; box-shadow: 0 4px 0 #000; transition: 0.1s; }
        button:active { transform: translateY(4px); box-shadow: 0 1px 0 #000; }
        
        .plus { background: #43B047; color: white; }
        .minus { background: #FBD000; color: black; }
        .toggle-btn { background: #2196F3; color: white; width: 100%; font-size: 18px; margin-top: 10px; }
        .input-box { width: 90%; padding: 12px; font-size: 18px; border: 3px solid black; border-radius: 10px; margin-bottom: 10px; text-align: center; font-weight: bold; }
        
        .status-dot { height: 12px; width: 12px; border-radius: 50%; background: red; display: inline-block; margin-right: 5px; }
        .online { background: #43B047; box-shadow: 0 0 8px #43B047; }
    </style>
</head>
<body>

    <canvas id="renderCanvas" width="2400" height="600"></canvas>

    <div id="controls">
        <div style="margin-bottom: 10px;">
            <span id="status-dot" class="status-dot"></span>
            <span id="status-text" style="font-weight:bold; font-size:12px;">DISCONNECTED</span>
        </div>
        
        <input type="text" id="label-input" class="input-box" placeholder="Label (e.g. 💀 or WINS)" oninput="updateLabel(this.value)">
        
        <div class="btn-group">
            <button class="minus" onclick="changeCount(-1)">-</button>
            <button class="plus" onclick="changeCount(1)">+</button>
        </div>

        <button class="toggle-btn" onclick="toggleVisibility()">👁 SHOW / HIDE OVERLAY</button>
        <button onclick="resetCount()" style="margin-top:10px; font-size:12px; background:#f0f0f0; border: 2px solid #000; width:100%; border-radius:10px; cursor:pointer; padding:5px;">RESET TO 0</button>
    </div>

    <script>
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        const COUNTER_ID = 'mugi-sakura-counter-2026'; 
        const isController = window.location.hash.includes('control');
        
        if (isController) document.getElementById('controls').style.display = 'block';

        let count = localStorage.getItem('sakura_count') ? parseInt(localStorage.getItem('sakura_count')) : 0;
        let prefixLabel = localStorage.getItem('sakura_label') || "💀";
        let scale = 1;
        let flashColor = null;

        // Fonts
        const fontMain = 'italic 260px "Luckiest Guy"';
        const fontSmall = 'italic 160px "Luckiest Guy"';
        const fontPrefix = 'italic 200px "Luckiest Guy"'; // Custom font for the text/emoji

        function drawStyledText(text, x, y, font, useFlash = true) {
            ctx.font = font;
            ctx.lineJoin = "round";
            ctx.lineWidth = 20;
            
            // 1. Black Outline/Shadow logic
            ctx.strokeStyle = "black";
            ctx.strokeText(text, x, y);
            ctx.strokeText(text, x + 18, y + 18);

            // 2. Gradient
            const grad = ctx.createLinearGradient(x, y - 130, x, y + 50);
            grad.addColorStop(0.2, "#FFFFFF");
            grad.addColorStop(0.85, "#A0A0A0");

            // 3. Fill
            ctx.fillStyle = "black";
            ctx.fillText(text, x + 18, y + 18);
            
            ctx.fillStyle = (useFlash && flashColor) ? flashColor : grad;
            ctx.fillText(text, x, y);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const startX = 100;
            const baseY = 400;

            // Measure label to prevent overlap
            ctx.font = fontPrefix;
            const labelWidth = ctx.measureText(prefixLabel).width;

            // Draw the prefix (Emoji or Text) in Luckiest Guy
            drawStyledText(prefixLabel, startX, baseY + 20, fontPrefix, false);

            ctx.save();
            const xPos = startX + labelWidth + 50;
            ctx.translate(xPos, baseY);
            ctx.scale(scale, scale);
            ctx.translate(-xPos, -baseY);

            // Draw 'x' and number
            drawStyledText("x", xPos, baseY + 20, fontSmall, true);
            drawStyledText(count.toString(), xPos + 110, baseY + 20, fontMain, true);

            ctx.restore();
        }

        // --- PeerJS Connection Core ---
        const peer = new Peer(isController ? null : COUNTER_ID);
        let conn;

        peer.on('open', (id) => {
            if (isController) {
                console.log("Connecting as controller...");
                connectToPeer();
            }
        });

        peer.on('connection', (c) => {
            conn = c;
            setupDataListener();
        });

        function connectToPeer() {
            conn = peer.connect(COUNTER_ID);
            conn.on('open', () => {
                document.getElementById('status-dot').classList.add('online');
                document.getElementById('status-text').innerText = "CONNECTED TO OBS";
                // Send current state to sync
                conn.send({ action: 'sync', count: count, label: prefixLabel });
            });
            setupDataListener();
        }

        function setupDataListener() {
            conn.on('data', (data) => {
                if (data.action === 'update') { count = data.val; triggerPop(); }
                if (data.action === 'reset') { count = 0; draw(); }
                if (data.action === 'toggle') { executeToggle(); }
                if (data.action === 'label') { prefixLabel = data.val; draw(); }
                if (data.action === 'sync') { count = data.count; prefixLabel = data.label; draw(); }
            });
        }

        // --- Logic Functions ---
        function updateLabel(val) {
            prefixLabel = val || " ";
            localStorage.setItem('sakura_label', prefixLabel);
            if (conn && conn.open) conn.send({ action: 'label', val: prefixLabel });
            draw();
        }

        function toggleVisibility() {
            if (conn && conn.open) conn.send({ action: 'toggle' });
            executeToggle();
        }

        function executeToggle() {
            canvas.classList.toggle('hidden');
        }

        function changeCount(delta) {
            count += delta;
            localStorage.setItem('sakura_count', count);
            triggerPop();
            if (conn && conn.open) conn.send({ action: 'update', val: count });
        }

        function resetCount() {
            count = 0;
            localStorage.setItem('sakura_count', 0);
            draw();
            if (conn && conn.open) conn.send({ action: 'reset' });
        }

        function triggerPop() {
            let start = null;
            const duration = 300;
            function animate(timestamp) {
                if (!start) start = timestamp;
                let progress = timestamp - start;
                let p = progress / duration;
                if (p < 0.3) {
                    scale = 1 + (p / 0.3) * 0.15;
                    flashColor = "#ccff00";
                } else if (p < 1) {
                    scale = 1.15 - ((p - 0.3) / 0.7) * 0.15;
                    flashColor = null;
                } else {
                    scale = 1;
                    flashColor = null;
                }
                draw();
                if (progress < duration) requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
        }

        // Initialize
        document.fonts.load(fontMain).then(() => {
            document.fonts.load(fontPrefix).then(draw);
        });
    </script>
</body>
</html>

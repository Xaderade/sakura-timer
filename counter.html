<!DOCTYPE html>
<html>
<head>
    <title>Sakura Counter - Mixed Styles</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        body { 
            background: #00ff00; 
            font-family: 'Luckiest Guy', sans-serif; 
            margin: 0; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: flex-start; 
            padding-left: 120px; 
        }
        
        #counter-wrapper { 
            display: flex;
            align-items: center;
            user-select: none;
            white-space: nowrap;
            transform: skewX(-5deg); 
        }

        /* 1. THE CLEAN EMOJI (No Filter) */
        .emoji { 
            font-size: 200px; 
            margin-right: 30px; 
            filter: drop-shadow(10px 10px 0px rgba(0,0,0,0.2)); /* Tiny clean shadow only */
        }
        
        /* 2. THE CHONKY TEXT (With Filter) */
        .chonk-text {
            display: flex;
            align-items: center;
            font-size: 260px;
            color: #FFFFFF;
            filter: url(#megaChonk3D);
        }

        .x-char { 
            font-size: 0.6em; 
            margin-top: 25px; 
            margin-right: 20px; 
        }

        /* Nintendo "Impact Flash" */
        @keyframes nintendoPop {
            0% { transform: scale(1); filter: url(#megaChonk3D) brightness(1); }
            20% { transform: scale(1.15); filter: url(#megaChonk3D) brightness(2.5); } 
            100% { transform: scale(1); filter: url(#megaChonk3D) brightness(1); }
        }

        .pop-effect { animation: nintendoPop 0.25s ease-out forwards; }

        /* --- REMOTE UI --- */
        #controls { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; border: 6px solid #000; border-radius: 35px; 
            padding: 20px; text-align: center; box-shadow: 0 12px 0 #333; 
            z-index: 9999; font-family: sans-serif; display: none; 
        }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 15px; }
        button { padding: 15px 40px; font-size: 35px; cursor: pointer; font-weight: bold; border-radius: 50px; border: 4px solid #000; box-shadow: 0 6px 0 #000; transition: 0.1s; }
        button:active { transform: translateY(4px); box-shadow: 0 1px 0 #000; }
        .plus { background: #43B047; color: white; }
        .minus { background: #FBD000; color: black; }
    </style>
</head>
<body>

    <div id="counter-wrapper">
        <span class="emoji">🌸</span>
        <div class="chonk-text" id="pop-target">
            <span class="x-char">x</span>
            <span id="counter">0</span>
        </div>
    </div>

    <svg width="0" height="0" style="position: absolute;">
        <defs>
            <filter id="megaChonk3D" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
                <feMorphology in="SourceGraphic" result="thickened" operator="dilate" radius="8"/>
                <feOffset in="thickened" dx="1" dy="1" result="s1"/>
                <feOffset in="thickened" dx="2" dy="2" result="s2"/>
                <feOffset in="thickened" dx="3" dy="3" result="s3"/>
                <feOffset in="thickened" dx="4" dy="4" result="s4"/>
                <feOffset in="thickened" dx="5" dy="5" result="s5"/>
                <feOffset in="thickened" dx="6" dy="6" result="s6"/>
                <feOffset in="thickened" dx="7" dy="7" result="s7"/>
                <feOffset in="thickened" dx="8" dy="8" result="s8"/>
                <feMerge result="blockRaw">
                    <feMergeNode in="s1"/><feMergeNode in="s2"/><feMergeNode in="s3"/>
                    <feMergeNode in="s4"/><feMergeNode in="s5"/><feMergeNode in="s6"/>
                    <feMergeNode in="s7"/><feMergeNode in="s8"/>
                </feMerge>
                <feFlood flood-color="#b0bac5" result="silverColor"/>
                <feComposite in="silverColor" in2="blockRaw" operator="in" result="silverBlock"/>
                <feMorphology in="silverBlock" result="outerBorderArea" operator="dilate" radius="15"/>
                <feFlood flood-color="black" result="blackColor"/>
                <feComposite in="blackColor" in2="outerBorderArea" operator="in" result="blackOutline"/>
                <feOffset in="blackOutline" dx="20" dy="20" result="hardShadowArea"/>
                <feFlood flood-color="black" flood-opacity="0.4" result="shadowAlpha"/>
                <feComposite in="shadowAlpha" in2="hardShadowArea" operator="in" result="finalHardShadow"/>
                <feMerge>
                    <feMergeNode in="finalHardShadow"/> 
                    <feMergeNode in="blackOutline"/>
                    <feMergeNode in="silverBlock"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>
    </svg>

    <div id="controls">
        <div style="font-weight: bold; font-size: 22px; color: #000;">MANAGER REMOTE</div>
        <div id="conn-status" style="font-size: 11px; color: #666; margin-bottom: 10px;">Connecting...</div>
        <div class="btn-group">
            <button class="minus" onclick="changeCount(-1)">-</button>
            <button class="plus" onclick="changeCount(1)">+</button>
        </div>
        <button onclick="resetCount()" style="margin-top:20px; font-size:14px; background:#f0f0f0; border: 3px solid #000; width:100%; border-radius:10px;">RESET TO 0</button>
    </div>

    <script>
        const COUNTER_ID = 'mugi-sakura-counter-2026'; 
        const isController = window.location.hash.includes('control');
        if (isController) document.getElementById('controls').style.display = 'block';

        let count = localStorage.getItem('sakura_count') ? parseInt(localStorage.getItem('sakura_count')) : 0;
        let conn;

        document.getElementById('counter').innerText = count;

        const peer = new Peer(isController ? null : COUNTER_ID);
        peer.on('open', () => { if (isController) connectToOBS(); });
        peer.on('connection', (c) => { conn = c; setupConnection(c); });

        function connectToOBS() {
            conn = peer.connect(COUNTER_ID);
            setupConnection(conn);
        }

        function setupConnection(c) {
            conn = c;
            conn.on('open', () => {
                if (isController) {
                    document.getElementById('conn-status').innerText = "Status: CONNECTED";
                    document.getElementById('conn-status').style.color = "green";
                    setTimeout(() => { if (conn.open) conn.send({ action: 'requestSync' }); }, 500);
                }
            });
            conn.on('data', (data) => {
                if (data.action === 'requestSync' && !isController) conn.send({ action: 'syncResponse', val: count });
                if (data.action === 'syncResponse') updateCount(data.val, false);
                if (data.action === 'update') updateCount(data.val, true);
                if (data.action === 'reset') updateCount(0, false);
            });
        }

        function updateCount(newVal, animate) {
            count = newVal;
            localStorage.setItem('sakura_count', count);
            document.getElementById('counter').innerText = count;
            if (animate) {
                const target = document.getElementById('pop-target');
                target.classList.remove('pop-effect');
                void target.offsetWidth; 
                target.classList.add('pop-effect');
            }
        }

        function changeCount(delta) {
            const newVal = count + delta;
            updateCount(newVal, true);
            if (conn && conn.open) conn.send({ action: 'update', val: newVal });
        }

        function resetCount() {
            if(confirm("Reset counter?")) {
                updateCount(0, false);
                if (conn && conn.open) conn.send({ action: 'reset' });
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Animated Sakura Counter</title>
    <style>
        body { background: #00ff00; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #count { 
            font-size: 150px; 
            color: #ff69b4; 
            -webkit-text-stroke: 4px black; 
            margin-bottom: 20px;
            transition: transform 0.1s ease-out;
            display: inline-block;
        }

        /* The Animation Class */
        .bump {
            animation: pop 0.3s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: #ffffff; } /* Gets bigger and flashes white */
            100% { transform: scale(1); }
        }

        .controls { display: flex; gap: 15px; opacity: 0.1; transition: opacity 0.3s; }
        .controls:hover { opacity: 1.0; }
        button { padding: 15px 30px; font-size: 24px; cursor: pointer; border-radius: 8px; border: 3px solid black; background: white; font-weight: bold; }
    </style>
</head>
<body>
    <div id="count">0</div>
    <div class="controls">
        <button onclick="change(-1)">-1</button>
        <button onclick="change(1)">+1</button>
        <button onclick="reset()">RESET</button>
    </div>

    <script>
        let count = localStorage.getItem('sakura_count') ? parseInt(localStorage.getItem('sakura_count')) : 0;
        const countEl = document.getElementById('count');

        function updateDisplay() { 
            countEl.innerText = count; 
            localStorage.setItem('sakura_count', count);
            
            // Trigger the animation
            countEl.classList.remove('bump');
            void countEl.offsetWidth; // This "resets" the animation so it can play again
            countEl.classList.add('bump');
        }
        
        function change(val) { 
            count += val;
            if (count < 0) count = 0;
            updateDisplay(); 
        }
        
        function reset() { 
            if(confirm("Reset counter to 0?")) {
                count = 0; 
                updateDisplay(); 
            }
        }

        updateDisplay();
    </script>
</body>
</html>

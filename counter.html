<!DOCTYPE html>
<html>
<head>
    <title>Sakura Gamer Counter</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

        body { background: #00ff00; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* The Gamer Text Style */
        #counter { 
            font-size: 200px; 
            font-weight: 900;
            color: #fff;
            /* Pink to Purple Gradient */
            background: linear-gradient(to bottom, #ff69b4 0%, #da70d6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Aggressive Outlines */
            filter: drop-shadow(5px 5px 0px #000) drop-shadow(-2px -2px 0px #000);
            transition: transform 0.05s ease-out;
            user-select: none;
        }

        /* Shake Animation */
        @keyframes gamerShake {
            0% { transform: scale(1.2) rotate(2deg); }
            25% { transform: scale(1.25) rotate(-2deg); }
            50% { transform: scale(1.2) rotate(1deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .hit { animation: gamerShake 0.15s ease-out; }

        .admin-panel { background: rgba(0,0,0,0.8); color: white; padding: 20px; border: 2px solid #ff69b4; border-radius: 10px; text-align: center; font-family: sans-serif; min-width: 250px; margin-top: 20px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        button { padding: 15px 25px; font-size: 20px; cursor: pointer; font-weight: bold; border-radius: 5px; border: none; text-transform: uppercase; }
        .plus { background: #00ffcc; color: black; }
        .minus { background: #ff4d4d; color: white; }
        .sync-btn { background: #444; color: #fff; margin-top: 10px; width: 100%; font-size: 11px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="counter">0</div>

    <div id="controls" class="admin-panel hidden">
        <div id="connection-msg">LINKING TO OBS...</div>
        <div class="btn-group">
            <button class="minus" onclick="changeCount(-1)">-</button>
            <button class="plus" onclick="changeCount(1)">+</button>
        </div>
        <button onclick="resetCount()" style="background:none; color:gray; font-size:12px;">Reset</button>
        <button class="sync-btn" onclick="requestManualSync()">RE-SYNC CLOUD</button>
    </div>

    <script>
        const COUNTER_ID = 'mugi-sakura-counter-2026'; 
        const isController = window.location.hash === '#control';
        
        let count = localStorage.getItem('sakura_count') ? parseInt(localStorage.getItem('sakura_count')) : 0;
        let conn;

        if (isController) document.getElementById('controls').classList.remove('hidden');
        document.getElementById('counter').innerText = count;

        const peer = new Peer(isController ? null : COUNTER_ID);

        peer.on('open', () => { if (isController) connectToOBS(); });
        peer.on('connection', (c) => { conn = c; setupConnection(c); });

        function connectToOBS() {
            conn = peer.connect(COUNTER_ID);
            setupConnection(conn);
        }

        function setupConnection(c) {
            conn = c;
            conn.on('open', () => {
                if (isController) {
                    document.getElementById('connection-msg').innerText = "SYSTEMS ONLINE";
                    setTimeout(() => { requestManualSync(); }, 500);
                }
            });

            conn.on('data', (data) => {
                if (data.action === 'requestSync' && !isController) {
                    conn.send({ action: 'syncResponse', val: count });
                }
                if (data.action === 'syncResponse') updateCount(data.val, false);
                if (data.action === 'update') updateCount(data.val, true);
                if (data.action === 'reset') updateCount(0, false);
            });
        }

        function updateCount(newVal, animate) {
            count = newVal;
            localStorage.setItem('sakura_count', count);
            const el = document.getElementById('counter');
            el.innerText = count;

            if (animate) {
                // Restart animation
                el.classList.remove('hit');
                void el.offsetWidth; // Force reflow
                el.classList.add('hit');
            }
        }

        function changeCount(delta) {
            const newVal = count + delta;
            updateCount(newVal, true);
            if (conn) conn.send({ action: 'update', val: newVal });
        }

        function resetCount() {
            if(confirm("Reset?")) {
                updateCount(0, false);
                if (conn) conn.send({ action: 'reset' });
            }
        }

        function requestManualSync() {
            if (conn && conn.open) conn.send({ action: 'requestSync' });
        }
    </script>
</body>
</html>

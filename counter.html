<!DOCTYPE html>
<html>
<head>
    <title>Sakura Nintendo Counter</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* A friendly, rounded font that mimics the Nintendo UI style */
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        body { background: #00ff00; font-family: 'Luckiest Guy', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #counter { 
            font-size: 220px; 
            color: #E52521; /* Mario Red */
            /* Thick Nintendo-style white border with black outer shadow */
            -webkit-text-stroke: 8px white;
            filter: drop-shadow(8px 8px 0px #000);
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            position: relative;
        }

        /* The "Impact Flash" Animation */
        @keyframes nintendoPop {
            0% { transform: scale(1); filter: brightness(1) drop-shadow(8px 8px 0px #000); }
            20% { transform: scale(1.4); filter: brightness(5) drop-shadow(0px 0px 30px white); } /* The White Flash */
            100% { transform: scale(1); filter: brightness(1) drop-shadow(8px 8px 0px #000); }
        }

        .pop-effect { animation: nintendoPop 0.3s forwards; }

        /* Manager UI Styling */
        .admin-panel { background: white; border: 6px solid #049CD8; border-radius: 30px; padding: 20px; text-align: center; box-shadow: 0 10px 0 #026b94; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 15px; }
        button { 
            padding: 15px 30px; font-size: 30px; cursor: pointer; font-weight: bold; border-radius: 50px; border: 4px solid #000; 
            box-shadow: 0 5px 0 #000; transition: 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 1px 0 #000; }
        .plus { background: #43B047; color: white; } /* Luigi Green */
        .minus { background: #FBD000; color: black; } /* Coin Yellow */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="counter">0</div>

    <div id="controls" class="admin-panel hidden">
        <div style="font-weight: bold; color: #E52521;">MANAGER REMOTE</div>
        <div class="btn-group">
            <button class="minus" onclick="changeCount(-1)">-</button>
            <button class="plus" onclick="changeCount(1)">+</button>
        </div>
        <button onclick="resetCount()" style="margin-top:15px; font-size:14px; background:#eee;">RESET</button>
    </div>

    <script>
        const COUNTER_ID = 'mugi-sakura-counter-2026'; 
        const isController = window.location.hash === '#control';
        let count = localStorage.getItem('sakura_count') ? parseInt(localStorage.getItem('sakura_count')) : 0;
        let conn;

        if (isController) document.getElementById('controls').classList.remove('hidden');
        document.getElementById('counter').innerText = count;

        const peer = new Peer(isController ? null : COUNTER_ID);
        peer.on('open', () => { if (isController) connectToOBS(); });
        peer.on('connection', (c) => { conn = c; setupConnection(c); });

        function connectToOBS() {
            conn = peer.connect(COUNTER_ID);
            setupConnection(conn);
        }

        function setupConnection(c) {
            conn = c;
            conn.on('data', (data) => {
                if (data.action === 'requestSync' && !isController) conn.send({ action: 'syncResponse', val: count });
                if (data.action === 'syncResponse') updateCount(data.val, false);
                if (data.action === 'update') updateCount(data.val, true);
                if (data.action === 'reset') updateCount(0, false);
            });
            if (isController) {
                conn.on('open', () => setTimeout(() => conn.send({ action: 'requestSync' }), 500));
            }
        }

        function updateCount(newVal, animate) {
            count = newVal;
            localStorage.setItem('sakura_count', count);
            const el = document.getElementById('counter');
            el.innerText = count;

            if (animate) {
                el.classList.remove('pop-effect');
                void el.offsetWidth; // Trigger reflow
                el.classList.add('pop-effect');
            }
        }

        function changeCount(delta) {
            const newVal = count + delta;
            updateCount(newVal, true);
            if (conn) conn.send({ action: 'update', val: newVal });
        }

        function resetCount() {
            if(confirm("Reset?")) {
                updateCount(0, false);
                if (conn) conn.send({ action: 'reset' });
            }
        }
    </script>
</body>
</html>

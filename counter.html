<!DOCTYPE html>
<html>
<head>
    <title>Sakura Remote Counter</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #00ff00; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #counter { font-size: 180px; color: #ff69b4; -webkit-text-stroke: 4px black; text-shadow: 4px 4px 0px #000; transition: transform 0.1s ease-out; }
        .pop { transform: scale(1.3); }

        .admin-panel { background: white; padding: 20px; border: 3px solid black; border-radius: 15px; text-align: center; font-family: sans-serif; min-width: 250px; margin-top: 20px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        button { padding: 15px 25px; font-size: 24px; cursor: pointer; font-weight: bold; border-radius: 8px; border: 2px solid black; }
        .plus { background: #90ee90; }
        .minus { background: #ffcccb; }
        .sync-btn { background: #87ceeb; margin-top: 10px; width: 100%; font-size: 14px; padding: 10px; }
        #status { font-size: 12px; margin-top: 10px; color: #666; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="counter">0</div>

    <div id="controls" class="admin-panel hidden">
        <div id="connection-msg">Connecting to Counter...</div>
        <div class="btn-group">
            <button class="minus" onclick="changeCount(-1)">-1</button>
            <button class="plus" onclick="changeCount(1)">+1</button>
        </div>
        <button onclick="resetCount()">RESET</button>
        <button class="sync-btn" onclick="requestManualSync()">FORCE SYNC FROM OBS</button>
        <div id="status">STATUS: INITIALIZING</div>
    </div>

    <script>
        // Use a different ID from the timer so they don't clash
        const COUNTER_ID = 'mugi-sakura-counter-2026'; 
        const isController = window.location.hash === '#control';
        
        let count = localStorage.getItem('sakura_count') ? parseInt(localStorage.getItem('sakura_count')) : 0;
        let conn;

        if (isController) document.getElementById('controls').classList.remove('hidden');
        document.getElementById('counter').innerText = count;

        const peer = new Peer(isController ? null : COUNTER_ID);

        peer.on('open', (id) => {
            if (isController) {
                const connection = peer.connect(COUNTER_ID);
                setupConnection(connection);
            }
        });

        peer.on('connection', (c) => {
            conn = c;
            setupConnection(c);
        });

        function setupConnection(c) {
            conn = c;
            conn.on('open', () => {
                if (isController) {
                    document.getElementById('connection-msg').innerText = "CONNECTED TO COUNTER";
                    document.getElementById('status').innerText = "STATUS: READY";
                    setTimeout(() => { requestManualSync(); }, 500);
                }
            });

            conn.on('data', (data) => {
                if (data.action === 'requestSync' && !isController) {
                    conn.send({ action: 'syncResponse', val: count });
                }
                
                if (data.action === 'syncResponse') {
                    updateCount(data.val, false);
                    document.getElementById('status').innerText = "STATUS: SYNCED";
                }

                if (data.action === 'update') updateCount(data.val, true);
                if (data.action === 'reset') updateCount(0, false);
            });
        }

        function updateCount(newVal, animate) {
            count = newVal;
            localStorage.setItem('sakura_count', count);
            const el = document.getElementById('counter');
            el.innerText = count;

            if (animate) {
                el.classList.add('pop');
                setTimeout(() => el.classList.remove('pop'), 100);
            }
        }

        function changeCount(delta) {
            const newVal = count + delta;
            updateCount(newVal, true);
            if (conn) conn.send({ action: 'update', val: newVal });
        }

        function resetCount() {
            if(confirm("Reset counter to 0?")) {
                updateCount(0, false);
                if (conn) conn.send({ action: 'reset' });
            }
        }

        function requestManualSync() {
            if (conn && conn.open) {
                conn.send({ action: 'requestSync' });
            }
        }
    </script>
</body>
</html>

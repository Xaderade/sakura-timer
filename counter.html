<!DOCTYPE html>
<html>
<head>
    <title>Sakura Nintendo Counter - Clean Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        body { 
            background: #00ff00; 
            font-family: 'Luckiest Guy', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        
        #counter-wrapper { 
            display: flex;
            align-items: center;
            font-size: 180px;
            color: #FFFFFF;
            /* Black Outline Only - Pink Shadow Removed */
            -webkit-text-stroke: 12px black;
            user-select: none;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .x-char { 
            font-size: 0.6em; 
            margin-top: 25px; 
            margin-right: 30px; /* This adds the space between x and the number */
        }

        .emoji {
            margin-right: 15px;
        }

        @keyframes nintendoPop {
            0% { transform: scale(1); filter: brightness(1); }
            20% { transform: scale(1.2); filter: brightness(3); } 
            100% { transform: scale(1); filter: brightness(1); }
        }

        .pop-effect { animation: nintendoPop 0.3s forwards; }

        /* --- CONTROL PANEL STYLING --- */
        #controls { 
            background: white; 
            border: 6px solid #000; 
            border-radius: 30px; 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 10px 0 #333; 
            z-index: 100;
            font-family: sans-serif;
            margin-top: 20px;
            display: none; 
        }

        body.is-controller #controls { display: block; }

        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 15px; }
        button { 
            padding: 15px 30px; 
            font-size: 30px; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 50px; 
            border: 4px solid #000; 
            box-shadow: 0 5px 0 #000; 
            transition: 0.1s; 
        }
        button:active { transform: translateY(4px); box-shadow: 0 1px 0 #000; }
        .plus { background: #43B047; color: white; }
        .minus { background: #FBD000; color: black; }
        .sync-btn { background: #eee; border: 2px solid #ccc; font-size: 12px; padding: 5px 10px; margin-top: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="counter-wrapper">
        <span class="emoji">🌸</span>
        <span class="x-char">x</span>
        <span id="counter">0</span>
    </div>

    <div id="controls">
        <div style="font-weight: bold; font-size: 20px;">MANAGER REMOTE</div>
        <div id="conn-status" style="font-size: 10px; color: #999;">Connecting...</div>
        <div class="btn-group">
            <button class="minus" onclick="changeCount(-1)">-</button>
            <button class="plus" onclick="changeCount(1)">+</button>
        </div>
        <button onclick="resetCount()" style="margin-top:15px; font-size:14px; background:#f0f0f0; border: 2px solid #000; box-shadow: none; padding: 5px 15px;">RESET</button>
        <br>
        <button class="sync-btn" onclick="requestManualSync()">FORCE SYNC FROM OBS</button>
    </div>

    <script>
        const COUNTER_ID = 'mugi-sakura-counter-2026'; 
        const isController = window.location.hash === '#control';
        
        if (isController) document.body.classList.add('is-controller');

        let count = localStorage.getItem('sakura_count') ? parseInt(localStorage.getItem('sakura_count')) : 0;
        let conn;

        document.getElementById('counter').innerText = count;

        const peer = new Peer(isController ? null : COUNTER_ID);

        peer.on('open', (id) => { if (isController) connectToOBS(); });
        peer.on('connection', (c) => { conn = c; setupConnection(c); });

        function connectToOBS() {
            conn = peer.connect(COUNTER_ID);
            setupConnection(conn);
        }

        function setupConnection(c) {
            conn = c;
            conn.on('open', () => {
                if (isController) {
                    document.getElementById('conn-status').innerText = "CONNECTED";
                    setTimeout(() => { requestManualSync(); }, 500);
                }
            });

            conn.on('data', (data) => {
                if (data.action === 'requestSync' && !isController) conn.send({ action: 'syncResponse', val: count });
                if (data.action === 'syncResponse') updateCount(data.val, false);
                if (data.action === 'update') updateCount(data.val, true);
                if (data.action === 'reset') updateCount(0, false);
            });
        }

        function updateCount(newVal, animate) {
            count = newVal;
            localStorage.setItem('sakura_count', count);
            const counterNum = document.getElementById('counter');
            const wrapper = document.getElementById('counter-wrapper');
            counterNum.innerText = count;

            if (animate) {
                wrapper.classList.remove('pop-effect');
                void wrapper.offsetWidth; 
                wrapper.classList.add('pop-effect');
            }
        }

        function changeCount(delta) {
            const newVal = count + delta;
            updateCount(newVal, true);
            if (conn) conn.send({ action: 'update', val: newVal });
        }

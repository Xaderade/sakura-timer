<!DOCTYPE html>
<html>
<head>
    <title>Sakura Counter - Precision Spacing</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        body { 
            background: #00ff00; 
            margin: 0; 
            overflow: hidden; 
            display: flex;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #renderCanvas {
            image-rendering: auto;
            transform: skewX(-5deg);
            margin-left: 50px;
        }

        #controls { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; border: 6px solid #000; border-radius: 35px; 
            padding: 20px; text-align: center; box-shadow: 0 12px 0 #333; 
            z-index: 9999; font-family: sans-serif; display: none; 
        }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 15px; }
        button { padding: 15px 40px; font-size: 35px; cursor: pointer; font-weight: bold; border-radius: 50px; border: 4px solid #000; box-shadow: 0 6px 0 #000; transition: 0.1s; }
        button:active { transform: translateY(4px); box-shadow: 0 1px 0 #000; }
        .plus { background: #43B047; color: white; }
        .minus { background: #FBD000; color: black; }
    </style>
</head>
<body>

    <canvas id="renderCanvas" width="2400" height="600"></canvas>

    <div id="controls">
        <div style="font-weight: bold; font-size: 22px; color: #000;">MANAGER REMOTE</div>
        <div class="btn-group">
            <button class="minus" onclick="changeCount(-1)">-</button>
            <button class="plus" onclick="changeCount(1)">+</button>
        </div>
        <button onclick="resetCount()" style="margin-top:20px; font-size:14px; background:#f0f0f0; border: 3px solid #000; width:100%; border-radius:10px;">RESET TO 0</button>
    </div>

    <script>
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        const COUNTER_ID = 'mugi-sakura-counter-2026'; 
        const isController = window.location.hash.includes('control');
        if (isController) document.getElementById('controls').style.display = 'block';

        let count = localStorage.getItem('sakura_count') ? parseInt(localStorage.getItem('sakura_count')) : 0;
        let scale = 1;
        let flashColor = null;

        const fontMain = 'italic 260px "Luckiest Guy"';
        const fontSmall = 'italic 160px "Luckiest Guy"'; // Smaller font for the 'x'

        function drawText(text, x, y, isXChar) {
            ctx.font = isXChar ? fontSmall : fontMain;
            
            // 1. Outline
            ctx.lineJoin = "round";
            ctx.lineWidth = 18;
            ctx.strokeStyle = "black";
            ctx.strokeText(text, x, y);
            ctx.strokeText(text, x + 18, y + 18); // 3D shadow outline

            // 2. Gradient
            const grad = ctx.createLinearGradient(x, y - 130, x, y + 50);
            grad.addColorStop(0.2, "#FFFFFF");
            grad.addColorStop(0.85, "#A0A0A0");

            // 3. Shadow Fill
            ctx.fillStyle = "black";
            ctx.fillText(text, x + 18, y + 18);

            // 4. Main Fill
            ctx.fillStyle = flashColor ? flashColor : grad;
            ctx.fillText(text, x, y);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const startX = 100;
            const baseY = 400;

            // Draw Emoji
            ctx.font = "180px serif";
            ctx.textBaseline = "middle";
            ctx.fillText("🌸", startX, baseY - 20);

            ctx.save();
            ctx.translate(startX + 220, baseY);
            ctx.scale(scale, scale);
            ctx.translate(-(startX + 220), -baseY);

            // Draw smaller 'x'
            drawText("x", startX + 220, baseY + 20, true);

            // Draw numbers with extra spacing (offset by 110px from the x)
            drawText(count.toString(), startX + 330, baseY + 20, false);

            ctx.restore();
        }

        function triggerPop() {
            let start = null;
            const duration = 300;
            function animate(timestamp) {
                if (!start) start = timestamp;
                let progress = timestamp - start;
                let p = progress / duration;
                if (p < 0.3) {
                    scale = 1 + (p / 0.3) * 0.12;
                    flashColor = "#ccff00";
                } else if (p < 1) {
                    scale = 1.12 - ((p - 0.3) / 0.7) * 0.12;
                    flashColor = null;
                } else {
                    scale = 1;
                    flashColor = null;
                }
                draw();
                if (progress < duration) requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
        }

        document.fonts.load(fontMain).then(draw);

        // PeerJS setup...
        const peer = new Peer(isController ? null : COUNTER_ID);
        peer.on('open', () => { if (isController) connectToPeer(); });
        peer.on('connection', (c) => setupConnection(c));

        function connectToPeer() {
            const conn = peer.connect(COUNTER_ID);
            setupConnection(conn);
        }

        function setupConnection(c) {
            c.on('data', (data) => {
                if (data.action === 'update') { count = data.val; localStorage.setItem('sakura_count', count); triggerPop(); }
                if (data.action === 'reset') { count = 0; localStorage.setItem('sakura_count', 0); draw(); }
            });
        }

        function changeCount(delta) {
            count += delta;
            localStorage.setItem('sakura_count', count);
            triggerPop();
            if (peer.connections[COUNTER_ID]) peer.connections[COUNTER_ID][0].send({ action: 'update', val: count });
        }

        function resetCount() {
            count = 0;
            localStorage.setItem('sakura_count', 0);
            draw();
            if (peer.connections[COUNTER_ID]) peer.connections[COUNTER_ID][0].send({ action: 'reset' });
        }
    </script>
</body>
</html>
